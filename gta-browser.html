<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTA Browser City - Enhanced</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:"Courier New",monospace; }
#gc { display:block; cursor:crosshair; }
#hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
#money { position:absolute; top:16px; right:20px; color:#00FF41; font-size:26px; font-weight:bold; text-shadow:0 0 10px #00ff41,2px 2px #000; }
#weapon-info { position:absolute; top:50px; right:20px; color:#FFD700; font-size:14px; text-shadow:2px 2px #000; }
#wanted-bar { position:absolute; top:16px; left:20px; }
#hp-container { position:absolute; bottom:24px; left:20px; }
#hp-label { color:#ccc; font-size:11px; letter-spacing:2px; margin-bottom:4px; text-shadow:1px 1px #000; }
#hp-wrap { width:200px; height:14px; background:rgba(0,0,0,0.5); border:1px solid #555; border-radius:2px; overflow:hidden; }
#hp-fill { height:100%; background:#38A169; transition:width 0.2s; border-radius:2px; }
#minimap-wrap { position:absolute; bottom:20px; right:20px; border:2px solid #444; }
#minimap { display:block; }
#message { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:30px; font-weight:bold; text-shadow:0 0 20px rgba(255,200,0,0.8); text-align:center; letter-spacing:3px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
#controls-hint { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.5); font-size:11px; text-align:center; letter-spacing:1px; }
#score-info { position:absolute; top:80px; right:20px; color:#aaa; font-size:12px; text-align:right; }
#notification { position:absolute; top:120px; left:50%; transform:translateX(-50%); color:#FFD700; font-size:16px; font-weight:bold; text-shadow:2px 2px #000; text-align:center; opacity:0; transition:opacity 0.3s; pointer-events:none; }
#loc-hint { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); color:#fff; font-size:14px; font-weight:bold; text-shadow:2px 2px #000; opacity:0; transition:opacity 0.3s; background:rgba(0,0,0,0.8); padding:8px 20px; border-radius:6px; border:1px solid #888; pointer-events:none; }
#drug-bar { position:absolute; top:150px; left:20px; display:none; }
#drug-label { color:#e040fb; font-size:11px; letter-spacing:2px; margin-bottom:4px; text-shadow:0 0 8px #e040fb; }
#drug-wrap { width:140px; height:8px; background:rgba(0,0,0,0.5); border:1px solid #555; border-radius:2px; overflow:hidden; }
#drug-fill { height:100%; background:#e040fb; border-radius:2px; }
#wasted-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(139,0,0,0); display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; transition:background 0.5s; }
#wasted-text { color:#FF4444; font-size:72px; font-weight:bold; letter-spacing:8px; text-shadow:0 0 30px #ff0000; opacity:0; transition:opacity 0.5s; font-family:"Arial Black",sans-serif; }
#wasted-sub { color:#fff; font-size:18px; margin-top:16px; opacity:0; transition:opacity 0.5s 0.5s; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="hud">
  <div id="wanted-bar"></div>
  <div id="money">$0</div>
  <div id="weapon-info">&#x1F44A; Fists</div>
  <div id="score-info"></div>
  <div id="drug-bar"><div id="drug-label">DRUG</div><div id="drug-wrap"><div id="drug-fill" style="width:100%"></div></div></div>
  <div id="minimap-wrap"><canvas id="minimap" width="160" height="160"></canvas></div>
  <div id="hp-container"><div id="hp-label">HEALTH</div><div id="hp-wrap"><div id="hp-fill" style="width:100%"></div></div></div>
  <div id="message"></div>
  <div id="notification"></div>
  <div id="loc-hint"></div>
  <div id="controls-hint">WASD:Move | E:Enter/Exit Vehicle | SPACE:Attack | SHIFT:Sprint | F:Interact/Sell | G:Repair | H:Drug3 | R:Respawn</div>
</div>
<div id="wasted-screen"><div id="wasted-text">WASTED</div><div id="wasted-sub">Press R to Respawn</div></div>
<script>
'use strict';

const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const mmc=document.getElementById('minimap'),mmx=mmc.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
const TS=32,MW=160,MH=180,CELL=14;
const T_GRASS=0,T_ROAD=1,T_SW=2,T_BUILD=3,T_WATER=4,T_PARK=5,T_PARK2=6,T_BEACH=7,T_OCEAN=8,T_RUNWAY=9;
const map=[],bldgs=[],roadPts=[],SPECIAL_LOCS=[];
const BWALL=['#8B7355','#A0856C','#6B7280','#7C6D5E','#9B8B7A','#C4956A','#A67C52','#8A9BA8','#7B8FA1','#6B5545'];
const BROOF=['#5C4A3E','#4A5568','#2D3748','#553C2E','#3D5A6B','#4A3728','#394556','#5A4A3A','#2C3E50','#4A3320'];
const CAR_COLS=['#E53E3E','#3182CE','#38A169','#D69E2E','#805AD5','#DD6B20','#E2E8F0','#FC8181','#F6AD55','#B7791F'];
const SKIN_TONES=['#FDBCB4','#F1C27D','#E0AC69','#C68642','#8D5524','#FFDAB9','#D2956A'];
const SHIRT_COLS=['#E53E3E','#3182CE','#38A169','#805AD5','#DD6B20','#2D3748','#E2E8F0','#ED64A6','#ECC94B','#00B5D8','#F56500','#1A202C'];
const PANTS_COLS=['#2D3748','#1A365D','#1C4532','#44337A','#742A2A','#234E52','#000','#4A5568','#744210'];
const HAIR_COLS=['#1A202C','#744210','#B7791F','#E53E3E','#805AD5','#F6E05E','#A0AEC0','#276749'];
const VEH_CFG={
  car:   {w:32,h:18,mxS:4.2,acc:0.16,fr:0.93,trn:0.055,hp:200,name:'Car',   cols:CAR_COLS,sell:1200},
  van:   {w:38,h:22,mxS:3.0,acc:0.11,fr:0.92,trn:0.042,hp:320,name:'Van',   cols:['#4A5568','#718096','#E2E8F0','#A0AEC0','#2D3748'],sell:1800},
  truck: {w:52,h:24,mxS:2.2,acc:0.07,fr:0.90,trn:0.032,hp:600,name:'Truck', cols:['#744210','#975A16','#B7791F','#C05621','#D69E2E'],sell:3500},
  bike:  {w:20,h:10,mxS:5.8,acc:0.24,fr:0.95,trn:0.10, hp:80, name:'Bike',  cols:['#E53E3E','#1A202C','#F6AD55','#805AD5','#3182CE'],sell:900},
  heli:  {w:44,h:28,mxS:5.0,acc:0.0, fr:0.96,trn:0.07, hp:300,name:'Heli',  cols:['#2D3748','#4A5568','#718096'],flies:true,sell:18000},
  plane: {w:64,h:18,mxS:9.0,acc:0.22,fr:0.99,trn:0.025,hp:400,name:'Plane', cols:['#E2E8F0','#CBD5E0','#A0AEC0'],flies:true,sell:30000},
  boat:  {w:38,h:16,mxS:3.8,acc:0.14,fr:0.91,trn:0.06, hp:180,name:'Boat',  cols:['#2B6CB0','#3182CE','#F6AD55','#DD6B20'],floats:true,sell:5000},
  police:{w:32,h:18,mxS:4.8,acc:0.22,fr:0.93,trn:0.07, hp:280,name:'Police',cols:['#0f2b5a'],isPol:true,sell:0},
  polheli:{w:44,h:28,mxS:5.5,acc:0.20,fr:0.96,trn:0.07,hp:350,name:'PolHeli',cols:['#0f2b5a'],flies:true,isPol:true,sell:0},
};
const WALK_CYCLE=[];
for(let f=0;f<10;f++){const t=f/10*Math.PI*2;WALK_CYCLE.push([Math.sin(t)*0.55,Math.sin(t+Math.PI)*0.55,Math.sin(t+Math.PI)*0.32,Math.sin(t)*0.32]);}

// Audio
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function sound(type){
  try{const ac=getAudio(),g=ac.createGain(),t=ac.currentTime;g.connect(ac.destination);
  const mk=(freq,type2,dur,gain=0.25,ramp=0.001)=>{const o=ac.createOscillator();o.type=type2;o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(ramp<1?60:ramp,t+dur);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.connect(g);o.start(t);o.stop(t+dur);};
  if(type==='shoot'){mk(300,'sawtooth',0.12,0.25);}
  else if(type==='punch'){mk(120,'square',0.09,0.4);}
  else if(type==='pickup'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(1100,t+0.12);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.connect(g);o.start(t);o.stop(t+0.12);}
  else if(type==='siren'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(700,t);o.frequency.setValueAtTime(500,t+0.25);o.frequency.setValueAtTime(700,t+0.5);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.connect(g);o.start(t);o.stop(t+0.6);}
  else if(type==='carenter'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+0.15);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.connect(g);o.start(t);o.stop(t+0.15);}
  else if(type==='star'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(550,t+0.1);o.frequency.setValueAtTime(660,t+0.2);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(g);o.start(t);o.stop(t+0.35);}
  else if(type==='explode'){const buf=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=350;src.connect(flt);flt.connect(g);g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);src.start(t);src.stop(t+0.6);}
  else if(type==='engine'){const o=ac.createOscillator();o.type='sawtooth';const sp=G&&G.player&&G.player.inCar?Math.abs(G.player.inCar.spd)*40+80:80;o.frequency.setValueAtTime(sp,t);g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.connect(g);o.start(t);o.stop(t+0.08);}
  else if(type==='heli'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(45,t);o.frequency.setValueAtTime(40,t+0.15);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g);o.start(t);o.stop(t+0.3);}
  else if(type==='drug'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.2);o.frequency.exponentialRampToValueAtTime(200,t+0.4);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);o.start(t);o.stop(t+0.4);}
  else if(type==='cash'){const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1000,t);o.frequency.setValueAtTime(1200,t+0.05);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);o.start(t);o.stop(t+0.2);}
  else if(type==='repair'){mk(80,'square',0.35,0.2);}
  else if(type==='club'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(60,t);g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);o.start(t);o.stop(t+0.2);}
  }catch(e){}
}

// Utilities
const R=(a,b)=>Math.random()*(b-a)+a;
const RI=(a,b)=>Math.floor(R(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function tileAt(px,py){const tx=px/TS|0,ty=py/TS|0;if(tx<0||ty<0||tx>=MW||ty>=MH)return T_GRASS;return map[ty]?.[tx]??T_GRASS;}
function drivable(px,py){const t=tileAt(px,py);return t===T_ROAD||t===T_SW||t===T_PARK2||t===T_RUNWAY||t===T_BEACH;}
function walkable(px,py){const t=tileAt(px,py);return t!==T_BUILD&&t!==T_WATER&&t!==T_OCEAN;}
function onWater(px,py){const t=tileAt(px,py);return t===T_OCEAN||t===T_WATER;}
function randRoad(){return roadPts[RI(0,roadPts.length-1)]||{x:1200,y:1200};}
function nrm(x,y){const l=Math.hypot(x,y)||1;return{x:x/l,y:y/l};}
function addExplosion(x,y){
  for(let i=0;i<55;i++){const a=R(0,Math.PI*2),s=R(1.5,6);G.particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,i<35?'hsl('+(RI(0,40))+',100%,'+(RI(45,65))+'%)':'#888',R(400,900),R(3,9)));}
  for(let i=0;i<12;i++){const a=R(0,Math.PI*2),s=R(0.5,2);G.particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,'#333',R(600,1200),R(6,12)));}
}
function notify(msg,dur=2200){const el=document.getElementById('notification');el.textContent=msg;el.style.opacity=1;clearTimeout(G._notifT);G._notifT=setTimeout(()=>el.style.opacity=0,dur);}
function showLocHint(msg){const el=document.getElementById('loc-hint');el.innerHTML=msg;el.style.opacity=1;}
function hideLocHint(){document.getElementById('loc-hint').style.opacity=0;}
function addMoney(n){G.money+=n;document.getElementById('money').textContent='$'+G.money;}
function randAppearance(isCop=false){
  return{skin:SKIN_TONES[RI(0,SKIN_TONES.length-1)],shirt:isCop?'#1E3A8A':SHIRT_COLS[RI(0,SHIRT_COLS.length-1)],pants:isCop?'#1A365D':PANTS_COLS[RI(0,PANTS_COLS.length-1)],hair:HAIR_COLS[RI(0,HAIR_COLS.length-1)]};
}

// Map generation
function genMap(){
  for(let y=0;y<MH;y++){
    map[y]=[];
    for(let x=0;x<MW;x++){
      if(y>=148){map[y][x]=T_OCEAN;continue;}
      if(y>=136){map[y][x]=T_BEACH;continue;}
      if(x>=104&&y<=55){map[y][x]=genAirportTile(x,y);continue;}
      if(y>=58&&y<=64){map[y][x]=T_WATER;continue;}
      const cx=x%CELL,cy=y%CELL;
      const bx=Math.floor(x/CELL),by=Math.floor(y/CELL);
      const bs=(bx*7+by*13)%22;
      if(cx===1||cx===2||cy===1||cy===2)map[y][x]=T_ROAD;
      else if(cx===0||cx===3||cy===0||cy===3)map[y][x]=T_SW;
      else if(bs<3)map[y][x]=T_PARK;
      else if(bs<5)map[y][x]=T_PARK2;
      else map[y][x]=T_BUILD;
    }
  }
  // River bridges
  for(let y=58;y<=64;y++){
    [15,16,17,18,42,43,44,45,70,71,72,73,98,99,100,101].forEach(bx=>{if(bx<MW)map[y][bx]=T_ROAD;});
  }
  // Beach road access
  for(let x=0;x<104;x++){const cx=x%CELL;if(cx===1||cx===2){map[133][x]=T_ROAD;map[134][x]=T_ROAD;}}
  // Road points
  for(let y=1;y<MH-1;y++)for(let x=1;x<MW-1;x++)if(map[y][x]===T_ROAD)roadPts.push({x:x*TS+TS/2,y:y*TS+TS/2});
  // City buildings
  for(let by2=0;by2<Math.floor(MH/CELL);by2++){
    for(let bx2=0;bx2<Math.floor(MW/CELL);bx2++){
      const tX=bx2*CELL+4,tY=by2*CELL+4;
      if(tX>=104&&tY<=4)continue;
      if(tY>=136)continue;
      const bs=(bx2*7+by2*13)%22;
      if(bs>=5)genBuilding(tX,tY,10,10,bx2,by2);
    }
  }
  // Airport terminal
  bldgs.push({x:110*TS,y:20*TS,w:18*TS,h:12*TS,wall:'#4A5568',roof:'#2D3748',floors:2,wsX:[],wsY:[],winW:[],sz:4,special:'airport'});
  for(let wx=110*TS+10;wx<128*TS-10;wx+=12)for(let wy=20*TS+10;wy<32*TS-10;wy+=12){const b=bldgs[bldgs.length-1];b.wsX.push(wx);b.wsY.push(wy);b.winW.push(Math.random()>0.3);}
  // Hangars
  for(let i=0;i<3;i++){
    bldgs.push({x:(130+i*8)*TS,y:18*TS,w:7*TS,h:10*TS,wall:'#718096',roof:'#4A5568',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'hangar'});
  }
  placeSpecialLocs();
}

function genAirportTile(x,y){
  if(y>=9&&y<=12)return T_RUNWAY;
  if(y>=40&&y<=43)return T_RUNWAY;
  if(x>=104&&x<=108&&y>=9&&y<=43)return T_RUNWAY;
  if(x>=108&&x<=158&&y>=14&&y<=38&&!(x>=130&&y>=18&&y<=28))return T_PARK2;
  return T_PARK2;
}

function genBuilding(tx,ty,bw,bh,bx,by){
  const seed=(bx*31+by*37);
  const wallC=BWALL[seed%BWALL.length],roofC=BROOF[seed%BROOF.length];
  const pad=1,floors=2+(seed%5);
  const wx=tx+pad,wy=ty+pad,ww=bw-pad*2,wh=bh-pad*2;
  if(ww<2||wh<2)return;
  const wsX=[],wsY=[],winW=[];
  const sz=4;
  for(let wy2=wy*TS+8;wy2<(wy+wh)*TS-8;wy2+=sz+8)
    for(let wx2=wx*TS+8;wx2<(wx+ww)*TS-8;wx2+=sz+8){wsX.push(wx2);wsY.push(wy2);winW.push(Math.random()>0.35);}
  bldgs.push({x:wx*TS,y:wy*TS,w:ww*TS,h:wh*TS,wall:wallC,roof:roofC,floors,wsX,wsY,winW,sz});
}

function placeSpecialLocs(){
  // Garages
  [[20,8],[48,70],[75,90]].forEach(([tx,ty])=>{
    const x=tx*TS,y=ty*TS,w=8*TS,h=6*TS;
    bldgs.push({x,y,w,h,wall:'#276749',roof:'#1C4532',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'garage'});
    SPECIAL_LOCS.push({type:'garage',x,y,w,h,label:"JAKE'S GARAGE &mdash; <b>F</b>: Sell Vehicle &nbsp;|&nbsp; <b>G</b>: Repair"});
  });
  // Nightclubs
  [[35,25],[60,85]].forEach(([tx,ty])=>{
    const x=tx*TS,y=ty*TS,w=10*TS,h=8*TS;
    bldgs.push({x,y,w,h,wall:'#44337A',roof:'#322659',floors:2,wsX:[],wsY:[],winW:[],sz:4,special:'club',isClub:true});
    SPECIAL_LOCS.push({type:'nightclub',x,y,w,h,label:"NEON CLUB &mdash; <b>F</b>: Enter ($50) &mdash; Heals 30hp &amp; Speed Boost"});
  });
  // Drug dens
  [[15,40],[55,30],[80,75]].forEach(([tx,ty])=>{
    const x=tx*TS,y=ty*TS,w=6*TS,h=6*TS;
    bldgs.push({x,y,w,h,wall:'#1A202C',roof:'#0A0F0F',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'drugden'});
    SPECIAL_LOCS.push({type:'drugden',x,y,w,h,label:"DRUG DEN &mdash; <b>F</b>:Speed($200) <b>G</b>:Power($200) <b>H</b>:Trippy($300)"});
  });
  // Gun shops
  [[28,15],[65,55],[90,90]].forEach(([tx,ty])=>{
    const x=tx*TS,y=ty*TS,w=7*TS,h=6*TS;
    bldgs.push({x,y,w,h,wall:'#744210',roof:'#553C2E',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'gunshop'});
    SPECIAL_LOCS.push({type:'gunshop',x,y,w,h,label:"AMMU-NATION &mdash; <b>F</b>:Pistol($300) <b>G</b>:Shotgun($500) <b>H</b>:Uzi($700)"});
  });
  // Boat dock
  SPECIAL_LOCS.push({type:'boatdock',x:20*TS,y:140*TS,w:12*TS,h:8*TS,label:"BOAT DOCK &mdash; <b>F</b>: Spawn Boat"});
  // Helipad
  SPECIAL_LOCS.push({type:'helipad',x:112*TS,y:35*TS,w:8*TS,h:8*TS,label:"HELIPAD &mdash; <b>F</b>: Spawn Helicopter"});
  // Airstrip
  SPECIAL_LOCS.push({type:'airstrip',x:104*TS,y:9*TS,w:54*TS,h:5*TS,label:"RUNWAY &mdash; <b>F</b>: Spawn Plane (needs speed to fly)"});
}

// Entity base
class Entity{constructor(x,y){this.x=x;this.y=y;this.alive=true;this.r=10;}}

// Particle
class Particle extends Entity{
  constructor(x,y,vx,vy,col,life,r){super(x,y);this.vx=vx;this.vy=vy;this.col=col;this.life=life;this.maxL=life;this.r=r||3;}
  update(dt){this.x+=this.vx;this.y+=this.vy;this.vy+=0.04;this.life-=dt;if(this.life<=0)this.alive=false;}
}

// Bullet
class Bullet extends Entity{
  constructor(x,y,angle,dmg,owner){super(x,y);this.angle=angle;this.dmg=dmg;this.owner=owner;this.r=3;this.spd=12;this.life=800;this.vx=Math.cos(angle)*this.spd;this.vy=Math.sin(angle)*this.spd;}
  update(dt){this.x+=this.vx;this.y+=this.vy;this.life-=dt;if(this.life<=0||tileAt(this.x,this.y)===T_BUILD){this.alive=false;return;}
    for(const e of G.entities){
      if(!e.alive||e===this.owner)continue;
      if(e instanceof Vehicle){if(dst(this,e)<(e.w||32)/2){e.hit(this.dmg,this);this.alive=false;return;}}
      else if(e instanceof Ped||e instanceof CopOfficer){if(dst(this,e)<e.r+2){e.hit(this.dmg,this);this.alive=false;return;}}
    }
    if(this.owner!==G.player&&dst(this,G.player)<G.player.r+2){G.player.hit(this.dmg,this);this.alive=false;}
  }
}

// Pickup
class Pickup extends Entity{
  constructor(x,y,type,val){super(x,y);this.type=type;this.val=val;this.r=10;this.bobT=R(0,Math.PI*2);}
  update(dt){this.bobT+=dt*0.002;if(dst(this,G.player)<18){this.collect();}}
  collect(){
    sound('pickup');
    if(this.type==='money'){addMoney(this.val);notify('+$'+this.val);}
    else if(this.type==='health'){G.player.hp=Math.min(G.player.maxHp,G.player.hp+this.val);G.player.updateHpBar();}
    else if(this.type==='armor'){G.player.maxHp=Math.min(180,G.player.maxHp+50);G.player.hp=Math.min(G.player.maxHp,G.player.hp+50);notify('Armor +50',1500);}
    else if(['pistol','shotgun','uzi'].includes(this.type)){
      G.player.ammo[this.type]=(G.player.ammo[this.type]||0)+this.val;
      if(G.player.weapon==='fists')G.player.weapon=this.type;
      notify(this.type.toUpperCase()+' ammo +'+this.val,1500);
    }
    this.alive=false;
  }
}

// Vehicle class
class Vehicle extends Entity{
  constructor(x,y,vtype,col){
    super(x,y);
    this.vtype=vtype;
    const cfg=VEH_CFG[vtype]||VEH_CFG.car;
    this.w=cfg.w;this.h=cfg.h;this.mxS=cfg.mxS;this.acc=cfg.acc;this.fr=cfg.fr;this.trn=cfg.trn;
    this.hp=cfg.hp;this.maxHp=cfg.hp;
    this.col=col||cfg.cols[RI(0,cfg.cols.length-1)];
    this.name=cfg.name||vtype;
    this.flies=!!cfg.flies;this.floats=!!cfg.floats;this.isPol=!!cfg.isPol;
    this.spd=0;this.angle=0;this.driver=null;this.isNpc=false;
    this.npcTarget=null;this.stuckT=0;this.lastX=x;this.lastY=y;
    this.smokeDmg=0;this.sirenT=0;this.rotorA=0;this.altitude=this.flies?60:0;
    this._exploded=false;
  }
  canMove(nx,ny){
    if(this.flies)return true;
    if(this.floats)return onWater(nx,ny)||onWater(nx+this.w/3,ny)||onWater(nx-this.w/3,ny);
    return drivable(nx,ny)||drivable(nx+this.h/2,ny)||drivable(nx-this.h/2,ny);
  }
  update(dt){
    this.rotorA+=dt*0.014;
    if(this.vtype==='heli'&&this.driver===G.player){
      let dx=0,dy=0;
      if(K['w']||K['arrowup'])dy=-1;if(K['s']||K['arrowdown'])dy=1;
      if(K['a']||K['arrowleft'])dx=-1;if(K['d']||K['arrowright'])dx=1;
      if(dx||dy){const n=nrm(dx,dy);this.x+=n.x*this.mxS;this.y+=n.y*this.mxS;this.angle=Math.atan2(dy,dx);}
      G.engineT=(G.engineT||0)-dt;if(G.engineT<=0){G.engineT=250;sound('heli');}
      return;
    }
    if(this.driver===G.player&&this.vtype!=='heli'){
      if(K['w']||K['arrowup'])this.spd=Math.min(this.spd+this.acc,this.mxS*(G.drug.type==='speed'?1.7:1));
      else if(K['s']||K['arrowdown'])this.spd=Math.max(this.spd-this.acc*1.5,-this.mxS*0.4);
      else{this.spd*=this.fr;if(Math.abs(this.spd)<0.05)this.spd=0;}
      if(Math.abs(this.spd)>0.08){
        if(K['a']||K['arrowleft'])this.angle-=this.trn*Math.sign(this.spd)*(this.vtype==='bike'?1.2:1);
        if(K['d']||K['arrowright'])this.angle+=this.trn*Math.sign(this.spd)*(this.vtype==='bike'?1.2:1);
      }
      G.engineT=(G.engineT||0)-dt;if(G.engineT<=0){G.engineT=120;if(Math.abs(this.spd)>0.5)sound('engine');}
    } else if(this.isPol&&this.driver){
      if(G.wanted>0)this.updatePolice(dt);
    } else if(this.isNpc&&this.driver){
      this.updateNpc(dt);
    }
    if(!isNaN(this.spd)&&Math.abs(this.spd)>0.01){
      const nx=this.x+Math.cos(this.angle)*this.spd;
      const ny=this.y+Math.sin(this.angle)*this.spd;
      if(this.canMove(nx,ny)){this.x=nx;this.y=ny;}
      else{this.spd*=-0.2;this.angle+=R(0.1,0.4)*(Math.random()>0.5?1:-1);}
    }
    if(this.isNpc){
      const moved=Math.hypot(this.x-this.lastX,this.y-this.lastY);
      if(moved<0.3)this.stuckT+=dt;else this.stuckT=0;
      if(this.stuckT>2500){this.angle+=Math.PI*(0.4+Math.random()*0.3);this.spd=0;this.stuckT=0;this.npcTarget=randRoad();}
      this.lastX=this.x;this.lastY=this.y;
    }
    if(!this.flies&&!this.floats&&Math.abs(this.spd)>1.2){
      if(dst(this,G.player)<22&&!G.player.inCar)G.player.hit(Math.abs(this.spd)*5,this);
      for(const e of G.entities){if(e instanceof Ped&&e.alive&&dst(this,e)<20)e.hit(Math.abs(this.spd)*7,this);}
    }
    if(this.smokeDmg>80&&Math.random()<0.3)G.particles.push(new Particle(this.x+R(-6,6),this.y+R(-6,6),R(-0.3,0.3),R(-0.8,0),'#666',R(700,1400),R(5,9)));
  }
  updateNpc(dt){
    if(!this.npcTarget)this.npcTarget=randRoad();
    const dx=this.npcTarget.x-this.x,dy=this.npcTarget.y-this.y;
    let ang=Math.atan2(dy,dx),diff=ang-this.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)>0.08)this.angle+=Math.sign(diff)*Math.min(this.trn*0.8,Math.abs(diff));
    this.spd=Math.min(this.spd+this.acc*0.4,this.mxS*0.65);
    if(Math.hypot(dx,dy)<45)this.npcTarget=randRoad();
    // Avoid player
    if(G.wanted>2&&dst(this,G.player)<120){const ax=this.x-G.player.x,ay=this.y-G.player.y;this.angle=Math.atan2(ay,ax);this.spd=Math.min(this.spd+0.1,this.mxS*0.8);}
  }
  updatePolice(dt){
    const tgt=G.player.inCar||G.player;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,d=Math.hypot(dx,dy);
    let ang=Math.atan2(dy,dx),diff=ang-this.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)>0.1)this.angle+=Math.sign(diff)*Math.min(this.trn,Math.abs(diff));
    if(d>80)this.spd=Math.min(this.spd+this.acc,this.mxS);else this.spd*=0.88;
    if(G.player.inCar&&dst(this,G.player.inCar)<40)G.player.inCar.hit(9,this);
    if(!G.player.inCar&&dst(this,G.player)<22)G.player.hit(7,this);
    this.sirenT-=dt;if(this.sirenT<=0){this.sirenT=700;sound('siren');}
  }
  hit(dmg,src){this.smokeDmg+=dmg;this.hp-=dmg;if(this.hp<=0)this.explode();}
  explode(){
    if(this._exploded)return;this._exploded=true;sound('explode');addExplosion(this.x,this.y);G.shake=500;
    for(const e of G.entities){if(e.alive&&dst(this,e)<100&&!(e instanceof Vehicle)){e.hit&&e.hit(80,this);}}
    if(this.driver===G.player){G.player.inCar=null;G.player.x=this.x+55;G.player.y=this.y+10;}
    if(dst(this,G.player)<100&&!G.player.inCar)G.player.hit(80,this);
    this.alive=false;
  }
}

// Pedestrian
class Ped extends Entity{
  constructor(x,y){
    super(x,y);this.r=8;this.spd=R(0.9,1.5);
    this.appearance=randAppearance();
    this.walkFrame=RI(0,9);this.footT=0;this.idleT=R(0,2000);
    this.idle=true;this.angle=R(0,Math.PI*2);this.fleeing=false;this.fleeDir=R(0,Math.PI*2);
    this.fleeT=0;this.hp=40;
  }
  update(dt){
    this.footT+=dt;
    if(this.fleeing){
      this.fleeT-=dt;
      if(this.fleeT<=0){this.fleeDir=R(0,Math.PI*2);this.fleeT=R(500,900);}
      if(Math.random()<0.3)this.walkFrame=(this.walkFrame+1)%10;
      const sp=this.spd*(G.drug&&G.drug.type==='speed'?1:1)*1.6;
      const nx=this.x+Math.cos(this.fleeDir)*sp,ny=this.y+Math.sin(this.fleeDir)*sp;
      if(walkable(nx,ny)){this.x=nx;this.y=ny;}else{this.fleeDir+=Math.PI*0.4;}
    } else if(!this.idle){
      if(Math.random()<0.15)this.walkFrame=(this.walkFrame+1)%10;
      const nx=this.x+Math.cos(this.angle)*this.spd,ny=this.y+Math.sin(this.angle)*this.spd;
      if(walkable(nx,ny)){this.x=nx;this.y=ny;}else this.angle+=R(0.3,1.2);
      this.idleT-=dt;if(this.idleT<=0){this.idle=true;this.idleT=R(800,3000);}
    } else {
      this.idleT-=dt;if(this.idleT<=0){this.idle=false;this.idleT=R(2000,6000);this.angle=R(0,Math.PI*2);}
    }
    if(G.wanted>0&&dst(this,G.player)<220){this.fleeing=true;if(this.fleeT<=0)this.fleeT=600;}
  }
  hit(dmg,src){
    this.hp-=dmg;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#e53e3e',300,3));
    if(this.hp<=0){const m=RI(10,120);addMoney(m);notify('+$'+m);this.alive=false;if(src===G.player||src instanceof Bullet&&src.owner===G.player){G.kills++;G.wanted=Math.min(5,G.wanted+2);G.wantedT=0;}}
  }
}

// Cop officer (on foot)
class CopOfficer extends Entity{
  constructor(x,y){
    super(x,y);this.r=9;this.spd=2.1;this.hp=60;
    this.appearance=randAppearance(true);
    this.walkFrame=RI(0,9);this.angle=0;this.atkT=0;this.shootT=0;this.stun=0;
  }
  update(dt){
    if(this.stun>0){this.stun-=dt;return;}
    const d=dst(this,G.player);
    if(d>380){return;}
    const dx=G.player.x-this.x,dy=G.player.y-this.y;
    this.angle=Math.atan2(dy,dx);
    if(Math.random()<0.2)this.walkFrame=(this.walkFrame+1)%10;
    if(d>45){const nx=this.x+Math.cos(this.angle)*this.spd,ny=this.y+Math.sin(this.angle)*this.spd;if(walkable(nx,ny)){this.x=nx;this.y=ny;}}
    this.atkT-=dt;
    if(d<40&&this.atkT<=0){G.player.hit(8,this);this.atkT=500;}
    this.shootT-=dt;
    if(G.wanted>=2&&d>40&&d<280&&this.shootT<=0){
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.08,0.08),20,this));
      sound('shoot');this.shootT=R(900,1600);
    }
  }
  hit(dmg,src){
    this.hp-=dmg;this.stun=200;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#4444ff',300,3));
    if(this.hp<=0){this.alive=false;if(src===G.player||src instanceof Bullet&&src.owner===G.player){G.wanted=Math.min(5,G.wanted+3);G.wantedT=0;}}
  }
}

// Player
class Player extends Entity{
  constructor(x,y){
    super(x,y);this.r=10;this.spd=2.6;this.angle=0;this.hp=100;this.maxHp=100;
    this.weapon='fists';this.ammo={pistol:30,shotgun:12,uzi:60};
    this.walkFrame=0;this.footT=0;this.running=false;
    this.appearance={skin:'#F1C27D',shirt:'#E53E3E',pants:'#2D3748',hair:'#1A202C'};
    this.inCar=null;this.atkT=0;this.punchT=0;this.hitFlash=0;
  }
  update(dt){
    this.hitFlash=Math.max(0,this.hitFlash-dt);
    if(this.inCar){this.x=this.inCar.x;this.y=this.inCar.y;return;}
    let dx=0,dy=0;
    if(K['w']||K['arrowup'])dy=-1;if(K['s']||K['arrowdown'])dy=1;
    if(K['a']||K['arrowleft'])dx=-1;if(K['d']||K['arrowright'])dx=1;
    this.running=(K['shift']&&(dx||dy));
    const spMult=(G.drug&&G.drug.type==='speed'?2.2:1)*(this.running?1.8:1);
    const spd=this.spd*spMult;
    if(dx||dy){
      const n=nrm(dx,dy);
      this.angle=Math.atan2(dy,dx);
      const nx=this.x+n.x*spd,ny=this.y+n.y*spd;
      if(walkable(nx,this.y))this.x=nx;
      if(walkable(this.x,ny))this.y=ny;
      this.footT+=dt;if(this.footT>80){this.footT=0;this.walkFrame=(this.walkFrame+1)%10;}
    }
    this.punchT=Math.max(0,this.punchT-dt);
    this.atkT=Math.max(0,this.atkT-dt);
  }
  attack(){
    if(this.inCar)return;
    if(this.atkT>0)return;
    const w=this.weapon;
    if(w==='fists'){
      this.punchT=250;this.atkT=500;sound('punch');
      for(const e of G.entities){
        if(e instanceof Ped&&dst(this,e)<42){e.hit(15+(G.drug&&G.drug.type==='power'?30:0),this);G.wanted=Math.min(5,G.wanted+1);G.wantedT=0;}
        if(e instanceof CopOfficer&&dst(this,e)<42){e.hit(20+(G.drug&&G.drug.type==='power'?40:0),this);G.wanted=Math.min(5,G.wanted+1);G.wantedT=0;}
        if(e instanceof Vehicle&&dst(this,e)<42){e.hit(5,this);}
      }
    } else if(w==='pistol'&&this.ammo.pistol>0){
      this.ammo.pistol--;this.atkT=280;sound('shoot');
      const dmg=25*(G.drug&&G.drug.type==='power'?3:1);
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.04,0.04),dmg,this));
      G.wanted=Math.min(5,G.wanted+1);G.wantedT=0;
      G.particles.push(new Particle(this.x+Math.cos(this.angle)*16,this.y+Math.sin(this.angle)*16,0,0,'#ffff00',120,5));
      if(this.ammo.pistol===0&&this.weapon==='pistol')this.weapon='fists';
    } else if(w==='shotgun'&&this.ammo.shotgun>0){
      this.ammo.shotgun--;this.atkT=650;sound('shoot');
      const dmg=35*(G.drug&&G.drug.type==='power'?3:1);
      for(let i=-2;i<=2;i++)G.entities.push(new Bullet(this.x,this.y,this.angle+i*0.12,dmg,this));
      G.wanted=Math.min(5,G.wanted+1);G.wantedT=0;
      if(this.ammo.shotgun===0)this.weapon='fists';
    } else if(w==='uzi'&&this.ammo.uzi>0){
      this.ammo.uzi--;this.atkT=110;sound('shoot');
      const dmg=18*(G.drug&&G.drug.type==='power'?3:1);
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.1,0.1),dmg,this));
      G.wanted=Math.min(5,G.wanted+1);G.wantedT=0;
      if(this.ammo.uzi===0)this.weapon='fists';
    }
    this.updateWeaponHUD();
  }
  hit(dmg,src){
    if(this.hp<=0)return;
    this.hp-=dmg;this.hitFlash=400;
    G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-3,0),'#ff4444',400,5));
    this.updateHpBar();
    if(this.hp<=0)G.playerDied();
  }
  updateHpBar(){
    const pct=Math.max(0,this.hp/this.maxHp);
    document.getElementById('hp-fill').style.width=(pct*100)+'%';
    document.getElementById('hp-fill').style.background=pct>0.5?'#38A169':pct>0.25?'#D69E2E':'#E53E3E';
  }
  updateWeaponHUD(){
    const icons={fists:'&#x1F44A; Fists',pistol:'&#x1F52B; Pistol',shotgun:'&#x1F4A5; Shotgun',uzi:'&#x1F4AB; Uzi'};
    const ammoStr=this.weapon!=='fists'?' ['+this.ammo[this.weapon]+']':'';
    document.getElementById('weapon-info').innerHTML=icons[this.weapon]+ammoStr;
  }
}

// Game state
const G={
  player:null,entities:[],particles:[],
  money:0,wanted:0,wantedT:0,wantedDecayT:0,
  time:0,kills:0,score:0,
  camera:{x:0,y:0},shake:0,
  drug:{type:null,timer:0,maxTimer:0},
  _notifT:null,engineT:0,
  spawnT:0,cleanT:0,wantedSpawnT:0,heliSpawnT:0,
  // Spawn timers
  pedSpawnT:0,carSpawnT:0,
  playerDied(){
    document.getElementById('wasted-screen').style.background='rgba(139,0,0,0.6)';
    document.getElementById('wasted-text').style.opacity=1;
    document.getElementById('wasted-sub').style.opacity=1;
    G.player.alive=false;
  },
  respawn(){
    document.getElementById('wasted-screen').style.background='rgba(139,0,0,0)';
    document.getElementById('wasted-text').style.opacity=0;
    document.getElementById('wasted-sub').style.opacity=0;
    const spawn=roadPts[0]||{x:640,y:640};
    G.player=new Player(spawn.x,spawn.y);
    G.player.alive=true;G.wanted=0;G.drug={type:null,timer:0,maxTimer:0};
    document.getElementById('drug-bar').style.display='none';
    G.player.updateHpBar();G.player.updateWeaponHUD();
    updateWantedBar();
  }
};
function updateWantedBar(){
  const wb=document.getElementById('wanted-bar');
  wb.innerHTML='';for(let i=0;i<5;i++){const s=document.createElement('span');s.textContent='★';s.style.cssText='font-size:20px;margin-right:2px;text-shadow:1px 1px #000;';s.style.color=i<G.wanted?'#FFD700':'#333';wb.appendChild(s);}
}
function getNearbyLoc(){
  const px=G.player.x,py=G.player.y;
  for(const loc of SPECIAL_LOCS){
    const lx=loc.x+loc.w/2,ly=loc.y+loc.h/2;
    if(Math.abs(px-lx)<loc.w/2+50&&Math.abs(py-ly)<loc.h/2+50)return loc;
  }
  return null;
}
function interactLoc(loc,key){
  if(loc.type==='garage'){
    if(key==='f'){
      if(!G.player.inCar){notify('Drive a vehicle into the garage first!');return;}
      const car=G.player.inCar;const cond=car.hp/car.maxHp;
      const price=Math.floor((VEH_CFG[car.vtype]?.sell||1000)*cond);
      G.player.inCar=null;car.driver=null;car.alive=false;
      addMoney(price);sound('cash');notify('Sold '+car.name+' for $'+price+'!',3000);
    } else if(key==='g'){
      if(!G.player.inCar){notify('Drive a vehicle in to repair it!');return;}
      const car=G.player.inCar;if(car.hp>=car.maxHp){notify('Car is already at full health!',1500);return;}
      const cost=Math.floor((car.maxHp-car.hp)/car.maxHp*(VEH_CFG[car.vtype]?.sell||1000)*0.25)+100;
      if(G.money<cost){notify('Not enough money! Need $'+cost,2000);return;}
      addMoney(-cost);car.hp=car.maxHp;car.smokeDmg=0;sound('repair');notify('Car repaired for $'+cost+'!',2500);
    }
  } else if(loc.type==='nightclub'){
    if(key==='f'){
      if(G.money<50){notify('Need $50 to enter!',2000);return;}
      addMoney(-50);G.player.hp=Math.min(G.player.maxHp,G.player.hp+30);
      G.player.updateHpBar();
      G.drug={type:'speed',timer:8000,maxTimer:8000};
      document.getElementById('drug-bar').style.display='block';
      document.getElementById('drug-label').textContent='SPEED BOOST';
      sound('club');notify('Entered NEON CLUB! +30HP, Speed Boost!',3000);
    }
  } else if(loc.type==='drugden'){
    if(key==='f'){if(G.money<200){notify('Need $200 for Speed!',2000);return;}addMoney(-200);G.drug={type:'speed',timer:30000,maxTimer:30000};document.getElementById('drug-bar').style.display='block';document.getElementById('drug-label').textContent='SPEED DRUG';sound('drug');notify('SPEED DRUG - Running faster!',3000);}
    else if(key==='g'){if(G.money<200){notify('Need $200 for Power!',2000);return;}addMoney(-200);G.drug={type:'power',timer:30000,maxTimer:30000};document.getElementById('drug-bar').style.display='block';document.getElementById('drug-label').textContent='POWER DRUG';sound('drug');notify('POWER DRUG - 3x damage!',3000);}
    else if(key==='h'){if(G.money<300){notify('Need $300 for Trippy!',2000);return;}addMoney(-300);G.drug={type:'trippy',timer:40000,maxTimer:40000};document.getElementById('drug-bar').style.display='block';document.getElementById('drug-label').textContent='TRIPPIN OUT';sound('drug');notify('TRIPPY DRUG - Reality is melting...',3000);}
  } else if(loc.type==='gunshop'){
    if(key==='f'){if(G.money<300){notify('Need $300 for Pistol!',2000);return;}addMoney(-300);G.player.ammo.pistol+=30;if(G.player.weapon==='fists')G.player.weapon='pistol';sound('cash');notify('Bought Pistol ammo (+30)!',2500);G.player.updateWeaponHUD();}
    else if(key==='g'){if(G.money<500){notify('Need $500 for Shotgun!',2000);return;}addMoney(-500);G.player.ammo.shotgun+=12;if(G.player.weapon==='fists'||G.player.weapon==='pistol')G.player.weapon='shotgun';sound('cash');notify('Bought Shotgun ammo (+12)!',2500);G.player.updateWeaponHUD();}
    else if(key==='h'){if(G.money<700){notify('Need $700 for Uzi!',2000);return;}addMoney(-700);G.player.ammo.uzi+=80;if(G.player.weapon!=='uzi')G.player.weapon='uzi';sound('cash');notify('Bought Uzi ammo (+80)!',2500);G.player.updateWeaponHUD();}
  } else if(loc.type==='boatdock'){
    if(key==='f'){
      const boat=new Vehicle(loc.x+3*TS,loc.y+1*TS,'boat');boat.angle=0;
      G.entities.push(boat);notify('Boat spawned at dock!',2000);
    }
  } else if(loc.type==='helipad'){
    if(key==='f'){
      const heli=new Vehicle(loc.x+TS,loc.y+TS,'heli');heli.angle=0;
      G.entities.push(heli);notify('Helicopter ready on helipad!',2000);
    }
  } else if(loc.type==='airstrip'){
    if(key==='f'){
      const plane=new Vehicle(loc.x+5*TS,loc.y+TS,'plane');plane.angle=0;
      G.entities.push(plane);notify('Plane ready on runway! Build speed to take off.',2500);
    }
  }
}

// Input handling
const K={},JP={},JR={};
let mouseX=0,mouseY=0,mouseDown=false;
document.addEventListener('keydown',e=>{
  const key=e.key.toLowerCase();
  if(!K[key]){JP[key]=true;setTimeout(()=>JP[key]=false,50);}
  K[key]=true;
  if(key==='r'&&!G.player.alive)G.respawn();
  if(key==='e')tryEnterExit();
  if(key==='f'||key==='g'||key==='h'){
    const loc=getNearbyLoc();
    if(loc)interactLoc(loc,key);
    else if(key==='g'&&G.player.inCar){
      // cycle weapon backward
      const weaps=['fists','pistol','shotgun','uzi'];
      const i=weaps.indexOf(G.player.weapon);G.player.weapon=weaps[(i-1+weaps.length)%weaps.length];
      G.player.updateWeaponHUD();
    }
  }
  if(key==='q'||key==='tab'){e.preventDefault();cycleWeapon();}
  if(key==='r'&&G.player.alive)G.respawn();
});
document.addEventListener('keyup',e=>K[e.key.toLowerCase()]=false);
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mousedown',e=>{mouseDown=true;if(G.player.alive&&!G.player.inCar)G.player.attack();});
canvas.addEventListener('mouseup',e=>mouseDown=false);

function cycleWeapon(){
  const weaps=['fists','pistol','shotgun','uzi'];
  let i=weaps.indexOf(G.player.weapon);
  do{i=(i+1)%weaps.length;}while(i>0&&!G.player.ammo[weaps[i]]);
  G.player.weapon=weaps[i];G.player.updateWeaponHUD();
}
function tryEnterExit(){
  if(G.player.inCar){
    const car=G.player.inCar;
    G.player.inCar=null;car.driver=null;
    G.player.x=car.x+Math.cos(car.angle+Math.PI/2)*20;
    G.player.y=car.y+Math.sin(car.angle+Math.PI/2)*20;
    sound('carenter');
  } else {
    let best=null,bestD=50;
    for(const e of G.entities){
      if(e instanceof Vehicle&&e.alive&&!e.driver){
        const d=dst(G.player,e);if(d<bestD){bestD=d;best=e;}
      }
    }
    if(best){G.player.inCar=best;best.driver=G.player;sound('carenter');}
  }
}

// Update loop
function update(dt){
  if(!G.player.alive)return;
  G.time+=dt;
  G.player.update(dt);
  // Attack via SPACE key
  if(JP[' ']||JP['space'])G.player.attack();
  // Mouse aim
  if(G.player&&!G.player.inCar){
    const cx=G.player.x-G.camera.x,cy=G.player.y-G.camera.y;
    if(mouseDown){G.player.angle=Math.atan2(mouseY-cy,mouseX-cx);G.player.attack();}
    else if(mouseX||mouseY){G.player.angle=Math.atan2(mouseY-cy,mouseX-cx);}
  }
  // Camera follow
  G.camera.x+=(G.player.x-canvas.width/2-G.camera.x)*0.12;
  G.camera.y+=(G.player.y-canvas.height/2-G.camera.y)*0.12;
  G.camera.x=clamp(G.camera.x,0,MW*TS-canvas.width);
  G.camera.y=clamp(G.camera.y,0,MH*TS-canvas.height);
  G.shake=Math.max(0,G.shake-dt);
  // Drug timer
  if(G.drug.type){
    G.drug.timer-=dt;
    const pct=Math.max(0,G.drug.timer/G.drug.maxTimer);
    document.getElementById('drug-fill').style.width=(pct*100)+'%';
    if(G.drug.timer<=0){G.drug={type:null,timer:0,maxTimer:0};document.getElementById('drug-bar').style.display='none';notify('Drug wore off.',1500);}
  }
  // Wanted decay
  if(G.wanted>0){
    G.wantedDecayT+=dt;
    const threshold=10000+(G.wanted*2000);
    if(G.wantedDecayT>threshold){G.wanted--;G.wantedDecayT=0;updateWantedBar();if(G.wanted===0)notify('Wanted level cleared',2000);}
  } else G.wantedDecayT=0;
  // Spawn police
  if(G.wanted>0){
    G.wantedSpawnT-=dt;
    if(G.wantedSpawnT<=0){
      G.wantedSpawnT=R(5000,9000);
      const polCount=G.entities.filter(e=>e instanceof Vehicle&&e.isPol&&e.alive).length;
      const target=G.wanted*2;
      if(polCount<target){
        const a=R(0,Math.PI*2),d=R(350,600);
        const sx=G.player.x+Math.cos(a)*d,sy=G.player.y+Math.sin(a)*d;
        const v=new Vehicle(sx,sy,G.wanted>=4?'polheli':'police');
        v.driver={isPoliceDummy:true}; // non-null, non-player driver
        G.entities.push(v);
      }
      const copCount=G.entities.filter(e=>e instanceof CopOfficer&&e.alive).length;
      if(copCount<G.wanted*2){
        const a2=R(0,Math.PI*2),d2=R(200,400);
        G.entities.push(new CopOfficer(G.player.x+Math.cos(a2)*d2,G.player.y+Math.sin(a2)*d2));
      }
    }
  }
  // Spawn peds
  G.pedSpawnT-=dt;
  if(G.pedSpawnT<=0){
    G.pedSpawnT=R(1500,3000);
    const pedCount=G.entities.filter(e=>e instanceof Ped&&e.alive).length;
    if(pedCount<75){
      const a=R(0,Math.PI*2),d=R(250,500);
      const sx=G.player.x+Math.cos(a)*d,sy=G.player.y+Math.sin(a)*d;
      if(walkable(sx,sy)&&!onWater(sx,sy))G.entities.push(new Ped(sx,sy));
    }
  }
  // Spawn NPC cars
  G.carSpawnT-=dt;
  if(G.carSpawnT<=0){
    G.carSpawnT=R(2000,4000);
    const carCount=G.entities.filter(e=>e instanceof Vehicle&&e.isNpc&&!e.isPol&&e.alive).length;
    if(carCount<40){
      const rp=randRoad();
      const types=['car','car','car','van','van','truck','bike','bike'];
      const vtype=types[RI(0,types.length-1)];
      const v=new Vehicle(rp.x,rp.y,vtype);
      v.isNpc=true;v.driver=v;v.npcTarget=randRoad();
      G.entities.push(v);
    }
  }
  // Update all entities
  for(const e of G.entities){if(e.alive)e.update(dt);}
  for(const p of G.particles){if(p.alive)p.update(dt);}
  // Cleanup
  G.cleanT-=dt;
  if(G.cleanT<=0){
    G.cleanT=4000;
    G.entities=G.entities.filter(e=>e.alive);
    G.particles=G.particles.filter(p=>p.alive);
  }
  // Score
  document.getElementById('score-info').textContent='Score: '+(G.money+G.kills*500)+' | Kills: '+G.kills;
  // Location hint
  const loc=getNearbyLoc();
  if(loc)showLocHint(loc.label);else hideLocHint();
}

// ── Human drawing ──────────────────────────────────────────────
// 10-frame walk cycle animation for all humanoids
// In local space: entity faces +x, +y=left, -y=right
function drawHuman(x,y,angle,walkFrame,app,isRunning,hasWeapon,label){
  const fr=WALK_CYCLE[walkFrame%10];
  const [lla,rla,laa,raa]=fr;
  const legLen=7,armLen=5.5;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(2,1,9,6,0,0,Math.PI*2);ctx.fill();
  // Legs (behind body)
  ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle=app.pants;
  // Left leg from hip at (0,-3)
  const llx=Math.cos(lla+Math.PI)*legLen,lly=-3+Math.sin(lla)*legLen*0.6;
  ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(llx,lly);ctx.stroke();
  // Right leg from hip at (0,+3)
  const rlx=Math.cos(rla+Math.PI)*legLen,rly=3+Math.sin(rla)*legLen*0.6;
  ctx.beginPath();ctx.moveTo(0,3);ctx.lineTo(rlx,rly);ctx.stroke();
  // Shoes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(llx,lly,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rlx,rly,2.2,0,Math.PI*2);ctx.fill();
  // Torso
  ctx.fillStyle=app.shirt;
  ctx.beginPath();ctx.ellipse(0,0,7,4.5,0,0,Math.PI*2);ctx.fill();
  // Torso highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.ellipse(-1,-1.5,4,2.5,0,0,Math.PI*2);ctx.fill();
  // Arms
  ctx.lineWidth=2.5;ctx.strokeStyle=app.shirt;
  const lax=-2+Math.cos(laa+Math.PI)*armLen*0.7,lay=-4.5+Math.sin(laa)*armLen;
  ctx.beginPath();ctx.moveTo(-1,-4.5);ctx.lineTo(lax,lay);ctx.stroke();
  const rax=-2+Math.cos(raa+Math.PI)*armLen*0.7,ray=4.5+Math.sin(raa)*armLen;
  ctx.beginPath();ctx.moveTo(-1,4.5);ctx.lineTo(rax,ray);ctx.stroke();
  // Hands
  ctx.fillStyle=app.skin;
  ctx.beginPath();ctx.arc(lax,lay,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rax,ray,2,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle=app.skin;
  ctx.beginPath();ctx.arc(6,0,4.5,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle=app.hair;
  ctx.beginPath();ctx.arc(6,-0.5,3.5,-Math.PI*0.85,Math.PI*0.15);ctx.fill();
  // Eyes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(7.8,-1.5,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7.8,1.5,1,0,Math.PI*2);ctx.fill();
  // Weapon
  if(hasWeapon&&hasWeapon!=='fists'){
    ctx.fillStyle='#2D3748';
    ctx.fillRect(1,-1.5,hasWeapon==='shotgun'?13:10,3);
    if(hasWeapon==='shotgun')ctx.fillRect(7,-3,6,2);
  }
  ctx.restore();
  // Name label above head
  if(label){
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 9px Courier New';ctx.textAlign='center';
    ctx.fillText(label,x,y-16);
  }
}

function drawPlayer(){
  const p=G.player;
  const app=p.appearance;
  // Drug trippy: randomize colors
  const drawApp=G.drug.type==='trippy'?{...app,shirt:'hsl('+(G.time*0.3%360)+',100%,50%)',pants:'hsl('+(G.time*0.2%360+120)+',100%,40%)'}:app;
  drawHuman(p.x,p.y,p.angle,p.walkFrame,drawApp,p.running,p.weapon,'YOU');
  // Punch flash
  if(p.punchT>0){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);
    ctx.fillStyle='rgba(255,150,50,0.8)';
    ctx.beginPath();ctx.arc(22,0,7,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawPed(ped){
  const app=G.drug.type==='trippy'?{...ped.appearance,shirt:'hsl('+(ped.x*0.5%360)+',100%,50%)',pants:'hsl('+(ped.y*0.4%360)+',80%,35%)'}:ped.appearance;
  ctx.save();ctx.translate(ped.x,ped.y);
  if(ped.fleeing){
    // Fleeing: arms up
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(1,1,9,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=app.pants;ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle=app.pants;
    ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(-5,-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,3);ctx.lineTo(-5,5);ctx.stroke();
    ctx.fillStyle=app.shirt;ctx.beginPath();ctx.ellipse(0,0,7,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=app.shirt;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(-1,-4.5);ctx.lineTo(-5,-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-1,4.5);ctx.lineTo(-5,10);ctx.stroke();
    ctx.fillStyle=app.skin;ctx.beginPath();ctx.arc(6,0,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=app.hair;ctx.beginPath();ctx.arc(6,-0.5,3.5,-Math.PI*0.85,Math.PI*0.15);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText('!',0,-18);
  } else {
    ctx.rotate(ped.angle);
    ctx.restore();
    drawHuman(ped.x,ped.y,ped.angle,ped.walkFrame,app,!ped.idle,null,null);
    return;
  }
  ctx.restore();
}

function drawCop(cop){
  drawHuman(cop.x,cop.y,cop.angle,cop.walkFrame,cop.appearance,true,'pistol','COP');
  // Badge flash
  ctx.save();ctx.translate(cop.x,cop.y);ctx.rotate(cop.angle);
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(2,0,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Vehicle rendering
function drawCar(car){
  ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle);
  const w=car.w,h=car.h,vt=car.vtype;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-w/2+3,-h/2+3,w,h);
  // Body
  ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-w/2,-h/2,w,h/3);

  if(vt==='bike'){
    // Motorbike
    ctx.fillStyle='#111';ctx.fillRect(-w/2+1,-3,4,6);ctx.fillRect(w/2-5,-3,4,6);
    ctx.strokeStyle='rgba(180,200,255,0.7)';ctx.lineWidth=1.5;
    ctx.strokeRect(-w/2+5,-h/2+1,w-10,h-2);
    // Handlebars
    ctx.strokeStyle=car.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-w/3,-h/2-2);ctx.lineTo(w/3,-h/2-2);ctx.stroke();
  } else if(vt==='truck'){
    // Cab + trailer
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-w/2+2,-h/2+2,14,h-4);// cab window
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-w/2+18,-h/2,w-20,h);// trailer
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(-w/2+18,-h/2,w-20,h);
    // Tires (6 for truck)
    ctx.fillStyle='#111';
    [[-w/2+2,-h/2-2],[-w/2+2,h/2-3],[0,-h/2-2],[0,h/2-3],[w/2-8,-h/2-2],[w/2-8,h/2-3]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,6,5);});
  } else if(vt==='heli'||vt==='polheli'){
    // Helicopter body
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(170,220,255,0.6)';
    ctx.beginPath();ctx.ellipse(w*0.2,0,w*0.2,h*0.35,0,0,Math.PI*2);ctx.fill();
    // Tail boom
    ctx.fillStyle=car.col;ctx.fillRect(w/4,-h*0.08,w/2,h*0.16);
    // Main rotor
    ctx.save();ctx.rotate(car.rotorA);
    ctx.strokeStyle='rgba(180,180,180,0.85)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-w*0.7,0);ctx.lineTo(w*0.7,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-w*0.5);ctx.lineTo(0,w*0.5);ctx.stroke();
    ctx.restore();
    // Tail rotor
    ctx.save();ctx.translate(w*0.72,0);ctx.rotate(car.rotorA*2);
    ctx.strokeStyle='rgba(180,180,180,0.8)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-h*0.5);ctx.lineTo(0,h*0.5);ctx.stroke();
    ctx.restore();
    // Police markings on polheli
    if(car.isPol){
      const fl=G.time%300<150;
      ctx.fillStyle=fl?'#0066ff':'#ff2200';ctx.fillRect(-5,-h/2-4,4,3);
      ctx.fillStyle=fl?'#ff2200':'#0066ff';ctx.fillRect(2,-h/2-4,4,3);
    }
  } else if(vt==='plane'){
    // Fuselage
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);ctx.fill();
    // Wings
    ctx.fillStyle=car.col;ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.moveTo(-w*0.1,-h);ctx.lineTo(w*0.1,-h);ctx.lineTo(w*0.15,h);ctx.lineTo(-w*0.15,h);ctx.fill();
    ctx.globalAlpha=1;
    // Tail fins
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.moveTo(w*0.35,-h*0.6);ctx.lineTo(w*0.5,-h*0.6);ctx.lineTo(w*0.45,h*0.6);ctx.lineTo(w*0.3,h*0.6);ctx.fill();
    // Windows
    ctx.fillStyle='rgba(170,220,255,0.7)';ctx.fillRect(-w*0.25,-h*0.35,w*0.2,h*0.7);
    // Engines under wings
    ctx.fillStyle='#555';ctx.fillRect(-w*0.05,-h*0.7,w*0.1,h*0.25);ctx.fillRect(-w*0.05,h*0.45,w*0.1,h*0.25);
    // Jet exhaust glow
    if(Math.abs(car.spd)>2){ctx.fillStyle='rgba(255,180,60,0.6)';ctx.beginPath();ctx.ellipse(w*0.45,0,6,3,0,0,Math.PI*2);ctx.fill();}
  } else if(vt==='boat'){
    // Hull
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.moveTo(-w/2,0);ctx.lineTo(-w/3,-h/2);ctx.lineTo(w/3,-h/2);ctx.lineTo(w/2,0);ctx.lineTo(w/3,h/2);ctx.lineTo(-w/3,h/2);ctx.closePath();ctx.fill();
    // Deck
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-w/4,-h/3,w/2,h*0.66);
    // Windshield
    ctx.fillStyle='rgba(170,220,255,0.6)';ctx.fillRect(-w/3,-h/3,w*0.35,h*0.45);
    // Wake particles
    if(Math.abs(car.spd)>0.5&&Math.random()<0.3){
      G.particles.push(new Particle(car.x-Math.cos(car.angle)*20,car.y-Math.sin(car.angle)*20,R(-0.5,0.5),R(-0.5,0.5),'rgba(255,255,255,0.7)',R(300,600),R(2,5)));
    }
  } else {
    // Standard car/van
    const ww=vt==='van'?w-2:w*0.4;
    ctx.fillStyle='rgba(170,220,255,0.65)';ctx.fillRect(-w/2+4,-h/2+2,ww,h-4);
    ctx.fillStyle='rgba(170,220,255,0.5)';ctx.fillRect(w/2-10,-h/2+2,7,h-4);
    // Tires
    ctx.fillStyle='#111';
    [[-w/2+2,-h/2-2],[w/2-7,-h/2-2],[-w/2+2,h/2-3],[w/2-7,h/2-3]].forEach(([tx,ty])=>{
      ctx.fillRect(tx,ty,5,5);ctx.fillStyle='#333';ctx.fillRect(tx+1,ty+1,3,3);ctx.fillStyle='#111';
    });
  }
  // Police lights
  if(car.isPol&&vt!=='heli'&&vt!=='polheli'){
    const fl=G.time%300<150;
    ctx.fillStyle=fl?'#0066ff':'#ff2200';ctx.fillRect(-6,-h/2-3,5,4);
    ctx.fillStyle=fl?'#ff2200':'#0066ff';ctx.fillRect(2,-h/2-3,5,4);
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.strokeRect(-w/2,-h/2,w,h);
    ctx.fillStyle='#fff';for(let i=-6;i<=6;i+=4)ctx.fillRect(i,-1,2,2);
  }
  // Headlights
  if(Math.abs(car.spd)>0.2&&vt!=='heli'&&vt!=='plane'){
    ctx.fillStyle='#ffffaa';ctx.fillRect(-w/2,-h/2+2,3,3);ctx.fillRect(-w/2,h/2-5,3,3);
    ctx.fillStyle='#ff3333';ctx.fillRect(w/2-2,-h/2+2,2,3);ctx.fillRect(w/2-2,h/2-5,2,3);
  }
  // Smoke
  if(car.smokeDmg>60){
    const sa=Math.min(0.6,(car.smokeDmg-60)/90)*((Math.sin(G.time*0.01)+1)*0.3+0.4);
    ctx.fillStyle='rgba(80,80,80,'+sa.toFixed(2)+')';ctx.beginPath();ctx.arc(w/3,0,9,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // HP bar
  if(car.smokeDmg>0){
    const pct=car.hp/car.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(car.x-24,car.y-car.h/2-10,48,5);
    ctx.fillStyle=pct>0.5?'#38A169':'#E53E3E';ctx.fillRect(car.x-24,car.y-car.h/2-10,48*pct,5);
  }
  // Vehicle label
  if(car.driver===G.player||car===G.player?.inCar){
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px Courier New';ctx.textAlign='center';
    ctx.fillText(car.name,car.x,car.y-car.h/2-15);
  }
}

function drawBullet(b){
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,200,0,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-Math.cos(b.angle)*14,b.y-Math.sin(b.angle)*14);ctx.stroke();
}

function drawPickup(p){
  const bob=Math.sin(p.bobT)*3;
  ctx.save();ctx.translate(p.x,p.y+bob);
  const col=p.type==='money'?'rgba(0,255,80,0.3)':p.type==='health'?'rgba(255,50,50,0.3)':p.type==='armor'?'rgba(100,200,255,0.3)':'rgba(255,165,0,0.3)';
  const gr=ctx.createRadialGradient(0,0,0,0,0,18);gr.addColorStop(0,col);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
  ctx.font='14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  const icons={money:'💰',health:'❤️',armor:'🛡️',pistol:'🔫',shotgun:'💥',uzi:'🔫'};
  ctx.fillText(icons[p.type]||'?',0,0);
  ctx.restore();
}

// Tile drawing
function drawTiles(){
  const x0=Math.max(0,G.camera.x/TS|0),x1=Math.min(MW,((G.camera.x+canvas.width)/TS|0)+2);
  const y0=Math.max(0,G.camera.y/TS|0),y1=Math.min(MH,((G.camera.y+canvas.height)/TS|0)+2);
  const tt=G.time*0.001,drugT=G.drug.type==='trippy';
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const t=map[y][x],px=x*TS,py=y*TS;
      if(t===T_GRASS){
        ctx.fillStyle=drugT?'hsl('+(((x+y)*2+tt*30)%360)+',70%,35%)':'#3d6b32';
        ctx.fillRect(px,py,TS,TS);
      } else if(t===T_ROAD){
        ctx.fillStyle=drugT?'hsl('+(tt*20%360)+',30%,20%)':'#2e2e2e';ctx.fillRect(px,py,TS,TS);
        const cx2=x%CELL,cy2=y%CELL;
        if((cx2===1&&cy2>=1&&cy2<=2)||(cx2===2&&cy2>=1&&cy2<=2))ctx.fillStyle=drugT?'hsl('+(tt*25%360)+',20%,25%)':'#3a3a3a',ctx.fillRect(px,py,TS,TS);
        if(((cx2===1||cx2===2)&&cy2>=1&&cy2<=2&&x%2===0)||((cy2===1||cy2===2)&&cx2>=1&&cx2<=2&&y%2===0)){
          ctx.strokeStyle=drugT?'rgba(255,0,255,0.8)':'rgba(255,220,0,0.6)';ctx.lineWidth=1;
          ctx.setLineDash([6,6]);ctx.beginPath();
          if(cx2===1||cx2===2){ctx.moveTo(px+TS/2,py);ctx.lineTo(px+TS/2,py+TS);}
          else{ctx.moveTo(px,py+TS/2);ctx.lineTo(px+TS,py+TS/2);}
          ctx.stroke();ctx.setLineDash([]);
        }
      } else if(t===T_SW){
        ctx.fillStyle=drugT?'hsl('+((x*y%60+tt*10)%360)+',40%,45%)':'#7a7570';ctx.fillRect(px,py,TS,TS);
        ctx.fillStyle=drugT?'rgba(255,255,0,0.2)':'#6e6a65';
        ctx.fillRect(px,py,TS/2,TS/2);ctx.fillRect(px+TS/2,py+TS/2,TS/2,TS/2);
      } else if(t===T_BUILD){
        ctx.fillStyle='#1a1a1a';ctx.fillRect(px,py,TS,TS);
      } else if(t===T_WATER){
        const hue=drugT?(tt*50)%360:210+Math.sin(x*0.3+tt)*5;
        ctx.fillStyle='hsl('+hue+',60%,'+(22+Math.sin(y*0.4+tt)*4)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%3===0){ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(px+4,py+TS/2,TS-8,2);}
      } else if(t===T_PARK){
        ctx.fillStyle=drugT?'hsl('+((x*3+y*2+tt*40)%360)+',80%,40%)':'hsl(120,'+(35+(x%5)*2)+'%,'+(27+(y%4)*2)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%5===0){ctx.fillStyle=drugT?'hsl('+((tt*60)%360)+',100%,50%)':'#2a5a20';ctx.beginPath();ctx.arc(px+TS/2,py+TS/2,6,0,Math.PI*2);ctx.fill();}
      } else if(t===T_PARK2){
        ctx.fillStyle=drugT?'hsl('+((x+y+tt*20)%360)+',30%,30%)':'#404040';ctx.fillRect(px,py,TS,TS);
        if(x%4===0){ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+TS,py);ctx.lineTo(px+TS,py+TS);ctx.stroke();}
      } else if(t===T_BEACH){
        const bh=drugT?(tt*45+x)%360:42;
        ctx.fillStyle=drugT?'hsl('+bh+',90%,60%)':'#C8A96E';ctx.fillRect(px,py,TS,TS);
        if((x*3+y*2)%7===0){ctx.fillStyle=drugT?'rgba(255,0,100,0.4)':'rgba(200,180,100,0.5)';ctx.fillRect(px+R(2,10)|0,py+R(2,10)|0,4,4);}
      } else if(t===T_OCEAN){
        const oh=drugT?(tt*80+x*2)%360:210+Math.sin(x*0.2+tt*1.5)*8;
        ctx.fillStyle='hsl('+oh+',70%,'+(28+Math.sin(y*0.3+tt*2)*5)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%4===0){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(px+2,py+TS*0.4|0,TS-4,3);}
        if((x+y)%7===0&&Math.sin(tt*2+x)<0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(px+TS/2,py+TS/2,4,0,Math.PI*2);ctx.fill();}
      } else if(t===T_RUNWAY){
        ctx.fillStyle=drugT?'hsl('+((x+tt*10)%360)+',30%,50%)':'#555';ctx.fillRect(px,py,TS,TS);
        // Runway markings
        if(x%4===0){ctx.fillStyle=drugT?'rgba(255,255,0,0.8)':'#fff';ctx.fillRect(px+TS/2-1,py,2,TS);}
        if(y%4===0){ctx.fillStyle=drugT?'rgba(255,255,0,0.8)':'#fff';ctx.fillRect(px,py+TS/2-1,TS,2);}
      }
    }
  }
}

function drawBldgs(){
  const tt=G.time*0.001,drugT=G.drug.type==='trippy';
  for(const b of bldgs){
    if(b.x-G.camera.x>canvas.width+20||b.x+b.w-G.camera.x<-20)continue;
    if(b.y-G.camera.y>canvas.height+20||b.y+b.h-G.camera.y<-20)continue;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(b.x+5,b.y+5,b.w,b.h);
    // Wall
    let wc=b.wall;
    if(drugT)wc='hsl('+((b.x*0.1+tt*20)%360)+',80%,45%)';
    else if(b.special==='garage')wc='#276749';
    else if(b.special==='club'){const beat=Math.sin(tt*4)>0;wc=beat?'#44337A':'#553C8B';}
    else if(b.special==='drugden')wc='#1A202C';
    else if(b.special==='gunshop')wc='#744210';
    ctx.fillStyle=wc;ctx.fillRect(b.x,b.y,b.w,b.h);
    let rc=b.roof;
    if(drugT)rc='hsl('+((b.y*0.1+tt*15)%360)+',60%,30%)';
    ctx.fillStyle=rc;ctx.fillRect(b.x+4,b.y+4,b.w-8,b.h-8);
    // Windows
    for(let i=0;i<b.wsX.length;i++){
      if(b.wsX[i]<b.x+2||b.wsX[i]+b.sz>b.x+b.w-2)continue;
      if(b.wsY[i]<b.y+2||b.wsY[i]+b.sz>b.y+b.h-2)continue;
      const lit=b.winW[i]^((G.time/5000|0)+(i%7===0)?1:0);
      if(drugT)ctx.fillStyle='hsl('+((b.wsX[i]*0.3+tt*30)%360)+',100%,60%)';
      else if(b.special==='club')ctx.fillStyle=Math.sin(tt*6+i)>0?'rgba(255,100,200,0.9)':'rgba(100,50,255,0.9)';
      else ctx.fillStyle=lit?'rgba(255,240,160,0.85)':'rgba(0,10,40,0.8)';
      ctx.fillRect(b.wsX[i],b.wsY[i],b.sz,b.sz);
    }
    // Floor lines
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
    const flH=b.h/(b.floors||2);
    for(let f=1;f<(b.floors||2);f++){ctx.beginPath();ctx.moveTo(b.x,b.y+f*flH);ctx.lineTo(b.x+b.w,b.y+f*flH);ctx.stroke();}
    // Special labels
    if(b.special){
      const labels={garage:'🔧 GARAGE',club:'🎵 NEON CLUB',drugden:'💊 DRUG DEN',gunshop:'🔫 AMMU-NATION',airport:'✈️ AIRPORT',hangar:'🚁 HANGAR'};
      const lbl=labels[b.special];
      if(lbl&&b.x-G.camera.x>-100&&b.x-G.camera.x<canvas.width+100){
        ctx.font='bold 11px Courier New';ctx.textAlign='center';
        ctx.fillStyle=b.special==='garage'?'#00FF41':b.special==='club'?'#FC8181':b.special==='drugden'?'#e040fb':b.special==='gunshop'?'#F6AD55':'#FFD700';
        ctx.fillText(lbl,b.x+b.w/2,b.y+b.h/2);
      }
    }
  }
}

// Main render + minimap
function render(){
  const drugT=G.drug.type==='trippy';
  const drugPow=drugT?Math.min(1,G.drug.timer/G.drug.maxTimer):0;
  const tt=G.time*0.001;

  // Trippy trail effect (don't fully clear)
  if(drugT){
    ctx.fillStyle='rgba(0,0,0,'+(0.25+drugPow*0.2)+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  // Camera shake
  const sx=G.shake>0?R(-3,3):0,sy=G.shake>0?R(-3,3):0;

  // Trippy: wave distortion
  if(drugT){
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(Math.sin(tt*0.4)*0.015*drugPow);
    const zoom=1+Math.sin(tt*0.7)*0.03*drugPow;
    ctx.scale(zoom,zoom);
    ctx.translate(-canvas.width/2,-canvas.height/2);
  }

  ctx.save();
  ctx.translate(-Math.floor(G.camera.x)+sx,-Math.floor(G.camera.y)+sy);
  drawTiles();
  drawBldgs();

  // Draw helipad marker
  ctx.fillStyle='rgba(255,220,0,0.5)';ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(116*TS,39*TS,24,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FFD700';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('H',116*TS,39*TS+5);

  // Particles
  for(const p of G.particles){
    if(!p.alive)continue;
    const a=clamp(p.life/p.maxL,0,1);
    ctx.globalAlpha=a;
    ctx.fillStyle=drugT?'hsl('+((p.x*0.5+tt*50)%360)+',100%,60%)':p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Sort & draw entities
  const vis=G.entities.filter(e=>{
    if(!e.alive)return false;
    const sx2=e.x-G.camera.x,sy2=e.y-G.camera.y;
    return sx2>-100&&sx2<canvas.width+100&&sy2>-100&&sy2<canvas.height+100;
  }).sort((a,b)=>a.y-b.y);

  for(const e of vis){
    if(e instanceof Vehicle)drawCar(e);
    else if(e instanceof Bullet)drawBullet(e);
    else if(e instanceof Pickup)drawPickup(e);
    else if(e instanceof Ped)drawPed(e);
    else if(e instanceof CopOfficer)drawCop(e);
  }
  if(G.player.alive&&!G.player.inCar)drawPlayer();

  ctx.restore();
  if(drugT)ctx.restore();

  // Hit vignette
  if(G.player.hitFlash>0){
    ctx.fillStyle='rgba(255,0,0,'+Math.min(0.3,G.player.hitFlash/1200)+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Trippy overlay effects
  if(drugT&&drugPow>0.1){
    // Rainbow shimmer
    const g2=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g2.addColorStop(0,'hsla('+((tt*30)%360)+',100%,50%,'+drugPow*0.12+')');
    g2.addColorStop(0.5,'hsla('+((tt*30+120)%360)+',100%,50%,'+drugPow*0.12+')');
    g2.addColorStop(1,'hsla('+((tt*30+240)%360)+',100%,50%,'+drugPow*0.12+')');
    ctx.fillStyle=g2;ctx.fillRect(0,0,canvas.width,canvas.height);
    // Pulse flash
    if(Math.sin(tt*6)>0.85){ctx.fillStyle='rgba(255,255,255,'+(0.05*drugPow)+')';ctx.fillRect(0,0,canvas.width,canvas.height);}
    // Edge glow
    const eg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*0.3,canvas.width/2,canvas.height/2,canvas.width*0.8);
    eg.addColorStop(0,'transparent');eg.addColorStop(1,'hsla('+((tt*60)%360)+',100%,30%,'+drugPow*0.4+')');
    ctx.fillStyle=eg;ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  drawMinimap();
}

function drawMinimap(){
  const sz=160;mmx.fillStyle='rgba(10,12,10,0.92)';mmx.fillRect(0,0,sz,sz);
  const sc=sz/(MW*TS);
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){
    const t=map[y][x];
    mmx.fillStyle=t===T_ROAD?'#555':t===T_BUILD?'#2a2a2a':t===T_WATER||t===T_OCEAN?'#1a4080':t===T_BEACH?'#8B7340':t===T_RUNWAY?'#666':t===T_PARK?'#1a4a15':'#2a3a22';
    mmx.fillRect(x*TS*sc,y*TS*sc,2,2);
  }
  // Special locs on minimap
  for(const loc of SPECIAL_LOCS){
    const col={garage:'#00FF41',nightclub:'#FC8181',drugden:'#e040fb',gunshop:'#F6AD55',boatdock:'#3182CE',helipad:'#FFD700',airstrip:'#fff'}[loc.type]||'#aaa';
    mmx.fillStyle=col;mmx.fillRect(loc.x*sc,loc.y*sc,4,4);
  }
  // Vehicles on minimap
  for(const e of G.entities){
    if(!e.alive)continue;
    if(e instanceof Vehicle){mmx.fillStyle=e.isPol?'#4444ff':'#aaa';mmx.fillRect(e.x*sc-1,e.y*sc-1,3,3);}
    else if(e instanceof Pickup){mmx.fillStyle='#FFD700';mmx.fillRect(e.x*sc-1,e.y*sc-1,2,2);}
  }
  mmx.fillStyle='#ff3333';
  mmx.beginPath();mmx.arc(G.player.x*sc,G.player.y*sc,3,0,Math.PI*2);mmx.fill();
  mmx.strokeStyle='rgba(255,255,255,0.25)';mmx.lineWidth=1;
  mmx.strokeRect(G.camera.x*sc,G.camera.y*sc,canvas.width*sc,canvas.height*sc);
}

// Game loop
let lastT=0;
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(G.player.alive)update(dt);
  render();
  requestAnimationFrame(loop);
}

// Initialization
function init(){
  genMap();
  const spawn=roadPts[0]||{x:640,y:640};
  G.player=new Player(spawn.x,spawn.y);
  // Initial vehicles
  const vTypes=['car','car','car','car','van','van','truck','truck','bike','bike'];
  for(let i=0;i<50;i++){
    const rp=randRoad();const vt=vTypes[RI(0,vTypes.length-1)];
    const v=new Vehicle(rp.x+R(-10,10),rp.y+R(-10,10),vt);
    v.angle=R(0,Math.PI*2);G.entities.push(v);
  }
  // NPC-driven cars (35)
  for(let i=0;i<35;i++){
    const rp=randRoad();const vt=vTypes[RI(0,vTypes.length-1)];
    const v=new Vehicle(rp.x,rp.y,vt);v.isNpc=true;v.driver=v;v.npcTarget=randRoad();v.angle=R(0,Math.PI*2);
    G.entities.push(v);
  }
  // Spawn a heli and plane at airport
  G.entities.push(Object.assign(new Vehicle(116*TS,38*TS,'heli'),{angle:0}));
  G.entities.push(Object.assign(new Vehicle(106*TS,11*TS,'plane'),{angle:0}));
  // Spawn boats at beach
  for(let i=0;i<4;i++)G.entities.push(Object.assign(new Vehicle(22*TS+i*6*TS,143*TS,'boat'),{angle:0}));
  // Pedestrians
  for(let i=0;i<70;i++){
    const rp=roadPts[RI(0,roadPts.length-1)];
    G.entities.push(new Ped(rp.x+R(-20,20),rp.y+R(-20,20)));
  }
  // Pickups
  for(let i=0;i<25;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'money',RI(50,250)));}
  for(let i=0;i<20;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'health',25));}
  for(let i=0;i<10;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'pistol',30));}
  for(let i=0;i<5;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'shotgun',8));}
  for(let i=0;i<5;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'uzi',40));}
  for(let i=0;i<4;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x,rp.y,'armor',50));}
  // Camera
  G.camera.x=G.player.x-canvas.width/2;G.camera.y=G.player.y-canvas.height/2;
  G.player.updateHpBar();G.player.updateWeaponHUD();updateWantedBar();
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
init();
</script>
