<script>
'use strict';

const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const mmc=document.getElementById('minimap'),mmx=mmc.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
const TS=32,MW=320,MH=340,CELL=14;
// Zone boundaries (in tiles)
const CITY1_X2=140;  // City 1 (Liberty City) east edge
const CITY2_X1=178;  // City 2 (Vice City) west edge
const RURAL_Y=155;   // Rural area starts here (y tile)
const MIL={x1:126,x2:190,y1:162,y2:228}; // Military base tile bounds
const AP1={x1:100,x2:140,y1:8,y2:50};    // City 1 airport tile bounds
const AP2={x1:278,x2:320,y1:8,y2:50};    // City 2 airport tile bounds
const BEACH_Y=238,OCEAN_Y=270;
const T_GRASS=0,T_ROAD=1,T_SW=2,T_BUILD=3,T_WATER=4,T_PARK=5,T_PARK2=6,T_BEACH=7,T_OCEAN=8,T_RUNWAY=9,T_MIL=10;
const map=[],bldgs=[],roadPts=[],swPts=[],city1RoadPts=[],city2RoadPts=[],SPECIAL_LOCS=[];
// Timed traffic-light controllers for crossroads.
const trafficLights=[];
const TRAFFIC_LIGHT_CYCLE={green:5200,yellow:1200,allRed:500};
const BWALL=['#8B7355','#A0856C','#6B7280','#7C6D5E','#9B8B7A','#C4956A','#A67C52','#8A9BA8','#7B8FA1','#6B5545'];
const BROOF=['#5C4A3E','#4A5568','#2D3748','#553C2E','#3D5A6B','#4A3728','#394556','#5A4A3A','#2C3E50','#4A3320'];
const CAR_COLS=['#E53E3E','#3182CE','#38A169','#D69E2E','#805AD5','#DD6B20','#E2E8F0','#FC8181','#F6AD55','#B7791F'];
const SKIN_TONES=['#FDBCB4','#F1C27D','#E0AC69','#C68642','#8D5524','#FFDAB9','#D2956A'];
const SHIRT_COLS=['#E53E3E','#3182CE','#38A169','#805AD5','#DD6B20','#2D3748','#E2E8F0','#ED64A6','#ECC94B','#00B5D8','#F56500','#1A202C'];
const PANTS_COLS=['#2D3748','#1A365D','#1C4532','#44337A','#742A2A','#234E52','#000','#4A5568','#744210'];
const HAIR_COLS=['#1A202C','#744210','#B7791F','#E53E3E','#805AD5','#F6E05E','#A0AEC0','#276749'];
const SPORTS_COLS=['#FF0044','#FFCC00','#00FFAA','#FF6600','#CC00FF','#00CCFF','#FF3388'];
const VEH_CFG={
  // Handling model notes: higher mxS = faster top speed, lower acc = slower launch,
  // higher fr = more momentum/coast (heavier vehicles take longer to slow down).
  car:    {w:32,h:18,mxS:4.9, acc:0.18,fr:0.935,trn:0.055,hp:200, name:'Car',    cols:CAR_COLS,sell:1200},
  van:    {w:38,h:22,mxS:3.6, acc:0.10,fr:0.955,trn:0.042,hp:320, name:'Van',    cols:['#4A5568','#718096','#E2E8F0','#A0AEC0','#2D3748'],sell:1800},
  truck:  {w:52,h:24,mxS:3.0, acc:0.055,fr:0.972,trn:0.031,hp:600, name:'Truck',  cols:['#744210','#975A16','#B7791F','#C05621','#D69E2E'],sell:3500},
  bike:   {w:20,h:10,mxS:6.6, acc:0.28,fr:0.95,trn:0.10, hp:80,  name:'Bike',   cols:['#E53E3E','#1A202C','#F6AD55','#805AD5','#3182CE'],sell:900},
  heli:   {w:44,h:28,mxS:5.8, acc:0.0, fr:0.965,trn:0.07, hp:300, name:'Heli',   cols:['#2D3748','#4A5568','#718096'],flies:true,sell:18000},
  plane:  {w:64,h:18,mxS:9.8, acc:0.24,fr:0.992,trn:0.025,hp:400, name:'Plane',  cols:['#E2E8F0','#CBD5E0','#A0AEC0'],flies:true,sell:30000},
  boat:   {w:38,h:16,mxS:4.3, acc:0.15,fr:0.94,trn:0.06, hp:180, name:'Boat',   cols:['#2B6CB0','#3182CE','#F6AD55','#DD6B20'],floats:true,sell:5000},
  police: {w:32,h:18,mxS:5.2, acc:0.23,fr:0.935,trn:0.07, hp:280, name:'Police', cols:['#0f2b5a'],isPol:true,sell:0},
  polheli:{w:44,h:28,mxS:6.0, acc:0.21,fr:0.965,trn:0.07, hp:350, name:'PolHeli',cols:['#0f2b5a'],flies:true,isPol:true,sell:0},
  sports: {w:30,h:15,mxS:8.4, acc:0.34,fr:0.965,trn:0.075,hp:140, name:'Sports', cols:SPORTS_COLS,sell:45000},
  muscle: {w:36,h:19,mxS:6.8, acc:0.23,fr:0.955,trn:0.060,hp:220, name:'Muscle', cols:['#CC2200','#332200','#220044','#004422'],sell:25000},
  tank:   {w:56,h:30,mxS:2.0, acc:0.04,fr:0.982,trn:0.021,hp:3000,name:'Tank',   cols:['#4a5a30'],isMil:true,sell:0,hasCannon:true},
  f16:    {w:60,h:16,mxS:14.0,acc:0.42,fr:0.995,trn:0.018,hp:600,name:'F-16',   cols:['#8a9a70'],flies:true,isMil:true,sell:0,hasRockets:true},
  miljeep:{w:34,h:18,mxS:4.4, acc:0.16,fr:0.93,trn:0.058,hp:380, name:'MilJeep',cols:['#4a5a30'],isMil:true,sell:0},
};
const WALK_CYCLE=[];
for(let f=0;f<10;f++){const t=f/10*Math.PI*2;WALK_CYCLE.push([Math.sin(t)*0.55,Math.sin(t+Math.PI)*0.55,Math.sin(t+Math.PI)*0.32,Math.sin(t)*0.32]);}

// Audio
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function sound(type){
  try{const ac=getAudio(),g=ac.createGain(),t=ac.currentTime;g.connect(ac.destination);
  const mk=(freq,type2,dur,gain=0.25,ramp=0.001)=>{const o=ac.createOscillator();o.type=type2;o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(ramp<1?60:ramp,t+dur);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.connect(g);o.start(t);o.stop(t+dur);};
  if(type==='shoot'){mk(300,'sawtooth',0.12,0.25);}
  else if(type==='punch'){mk(120,'square',0.09,0.4);}
  else if(type==='pickup'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(1100,t+0.12);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.connect(g);o.start(t);o.stop(t+0.12);}
  else if(type==='siren'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(700,t);o.frequency.setValueAtTime(500,t+0.25);o.frequency.setValueAtTime(700,t+0.5);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.connect(g);o.start(t);o.stop(t+0.6);}
  else if(type==='carenter'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+0.15);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.connect(g);o.start(t);o.stop(t+0.15);}
  else if(type==='star'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(550,t+0.1);o.frequency.setValueAtTime(660,t+0.2);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(g);o.start(t);o.stop(t+0.35);}
  else if(type==='explode'){const buf=ac.createBuffer(1,ac.sampleRate*0.6,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=350;src.connect(flt);flt.connect(g);g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);src.start(t);src.stop(t+0.6);}
  else if(type==='engine'){const o=ac.createOscillator();o.type='sawtooth';const sp=G&&G.player&&G.player.inCar?Math.abs(G.player.inCar.spd)*40+80:80;o.frequency.setValueAtTime(sp,t);g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.connect(g);o.start(t);o.stop(t+0.08);}
  else if(type==='heli'){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(45,t);o.frequency.setValueAtTime(40,t+0.15);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g);o.start(t);o.stop(t+0.3);}
  else if(type==='drug'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.2);o.frequency.exponentialRampToValueAtTime(200,t+0.4);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);o.start(t);o.stop(t+0.4);}
  else if(type==='cash'){const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(1000,t);o.frequency.setValueAtTime(1200,t+0.05);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);o.start(t);o.stop(t+0.2);}
  else if(type==='repair'){mk(80,'square',0.35,0.2);}
  else if(type==='club'){const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(60,t);g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);o.start(t);o.stop(t+0.2);}
  else if(type==='rocket'){const buf=ac.createBuffer(1,ac.sampleRate*0.5,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length*0.6);const src=ac.createBufferSource();src.buffer=buf;src.connect(g);g.gain.setValueAtTime(0.8,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);src.start(t);src.stop(t+0.5);}
  else if(type==='cannon'){const buf=ac.createBuffer(1,ac.sampleRate*0.9,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length*0.5);const src=ac.createBufferSource();src.buffer=buf;const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=180;src.connect(flt);flt.connect(g);g.gain.setValueAtTime(1.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.9);src.start(t);src.stop(t+0.9);}
  }catch(e){}
}

// Utilities
const R=(a,b)=>Math.random()*(b-a)+a;
const RI=(a,b)=>Math.floor(R(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function tileAt(px,py){const tx=px/TS|0,ty=py/TS|0;if(px<0||py<0||tx>=MW||ty>=MH)return T_OCEAN;return map[ty]?.[tx]??T_OCEAN;}
function drivable(px,py){const t=tileAt(px,py);return t===T_ROAD||t===T_SW||t===T_PARK2||t===T_RUNWAY||t===T_BEACH||t===T_MIL;}
function npcDrivable(px,py){const t=tileAt(px,py);return t===T_ROAD||t===T_PARK2||t===T_RUNWAY||t===T_MIL;}
function walkable(px,py){const t=tileAt(px,py);return t!==T_BUILD&&t!==T_WATER&&t!==T_OCEAN;}
function pedWalkable(px,py){const t=tileAt(px,py);return t===T_SW||t===T_GRASS||t===T_PARK||t===T_PARK2||t===T_BEACH||t===T_MIL;}
function onWater(px,py){const t=tileAt(px,py);return t===T_OCEAN||t===T_WATER;}
function randRoad(){return roadPts[RI(0,roadPts.length-1)]||{x:1200,y:1200};}
function randCity1Road(){return city1RoadPts.length?city1RoadPts[RI(0,city1RoadPts.length-1)]:randRoad();}
function randCity2Road(){return city2RoadPts.length?city2RoadPts[RI(0,city2RoadPts.length-1)]:randRoad();}
function inCity2Zone(){return G.player&&G.player.x>CITY2_X1*TS&&G.player.y<RURAL_Y*TS;}
function inMilBase(){return G.player&&G.player.x>MIL.x1*TS&&G.player.x<MIL.x2*TS&&G.player.y>MIL.y1*TS&&G.player.y<MIL.y2*TS;}
function nrm(x,y){const l=Math.hypot(x,y)||1;return{x:x/l,y:y/l};}
function isCivilianPed(e){return e instanceof Ped||e instanceof BeachPed;}
function trafficLightState(light,timeMs){
  const c=TRAFFIC_LIGHT_CYCLE;
  const cycle=c.green*2+c.yellow*2+c.allRed*2;
  let t=(timeMs+light.offset)%cycle;
  if(t<c.green)return{ns:'go',ew:'stop'};
  t-=c.green;
  if(t<c.yellow)return{ns:'caution',ew:'stop'};
  t-=c.yellow;
  if(t<c.allRed)return{ns:'stop',ew:'stop'};
  t-=c.allRed;
  if(t<c.green)return{ns:'stop',ew:'go'};
  t-=c.green;
  if(t<c.yellow)return{ns:'stop',ew:'caution'};
  return{ns:'stop',ew:'stop'};
}
// Build one signal per 2x2 crossroad block so AI can obey stop/go timing.
function genTrafficLights(){
  trafficLights.length=0;
  for(let y=1;y<MH-2;y++){
    for(let x=1;x<MW-2;x++){
      if(x%CELL!==1||y%CELL!==1)continue;
      const isCross=map[y]?.[x]===T_ROAD&&map[y]?.[x+1]===T_ROAD&&map[y+1]?.[x]===T_ROAD&&map[y+1]?.[x+1]===T_ROAD;
      if(!isCross)continue;
      const cx=(x+1)*TS,cy=(y+1)*TS;
      // Corner-mounted poles + overhanging masts (American-style placement).
      trafficLights.push({
        x:cx,y:cy,tx:x,ty:y,offset:RI(0,4500),
        corners:[
          {x:x*TS+5,y:y*TS+5},
          {x:(x+2)*TS-5,y:y*TS+5},
          {x:x*TS+5,y:(y+2)*TS-5},
          {x:(x+2)*TS-5,y:(y+2)*TS-5},
        ]
      });
    }
  }
}
function roadOrientationAt(px,py){
  if(tileAt(px,py)!==T_ROAD)return null;
  const tx=px/TS|0,ty=py/TS|0,cx=tx%CELL,cy=ty%CELL;
  const v=(cx===1||cx===2),h=(cy===1||cy===2);
  if(v&&h)return 'intersection';
  if(v)return 'vertical';
  if(h)return 'horizontal';
  return null;
}
function nearestRoadPoint(px,py,samples=36){
  if(!roadPts.length)return{x:px,y:py,d:0};
  let best=roadPts[RI(0,roadPts.length-1)],bestD=Math.hypot(best.x-px,best.y-py);
  for(let i=0;i<samples;i++){
    const rp=roadPts[RI(0,roadPts.length-1)];
    const d=Math.hypot(rp.x-px,rp.y-py);
    if(d<bestD){best=rp;bestD=d;}
  }
  return{x:best.x,y:best.y,d:bestD};
}
// Keep NPC traffic aligned to lane centers instead of randomly turning into sidewalks.
function npcLaneGuide(v){
  const aheadX=v.x+Math.cos(v.angle)*18,aheadY=v.y+Math.sin(v.angle)*18;
  const orient=roadOrientationAt(v.x,v.y)||roadOrientationAt(aheadX,aheadY);
  if(!orient)return null;
  const motionAxis=Math.abs(Math.cos(v.angle))>=Math.abs(Math.sin(v.angle))?'ew':'ns';
  let axis=motionAxis;
  if(orient==='horizontal')axis='ew';
  else if(orient==='vertical')axis='ns';
  else if(orient==='intersection'){
    if(!v.npcInIntersection){
      const wantTurn=Math.random()<0.24;
      const base=v.npcLaneAxis||motionAxis;
      v.npcLaneAxis=wantTurn?(base==='ew'?'ns':'ew'):base;
    }
    axis=v.npcLaneAxis||motionAxis;
  }
  const tx=v.x/TS|0,ty=v.y/TS|0;
  const dirX=Math.cos(v.angle)>=0?1:-1,dirY=Math.sin(v.angle)>=0?1:-1;
  const look=88;
  const turning=orient==='intersection'&&axis!==motionAxis;
  if(axis==='ew'){
    const laneY=ty*TS+(dirX>0?TS*0.68:TS*0.32);
    return{x:v.x+dirX*look,y:laneY,axis,isIntersection:orient==='intersection',turning};
  }
  const laneX=tx*TS+(dirY>0?TS*0.68:TS*0.32);
  return{x:laneX,y:v.y+dirY*look,axis,isIntersection:orient==='intersection',turning};
}
function npcShouldStopAtLight(v,lane){
  if(!v.isNpc||v.vtype==='bike'||v.floats||v.flies)return null;
  const axis=lane?.axis||(Math.abs(Math.cos(v.angle))>Math.abs(Math.sin(v.angle))?'ew':'ns');
  const dirX=Math.cos(v.angle)>=0?1:-1,dirY=Math.sin(v.angle)>=0?1:-1;
  const laneCoord=axis==='ew'?(lane?.y??v.y):(lane?.x??v.x);
  let best=null,bestDist=1e9,bestState='go';
  for(const light of trafficLights){
    const st=trafficLightState(light,G.time);
    if(axis==='ew'){
      const stopLineX=light.x-dirX*16;
      const along=(stopLineX-v.x)*dirX;
      const lateral=Math.abs(light.y-laneCoord);
      if(along<-6||along>240||lateral>16)continue;
      if(along<bestDist){bestDist=along;best=light;bestState=st.ew;}
    }else{
      const stopLineY=light.y-dirY*16;
      const along=(stopLineY-v.y)*dirY;
      const lateral=Math.abs(light.x-laneCoord);
      if(along<-6||along>240||lateral>16)continue;
      if(along<bestDist){bestDist=along;best=light;bestState=st.ns;}
    }
  }
  if(!best)return null;
  const brakeDecel=Math.max(0.06,v.acc*1.55);
  const speed=Math.abs(v.spd);
  const stopDist=(speed*speed)/(2*brakeDecel)+v.w*0.9+10;
  const closeToLine=bestDist<10;
  const shouldStop=bestState==='stop'||(bestState==='caution'&&!closeToLine&&bestDist>Math.max(16,stopDist*0.55));
  return{shouldStop,dist:bestDist,state:bestState,stopDist};
}

// Map generation
function genMap(){
  for(let y=0;y<MH;y++){
    map[y]=[];
    for(let x=0;x<MW;x++){
      // Ocean at bottom
      if(y>=OCEAN_Y){map[y][x]=T_OCEAN;continue;}
      // Beach strip
      if(y>=BEACH_Y){map[y][x]=T_BEACH;continue;}
      // Airport 1 (City 1, top-right of city 1)
      if(x>=AP1.x1&&x<AP1.x2&&y>=AP1.y1&&y<AP1.y2){map[y][x]=genAirportTile(x,y,AP1,1);continue;}
      // Airport 2 (City 2, top-right of city 2)
      if(x>=AP2.x1&&x<AP2.x2&&y>=AP2.y1&&y<AP2.y2){map[y][x]=genAirportTile(x,y,AP2,2);continue;}
      // Military base
      if(x>=MIL.x1&&x<MIL.x2&&y>=MIL.y1&&y<MIL.y2){map[y][x]=genMilTile(x,y);continue;}
      // Rural area (below both cities but above beach)
      if(y>=RURAL_Y&&y<BEACH_Y){
        // Rural uses same CELL grid but no buildings — just grass, roads, and sidewalks
        const cx=x%CELL,cy=y%CELL;
        if(cx===1||cx===2||cy===1||cy===2)map[y][x]=T_ROAD;
        else if(cx===0||cx===3||cy===0||cy===3)map[y][x]=T_SW;
        else map[y][x]=T_GRASS;
        continue;
      }
      // Highway corridor between cities (no buildings)
      if(x>=CITY1_X2&&x<CITY2_X1&&y<RURAL_Y){
        const cx=x%CELL,cy=y%CELL;
        if(cx===1||cx===2||cy===1||cy===2)map[y][x]=T_ROAD;
        else if(cx===0||cx===3||cy===0||cy===3)map[y][x]=T_SW;
        else map[y][x]=T_GRASS;
        continue;
      }
      // City 1 river (Liberty City)
      if(y>=58&&y<=64&&x<CITY1_X2){map[y][x]=T_WATER;continue;}
      // City 2 river (Vice City)
      if(y>=72&&y<=78&&x>=CITY2_X1){map[y][x]=T_WATER;continue;}
      // Standard city cell grid (city 1 and city 2)
      const cx=x%CELL,cy=y%CELL;
      const bx=Math.floor(x/CELL),by=Math.floor(y/CELL);
      const bs=(bx*7+by*13)%22;
      if(cx===1||cx===2||cy===1||cy===2)map[y][x]=T_ROAD;
      else if(cx===0||cx===3||cy===0||cy===3)map[y][x]=T_SW;
      else if(bs<3)map[y][x]=T_PARK;
      else if(bs<5)map[y][x]=T_PARK2;
      else {
        // Keep a one-tile sidewalk ring around each building lot so entries are approachable
        // and we avoid a blocked dark moat around roofs.
        const inBuildingCore=(cx>=5&&cx<=12&&cy>=5&&cy<=12);
        map[y][x]=inBuildingCore?T_BUILD:T_SW;
      }
    }
  }
  // City 1 river bridges
  for(let y=58;y<=64;y++){
    [15,16,17,18,42,43,44,45,70,71,72,73,98,99,100,101].forEach(bx=>{if(bx<CITY1_X2)map[y][bx]=T_ROAD;});
  }
  // City 2 river bridges
  for(let y=72;y<=78;y++){
    [182,183,184,185,210,211,212,213,238,239,240,241,266,267,268,269,294,295,296,297].forEach(bx=>{if(bx<MW)map[y][bx]=T_ROAD;});
  }
  // Beach road access
  for(let x=0;x<CITY1_X2;x++){const cx=x%CELL;if(cx===1||cx===2){if(BEACH_Y+2<MH)map[BEACH_Y-3][x]=T_ROAD;}}
  for(let x=CITY2_X1;x<MW;x++){const cx=x%CELL;if(cx===1||cx===2){if(BEACH_Y+2<MH)map[BEACH_Y-3][x]=T_ROAD;}}
  // Road points — split into city zones
  for(let y=1;y<MH-1;y++)for(let x=1;x<MW-1;x++){
    if(map[y][x]===T_ROAD){
      const pt={x:x*TS+TS/2,y:y*TS+TS/2};
      roadPts.push(pt);
      if(x<CITY1_X2&&y<RURAL_Y)city1RoadPts.push(pt);
      if(x>=CITY2_X1&&y<RURAL_Y)city2RoadPts.push(pt);
    }
    if(map[y][x]===T_SW)swPts.push({x:x*TS+TS/2,y:y*TS+TS/2});
  }
  // City 1 buildings
  for(let by2=0;by2<Math.floor(RURAL_Y/CELL);by2++){
    for(let bx2=0;bx2<Math.floor(CITY1_X2/CELL);bx2++){
      const tX=bx2*CELL+4,tY=by2*CELL+4;
      if(tX>=AP1.x1&&tY<AP1.y2)continue;
      const bs=(bx2*7+by2*13)%22;
      if(bs>=5)genBuilding(tX,tY,10,10,bx2,by2,false);
    }
  }
  // City 2 buildings (vice city style)
  for(let by2=0;by2<Math.floor(RURAL_Y/CELL);by2++){
    for(let bx2=Math.ceil(CITY2_X1/CELL);bx2<Math.floor(MW/CELL);bx2++){
      const tX=bx2*CELL+4,tY=by2*CELL+4;
      if(tX>=AP2.x1&&tY<AP2.y2)continue;
      const bs=(bx2*7+by2*13)%22;
      if(bs>=5)genBuilding(tX,tY,10,10,bx2,by2,true);
    }
  }
  // City 1 airport terminal & hangars
  bldgs.push({x:110*TS,y:20*TS,w:18*TS,h:12*TS,wall:'#4A5568',roof:'#2D3748',floors:2,wsX:[],wsY:[],winW:[],sz:4,special:'airport'});
  for(let wx=110*TS+10;wx<128*TS-10;wx+=12)for(let wy=20*TS+10;wy<32*TS-10;wy+=12){const b=bldgs[bldgs.length-1];b.wsX.push(wx);b.wsY.push(wy);b.winW.push(Math.random()>0.3);}
  for(let i=0;i<3;i++)bldgs.push({x:(130+i*8)*TS,y:18*TS,w:7*TS,h:10*TS,wall:'#718096',roof:'#4A5568',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'hangar'});
  // City 2 airport terminal & hangars
  bldgs.push({x:285*TS,y:20*TS,w:16*TS,h:11*TS,wall:'#E07040',roof:'#B04020',floors:2,wsX:[],wsY:[],winW:[],sz:4,special:'airport2'});
  for(let wx=285*TS+10;wx<301*TS-10;wx+=12)for(let wy=20*TS+10;wy<31*TS-10;wy+=12){const b=bldgs[bldgs.length-1];b.wsX.push(wx);b.wsY.push(wy);b.winW.push(Math.random()>0.3);}
  for(let i=0;i<2;i++)bldgs.push({x:(304+i*8)*TS,y:18*TS,w:7*TS,h:9*TS,wall:'#C08040',roof:'#804020',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'hangar'});
  // Military base structures
  bldgs.push({x:(MIL.x1+4)*TS,y:(MIL.y1+12)*TS,w:12*TS,h:14*TS,wall:'#4a5a30',roof:'#3a4a22',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'milhangar'});
  bldgs.push({x:(MIL.x2-16)*TS,y:(MIL.y1+12)*TS,w:12*TS,h:10*TS,wall:'#4a5a30',roof:'#3a4a22',floors:2,wsX:[],wsY:[],winW:[],sz:4,special:'milbarracks'});
  bldgs.push({x:(MIL.x1+4)*TS,y:(MIL.y2-18)*TS,w:10*TS,h:10*TS,wall:'#4a5a30',roof:'#3a4a22',floors:1,wsX:[],wsY:[],winW:[],sz:4,special:'milstore'});
  genTrafficLights();
  placeSpecialLocs();
}

function genAirportTile(x,y,ap,apId){
  const rx=x-ap.x1, ry=y-ap.y1;
  // Main runway (horizontal)
  if(ry>=2&&ry<=4)return T_RUNWAY;
  if(ry>=ap.y2-ap.y1-5&&ry<=ap.y2-ap.y1-3)return T_RUNWAY;
  // Connecting taxiway (vertical strip)
  if(rx<=3&&ry>=2&&ry<=ap.y2-ap.y1-3)return T_RUNWAY;
  // Apron (parking area)
  return T_PARK2;
}

function genMilTile(x,y){
  const rx=x-MIL.x1, ry=y-MIL.y1;
  const rw=MIL.x2-MIL.x1, rh=MIL.y2-MIL.y1;
  // Perimeter road
  if(rx<=2||rx>=rw-3||ry<=2||ry>=rh-3)return T_ROAD;
  // F-16 runway strip
  if(ry>=4&&ry<=6)return T_RUNWAY;
  // Interior military pavement
  return T_MIL;
}

const BWALL_V=['#8B2355','#A02060','#6B0080','#7C1D6E','#9B0B5A','#C41552','#602080','#8A1090','#701060','#500055'];
const BROOF_V=['#3C0A2E','#2A0538','#1D0748','#350C2E','#2D0A4B','#4A0728','#290956','#3A0A2A','#1C0E40','#3A0320'];

function genBuilding(tx,ty,bw,bh,bx,by,isVice=false){
  const seed=(bx*31+by*37);
  const wallC=isVice?BWALL_V[seed%BWALL_V.length]:BWALL[seed%BWALL.length];
  const roofC=isVice?BROOF_V[seed%BROOF_V.length]:BROOF[seed%BROOF.length];
  const pad=1,floors=2+(seed%6);
  const wx=tx+pad,wy=ty+pad,ww=bw-pad*2,wh=bh-pad*2;
  if(ww<2||wh<2)return;
  const wsX=[],wsY=[],winW=[];
  const sz=5;
  for(let wy2=wy*TS+6;wy2<(wy+wh)*TS-6;wy2+=sz+7)
    for(let wx2=wx*TS+6;wx2<(wx+ww)*TS-6;wx2+=sz+7){wsX.push(wx2);wsY.push(wy2);winW.push(Math.random()>0.3);}
  // Mark vice city buildings
  bldgs.push({x:wx*TS,y:wy*TS,w:ww*TS,h:wh*TS,wall:wallC,roof:roofC,floors,wsX,wsY,winW,sz,isVice});
}

function rectsOverlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function carveDoorApproach(b){
  // Keep sidewalks around/near special buildings so players can line up with entrances reliably.
  const left=((b.x/TS)|0)-1,right=(((b.x+b.w)/TS)|0)+1;
  const top=((b.y/TS)|0)-1,bottom=(((b.y+b.h)/TS)|0)+1;
  for(let ty=top;ty<=bottom;ty++)for(let tx=left;tx<=right;tx++){
    if(tx<0||ty<0||tx>=MW||ty>=MH)continue;
    const onPerimeter=(tx===left||tx===right||ty===top||ty===bottom);
    if(onPerimeter&&map[ty][tx]===T_BUILD)map[ty][tx]=T_SW;
  }
  // Additional apron right at the door trigger position.
  const doorCx=((b.x+b.w/2)/TS)|0;
  const doorTy=((b.y+b.h)/TS)|0;
  for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
    const tx=doorCx+ox,ty=doorTy+oy;
    if(tx>=0&&ty>=0&&tx<MW&&ty<MH&&map[ty][tx]===T_BUILD)map[ty][tx]=T_SW;
  }
}

function addSpecialBuilding(spec){
  // Replace any generated base building that intersects this special building to avoid stacked roofs.
  for(let i=bldgs.length-1;i>=0;i--){
    const existing=bldgs[i];
    if(!existing.special&&rectsOverlap(existing,spec))bldgs.splice(i,1);
  }
  bldgs.push(spec);
  carveDoorApproach(spec);
}

// Entity base
class Entity{constructor(x,y){this.x=x;this.y=y;this.alive=true;this.r=10;}}

// Particle
class Particle extends Entity{
  constructor(x,y,vx,vy,col,life,r){super(x,y);this.vx=vx;this.vy=vy;this.col=col;this.life=life;this.maxL=life;this.r=r||3;}
  update(dt){this.x+=this.vx;this.y+=this.vy;this.vy+=0.04;this.life-=dt;if(this.life<=0)this.alive=false;}
}

// Bullet
class Bullet extends Entity{
  constructor(x,y,angle,dmg,owner){super(x,y);this.angle=angle;this.dmg=dmg;this.owner=owner;this.r=3;this.spd=12;this.life=800;this.vx=Math.cos(angle)*this.spd;this.vy=Math.sin(angle)*this.spd;}
  update(dt){this.x+=this.vx;this.y+=this.vy;this.life-=dt;if(this.life<=0||tileAt(this.x,this.y)===T_BUILD){this.alive=false;return;}
    for(const e of G.entities){
      if(!e.alive||e===this.owner)continue;
      if(e instanceof Vehicle){if(dst(this,e)<(e.w||32)/2){e.hit(this.dmg,this);this.alive=false;return;}}
      else if(isCivilianPed(e)||e instanceof CopOfficer||e instanceof MilSoldier){if(dst(this,e)<e.r+2){e.hit(this.dmg,this);this.alive=false;return;}}
    }
    if(this.owner!==G.player&&dst(this,G.player)<G.player.r+2){G.player.hit(this.dmg,this);this.alive=false;}
  }
}

// Rocket (fired by F-16s and tanks)
class Rocket extends Entity{
  constructor(x,y,angle,owner){
    super(x,y);this.angle=angle;this.owner=owner;this.r=5;
    this.spd=11;this.life=2400;
    this.vx=Math.cos(angle)*this.spd;this.vy=Math.sin(angle)*this.spd;
    this._ex=false;
  }
  update(dt){
    this.x+=this.vx;this.y+=this.vy;this.life-=dt;
    // Exhaust trail
    if(Math.random()<0.7)G.particles.push(new Particle(this.x-this.vx*2,this.y-this.vy*2,R(-0.4,0.4),R(-0.4,0.4),'rgba(255,160,30,0.9)',180,R(3,6)));
    if(Math.random()<0.4)G.particles.push(new Particle(this.x,this.y,R(-0.3,0.3),R(-0.3,0.3),'#888',280,R(2,5)));
    const t=tileAt(this.x,this.y);
    if(this.life<=0||t===T_BUILD||t===T_MIL){this.explode();return;}
    for(const e of G.entities){
      if(!e.alive||e===this.owner)continue;
      if(e instanceof Vehicle&&dst(this,e)<(e.w||32)/2+14){this.explode();return;}
      if((isCivilianPed(e)||e instanceof CopOfficer||e instanceof MilSoldier)&&dst(this,e)<24){this.explode();return;}
    }
    if(this.owner!==G.player&&dst(this,G.player)<24&&!G.player.inCar){this.explode();}
    if(this.owner!==G.player&&G.player.inCar&&dst(this,G.player.inCar)<(G.player.inCar.w||32)/2+14){this.explode();}
  }
  explode(){
    if(this._ex)return;this._ex=true;
    addExplosion(this.x,this.y);G.shake=600;sound('rocket');
    for(const e of G.entities){
      if(!e.alive)continue;
      const d=dst(this,e);
      if(d<140){
        if(e instanceof Vehicle)e.hit(200,this);
        else if(isCivilianPed(e)||e instanceof CopOfficer||e instanceof MilSoldier){if(e.hit)e.hit(120,this);}
      }
    }
    if(dst(this,G.player)<140&&!G.player.inCar)G.player.hit(100,this);
    if(G.player.inCar&&dst(this,G.player.inCar)<140)G.player.inCar.hit(200,this);
    this.alive=false;
  }
}

// Pickup
class Pickup extends Entity{
  constructor(x,y,type,val){super(x,y);this.type=type;this.val=val;this.r=10;this.bobT=R(0,Math.PI*2);}
  update(dt){this.bobT+=dt*0.002;if(dst(this,G.player)<18){this.collect();}}
  collect(){
    sound('pickup');
    if(this.type==='money'){addMoney(this.val);notify('+$'+this.val);}
    else if(this.type==='health'){G.player.hp=Math.min(G.player.maxHp,G.player.hp+this.val);G.player.updateHpBar();}
    else if(this.type==='armor'){G.player.maxHp=Math.min(180,G.player.maxHp+50);G.player.hp=Math.min(G.player.maxHp,G.player.hp+50);notify('Armor +50',1500);}
    else if(['pistol','shotgun','uzi'].includes(this.type)){
      G.player.ammo[this.type]=(G.player.ammo[this.type]||0)+this.val;
      if(G.player.weapon==='fists')G.player.weapon=this.type;
      notify(this.type.toUpperCase()+' ammo +'+this.val,1500);
    }
    this.alive=false;
  }
}

// Vehicle class
class Vehicle extends Entity{
  constructor(x,y,vtype,col){
    super(x,y);
    this.vtype=vtype;
    const cfg=VEH_CFG[vtype]||VEH_CFG.car;
    this.w=cfg.w;this.h=cfg.h;this.mxS=cfg.mxS;this.acc=cfg.acc;this.fr=cfg.fr;this.trn=cfg.trn;
    this.hp=cfg.hp;this.maxHp=cfg.hp;
    this.col=col||cfg.cols[RI(0,cfg.cols.length-1)];
    this.name=cfg.name||vtype;
    this.flies=!!cfg.flies;this.floats=!!cfg.floats;this.isPol=!!cfg.isPol;
    this.spd=0;this.angle=0;this.driver=null;this.isNpc=false;
    this.npcTarget=null;this.stuckT=0;this.lastX=x;this.lastY=y;
    this.npcLaneAxis=null;this.npcInIntersection=false;
    this.smokeDmg=0;this.sirenT=0;this.sirenPlayed=false;this.rotorA=0;this.altitude=this.flies?60:0;
    this._exploded=false;
  }
  canMove(nx,ny){
    if(this.flies)return true;
    if(this.floats)return onWater(nx,ny)||onWater(nx+this.w/3,ny)||onWater(nx-this.w/3,ny);
    if(this.isNpc){
      // Stricter check: center AND side points must not be in buildings, center must be drivable
      const ang=this.angle;
      const hw=this.h/2.5;
      const lx=nx+Math.cos(ang+Math.PI/2)*hw,ly=ny+Math.sin(ang+Math.PI/2)*hw;
      const rx=nx+Math.cos(ang-Math.PI/2)*hw,ry=ny+Math.sin(ang-Math.PI/2)*hw;
      return npcDrivable(nx,ny)&&tileAt(lx,ly)!==T_BUILD&&tileAt(rx,ry)!==T_BUILD;
    }
    return drivable(nx,ny)||drivable(nx+this.h/2,ny)||drivable(nx-this.h/2,ny);
  }
  update(dt){
    this.rotorA+=dt*0.014;
    if(this.vtype==='heli'&&this.driver===G.player){
      // GTA1 style: Up=thrust forward, Down=brake/reverse, Left/Right=rotate
      if(K['a']||K['arrowleft'])this.angle-=this.trn*1.4;
      if(K['d']||K['arrowright'])this.angle+=this.trn*1.4;
      if(K['w']||K['arrowup'])this.spd=Math.min(this.spd+0.18,this.mxS);
      else if(K['s']||K['arrowdown'])this.spd=Math.max(this.spd-0.22,-this.mxS*0.35);
      else{this.spd*=0.93;if(Math.abs(this.spd)<0.05)this.spd=0;}
      if(Math.abs(this.spd)>0.01){this.x+=Math.cos(this.angle)*this.spd;this.y+=Math.sin(this.angle)*this.spd;}
      // Altitude: Q=up, Z=down
      if(K['q'])this.altitude=Math.min(320,(this.altitude||60)+2.5);
      if(K['z'])this.altitude=Math.max(10,(this.altitude||60)-2.5);
      else if(!K['q'])this.altitude=Math.max(10,(this.altitude||60)-0.3);
      G.engineT=(G.engineT||0)-dt;if(G.engineT<=0){G.engineT=250;sound('heli');}
      return;
    }
    if(this.driver===G.player&&this.vtype!=='heli'){
      // GTA1 style: Up=accelerate, Down=brake/reverse, Left/Right=turn (speed-dependent)
      if(K['w']||K['arrowup'])this.spd=Math.min(this.spd+this.acc,this.mxS*(G.drug.type==='speed'?1.7:1));
      else if(K['s']||K['arrowdown'])this.spd=Math.max(this.spd-this.acc*1.5,-this.mxS*0.4);
      else{this.spd*=this.fr;if(Math.abs(this.spd)<0.05)this.spd=0;}
      if(Math.abs(this.spd)>0.08){
        if(K['a']||K['arrowleft'])this.angle-=this.trn*Math.sign(this.spd)*(this.vtype==='bike'?1.2:1);
        if(K['d']||K['arrowright'])this.angle+=this.trn*Math.sign(this.spd)*(this.vtype==='bike'?1.2:1);
      }
      // Altitude for flying vehicles (planes)
      if(this.flies){
        if(K['q'])this.altitude=Math.min(320,(this.altitude||0)+1.5);
        if(K['z'])this.altitude=Math.max(0,(this.altitude||0)-1.5);
      }
      G.engineT=(G.engineT||0)-dt;if(G.engineT<=0){G.engineT=120;if(Math.abs(this.spd)>0.5)sound('engine');}
    } else if(this.isPol&&this.driver){
      if(G.wanted>0)this.updatePolice(dt);
      else {this.sirenPlayed=false;this.sirenT=0;}
    } else if(this.isNpc&&this.driver){
      this.updateNpc(dt);
    }
    if(!isNaN(this.spd)&&Math.abs(this.spd)>0.01){
      const nx=this.x+Math.cos(this.angle)*this.spd;
      const ny=this.y+Math.sin(this.angle)*this.spd;
      if(this.canMove(nx,ny)){this.x=nx;this.y=ny;}
      else{
        // NPCs should correct back toward lane center instead of bouncing into pavement.
        if(this.isNpc){
          this.spd=Math.max(0,this.spd*0.45);
          const rp=nearestRoadPoint(this.x,this.y,42);
          this.angle=Math.atan2(rp.y-this.y,rp.x-this.x);
        } else {
          this.spd*=-0.15;
          this.angle+=R(0.2,0.6)*(Math.random()>0.5?1:-1);
        }
      }
    }
    if(this.isNpc){
      const moved=Math.hypot(this.x-this.lastX,this.y-this.lastY);
      if(moved<0.3)this.stuckT+=dt;else this.stuckT=0;
      if(this.stuckT>2000){
        // Teleport to road if deeply stuck
        const rp=randRoad();this.x=rp.x;this.y=rp.y;
        this.spd=0;this.stuckT=0;this.npcTarget=randRoad();
      }
      this.lastX=this.x;this.lastY=this.y;
    }
    if(!this.flies&&!this.floats&&Math.abs(this.spd)>1.2){
      if(dst(this,G.player)<22&&!G.player.inCar)G.player.hit(Math.abs(this.spd)*5,this);
      for(const e of G.entities){if(isCivilianPed(e)&&e.alive&&dst(this,e)<20)e.hit(Math.abs(this.spd)*7,this);}
    }
    if(this.smokeDmg>80&&Math.random()<0.3)G.particles.push(new Particle(this.x+R(-6,6),this.y+R(-6,6),R(-0.3,0.3),R(-0.8,0),'#666',R(700,1400),R(5,9)));
  }
  updateNpc(dt){
    if(!this.npcTarget)this.npcTarget=randRoad();
    // If outside drivable road, recover toward nearest road center first.
    if(!npcDrivable(this.x,this.y)||tileAt(this.x,this.y)===T_BUILD){
      const rp=nearestRoadPoint(this.x,this.y,48);
      this.angle=Math.atan2(rp.y-this.y,rp.x-this.x);
      this.spd=Math.min(this.spd+this.acc*0.25,this.mxS*0.35);
      this.npcTarget={x:rp.x,y:rp.y};
      return;
    }

    const lane=npcLaneGuide(this);
    const target=lane||this.npcTarget;
    if(lane){
      this.npcLaneAxis=lane.axis;
      this.npcInIntersection=!!lane.isIntersection;
      this.npcTarget=lane;
    } else {
      this.npcInIntersection=false;
    }

    const dx=target.x-this.x,dy=target.y-this.y;
    let ang=Math.atan2(dy,dx),diff=ang-this.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    const steerLimit=this.trn*(lane?(lane.turning?0.58:0.72):0.9);
    if(Math.abs(diff)>0.02)this.angle+=Math.sign(diff)*Math.min(steerLimit,Math.abs(diff));

    // Respect vehicle handling limits: heavy/slow vehicles should brake earlier.
    const lightControl=npcShouldStopAtLight(this,lane);
    if(lightControl&&lightControl.shouldStop){
      const brakePower=Math.max(0.05,this.acc*0.95);
      const targetSpeed=lightControl.dist<14?0:Math.min(this.mxS*0.28,lightControl.dist/Math.max(30,lightControl.stopDist)*this.mxS*0.4);
      this.spd=Math.max(targetSpeed,this.spd-brakePower);
      if(this.spd<0.03)this.spd=0;
      return;
    }

    // Cornering cap keeps vehicles in-lane through turns instead of sliding wide.
    const laneCap=lane?(lane.turning?0.34:0.58):0.52;
    this.spd=Math.min(this.spd+this.acc*0.34,this.mxS*laneCap);
    if(Math.hypot(dx,dy)<34)this.npcTarget=randRoad();

    // Avoid player when police heat is high.
    if(G.wanted>2&&dst(this,G.player)<120){
      const ax=this.x-G.player.x,ay=this.y-G.player.y;
      this.angle=Math.atan2(ay,ax);
      this.spd=Math.min(this.spd+0.08,this.mxS*0.75);
    }
  }
  updatePolice(dt){
    const tgt=G.player.inCar||G.player;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,d=Math.hypot(dx,dy);
    let ang=Math.atan2(dy,dx),diff=ang-this.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    if(Math.abs(diff)>0.1)this.angle+=Math.sign(diff)*Math.min(this.trn,Math.abs(diff));
    if(d>80)this.spd=Math.min(this.spd+this.acc,this.mxS);else this.spd*=0.88;
    if(G.player.inCar&&dst(this,G.player.inCar)<40)G.player.inCar.hit(9,this);
    if(!G.player.inCar&&dst(this,G.player)<22)G.player.hit(7,this);
    // Siren should trigger once per chase start, not loop constantly.
    if(!this.sirenPlayed){
      sound('siren');
      this.sirenPlayed=true;
    }
  }
  hit(dmg,src){this.smokeDmg+=dmg;this.hp-=dmg;if(this.hp<=0)this.explode();}
  explode(){
    if(this._exploded)return;this._exploded=true;sound('explode');addExplosion(this.x,this.y);G.shake=500;
    for(const e of G.entities){if(e.alive&&dst(this,e)<100&&!(e instanceof Vehicle)){e.hit&&e.hit(80,this);}}
    if(this.driver===G.player){G.player.inCar=null;G.player.x=this.x+55;G.player.y=this.y+10;}
    if(dst(this,G.player)<100&&!G.player.inCar)G.player.hit(80,this);
    this.alive=false;
  }
}

// Pedestrian
class Ped extends Entity{
  constructor(x,y){
    super(x,y);this.r=8;this.spd=R(0.9,1.5);
    this.appearance=randAppearance();
    this.walkFrame=RI(0,9);this.footT=0;this.idleT=R(0,2000);
    this.idle=true;this.angle=R(0,Math.PI*2);this.fleeing=false;this.fleeDir=R(0,Math.PI*2);
    this.fleeT=0;this.hp=40;
  }
  update(dt){
    this.footT+=dt;
    if(this.fleeing){
      this.fleeT-=dt;
      if(this.fleeT<=0){this.fleeDir=R(0,Math.PI*2);this.fleeT=R(500,900);}
      if(Math.random()<0.3)this.walkFrame=(this.walkFrame+1)%10;
      const sp=this.spd*1.6;
      const nx=this.x+Math.cos(this.fleeDir)*sp,ny=this.y+Math.sin(this.fleeDir)*sp;
      if(pedWalkable(nx,ny)){this.x=nx;this.y=ny;}else{this.fleeDir+=Math.PI*0.4;}
    } else if(!this.idle){
      if(Math.random()<0.15)this.walkFrame=(this.walkFrame+1)%10;
      const nx=this.x+Math.cos(this.angle)*this.spd,ny=this.y+Math.sin(this.angle)*this.spd;
      if(pedWalkable(nx,ny)){this.x=nx;this.y=ny;}else this.angle+=R(0.3,1.2);
      this.idleT-=dt;if(this.idleT<=0){this.idle=true;this.idleT=R(800,3000);}
    } else {
      this.idleT-=dt;if(this.idleT<=0){this.idle=false;this.idleT=R(2000,6000);this.angle=R(0,Math.PI*2);}
    }
    if(G.wanted>0&&dst(this,G.player)<220){this.fleeing=true;if(this.fleeT<=0)this.fleeT=600;}
  }
  hit(dmg,src){
    this.hp-=dmg;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#e53e3e',300,3));
    if(this.hp<=0){const m=RI(10,120);addMoney(m);notify('+$'+m);this.alive=false;if(src===G.player||src instanceof Bullet&&src.owner===G.player){G.kills++;addWanted(10,200);if(G.mission&&G.mission.type==='kill'){const inC2=this.x>CITY2_X1*TS;const inC1=this.x<CITY1_X2*TS;if(G.mission.area==='city2'&&inC2){G.mission.progress++;checkMission();}else if(G.mission.area==='city1'&&inC1){G.mission.progress++;checkMission();}else if(!G.mission.area){G.mission.progress++;checkMission();}}updateMissionObj();}}
  }
}


// Beach civilian variants: swimmers, surfers, and ice-cream queue residents.
class BeachPed extends Entity{
  constructor(x,y,role='beachgoer'){
    super(x,y);this.r=8;this.role=role;this.hp=35;
    this.appearance=randAppearance();this.walkFrame=RI(0,9);this.spd=R(0.6,1.5);
    this.angle=R(0,Math.PI*2);this.idleT=R(500,2400);this.home={x,y};this.phase=R(0,Math.PI*2);
    this.queueT=R(1200,2600);this.surfDir=Math.random()>0.5?1:-1;
  }
  update(dt){
    this.phase+=dt*0.002;
    if(this.role==='queue'||this.role==='vendor'){
      this.idleT-=dt;
      if(this.idleT<=0){this.idleT=R(900,1800);this.angle+=R(-0.4,0.4);}
      const wobble=this.role==='queue'?2.8:1.6;
      this.x=this.home.x+Math.sin(this.phase*0.8)*wobble;
      this.y=this.home.y+Math.cos(this.phase*0.6)*wobble;
      return;
    }
    if(this.role==='swimmer'){
      this.x+=Math.cos(this.angle)*this.spd*0.4;
      this.y+=Math.sin(this.angle)*this.spd*0.25;
      if(tileAt(this.x,this.y)!==T_OCEAN)this.angle+=Math.PI*0.7;
      if(this.y<OCEAN_Y*TS+8||this.y>(OCEAN_Y+6)*TS)this.angle+=Math.PI*0.5;
      if(Math.random()<0.02)this.angle+=R(-0.35,0.35);
      return;
    }
    if(this.role==='surfer'){
      this.x+=this.surfDir*1.8;
      this.y=this.home.y+Math.sin(this.phase*1.8)*7;
      if(this.x<2*TS||this.x>(MW-2)*TS)this.surfDir*=-1;
      return;
    }
    this.idleT-=dt;
    if(this.idleT<=0){this.idleT=R(1200,2800);this.angle=R(0,Math.PI*2);}
    const nx=this.x+Math.cos(this.angle)*this.spd*0.7,ny=this.y+Math.sin(this.angle)*this.spd*0.7;
    if(pedWalkable(nx,ny)){this.x=nx;this.y=ny;}else this.angle+=R(0.4,1);
  }
  hit(dmg){
    this.hp-=dmg;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#e53e3e',300,3));
    if(this.hp<=0)this.alive=false;
  }
}

// Cop officer (on foot)
class CopOfficer extends Entity{
  constructor(x,y){
    super(x,y);this.r=9;this.spd=2.1;this.hp=60;
    this.appearance=randAppearance(true);
    this.walkFrame=RI(0,9);this.angle=0;this.atkT=0;this.shootT=0;this.stun=0;
  }
  update(dt){
    if(this.stun>0){this.stun-=dt;return;}
    const d=dst(this,G.player);
    if(d>380){return;}
    const dx=G.player.x-this.x,dy=G.player.y-this.y;
    this.angle=Math.atan2(dy,dx);
    if(Math.random()<0.2)this.walkFrame=(this.walkFrame+1)%10;
    if(d>45){const nx=this.x+Math.cos(this.angle)*this.spd,ny=this.y+Math.sin(this.angle)*this.spd;if(walkable(nx,ny)){this.x=nx;this.y=ny;}}
    this.atkT-=dt;
    if(d<40&&this.atkT<=0){G.player.hit(8,this);this.atkT=500;}
    this.shootT-=dt;
    if(G.wanted>=2&&d>40&&d<280&&this.shootT<=0){
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.08,0.08),20,this));
      sound('shoot');this.shootT=R(900,1600);
    }
  }
  hit(dmg,src){
    this.hp-=dmg;this.stun=200;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#4444ff',300,3));
    if(this.hp<=0){this.alive=false;if(src===G.player||src instanceof Bullet&&src.owner===G.player){addWanted(18,200);}}
  }
}

// Military Soldier — patrols military base, attacks on sight
class MilSoldier extends Entity{
  constructor(x,y){
    super(x,y);this.r=9;this.spd=2.4;this.hp=80;
    this.appearance=randAppearance(false,true);
    this.walkFrame=RI(0,9);this.angle=R(0,Math.PI*2);
    this.atkT=0;this.shootT=0;this.stun=0;this.patrolT=R(1000,3000);
    this.patrolAngle=R(0,Math.PI*2);this.isMil=true;
  }
  update(dt){
    if(this.stun>0){this.stun-=dt;return;}
    const d=dst(this,G.player);
    // Become hostile if player enters base without clearance
    const hostile=inMilBase()&&(G.player.x>0);
    if(d>500){return;}
    if(hostile||d<300){
      const dx=G.player.x-this.x,dy=G.player.y-this.y;
      this.angle=Math.atan2(dy,dx);
      if(d>50){const nx=this.x+Math.cos(this.angle)*this.spd,ny=this.y+Math.sin(this.angle)*this.spd;if(walkable(nx,ny)){this.x=nx;this.y=ny;}}
      if(Math.random()<0.2)this.walkFrame=(this.walkFrame+1)%10;
      this.atkT-=dt;
      if(d<42&&this.atkT<=0){G.player.hit(12,this);this.atkT=400;}
      this.shootT-=dt;
      if(d>42&&d<320&&this.shootT<=0){
        G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.07,0.07),28,this));
        sound('shoot');this.shootT=R(700,1400);
      }
    } else {
      // Patrol
      this.patrolT-=dt;
      if(this.patrolT<=0){this.patrolT=R(800,2500);this.patrolAngle=R(0,Math.PI*2);}
      const nx=this.x+Math.cos(this.patrolAngle)*this.spd*0.7,ny=this.y+Math.sin(this.patrolAngle)*this.spd*0.7;
      if(walkable(nx,ny)&&tileAt(nx,ny)===T_MIL||tileAt(nx,ny)===T_ROAD){this.x=nx;this.y=ny;}
      else this.patrolAngle=R(0,Math.PI*2);
      this.angle=this.patrolAngle;
      if(Math.random()<0.1)this.walkFrame=(this.walkFrame+1)%10;
    }
  }
  hit(dmg,src){
    this.hp-=dmg;this.stun=180;
    for(let i=0;i<4;i++)G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-2,0),'#4a6a30',300,3));
    if(this.hp<=0){
      this.alive=false;
      addMoney(RI(50,200));
      if(src===G.player||src instanceof Bullet&&src.owner===G.player){
        G.kills++;addWanted(10,200);
        if(G.mission&&G.mission.type==='kill'&&G.mission.area==='milbase'){G.mission.progress++;checkMission();}
      }
    }
  }
}

// Player
class Player extends Entity{
  constructor(x,y){
    super(x,y);this.r=10;this.spd=2.6;this.angle=0;this.hp=100;this.maxHp=100;
    this.weapon='fists';this.ammo={pistol:30,shotgun:12,uzi:60};
    this.walkFrame=0;this.footT=0;this.running=false;
    this.appearance={skin:'#F1C27D',shirt:'#E53E3E',pants:'#2D3748',hair:'#1A202C'};
    this.inCar=null;this.atkT=0;this.punchT=0;this.hitFlash=0;
  }
  update(dt){
    this.hitFlash=Math.max(0,this.hitFlash-dt);
    if(this.inCar){this.x=this.inCar.x;this.y=this.inCar.y;return;}
    let dx=0,dy=0;
    if(K['w']||K['arrowup'])dy=-1;if(K['s']||K['arrowdown'])dy=1;
    if(K['a']||K['arrowleft'])dx=-1;if(K['d']||K['arrowright'])dx=1;
    this.running=(K['shift']&&(dx||dy));
    const spMult=(G.drug&&G.drug.type==='speed'?2.2:1)*(this.running?1.8:1);
    const spd=this.spd*spMult;
    if(dx||dy){
      const n=nrm(dx,dy);
      this.angle=Math.atan2(dy,dx);
      const nx=this.x+n.x*spd,ny=this.y+n.y*spd;
      if(walkable(nx,this.y))this.x=nx;
      if(walkable(this.x,ny))this.y=ny;
      this.footT+=dt;if(this.footT>80){this.footT=0;this.walkFrame=(this.walkFrame+1)%10;}
    }
    this.punchT=Math.max(0,this.punchT-dt);
    this.atkT=Math.max(0,this.atkT-dt);
  }
  attack(){
    // Vehicle-based attacks
    if(this.inCar){
      const car=this.inCar;
      if(car.vtype==='f16'&&car.altitude>10){
        if(this.atkT>0)return;
        this.atkT=600;sound('rocket');
        G.entities.push(new Rocket(car.x,car.y,car.angle,car));
        G.entities.push(new Rocket(car.x+Math.cos(car.angle+Math.PI/2)*8,car.y+Math.sin(car.angle+Math.PI/2)*8,car.angle,car));
        G.particles.push(new Particle(car.x,car.y,R(-1,1),R(-1,1),'rgba(255,150,30,0.9)',200,8));
        addWanted(4,120);
      } else if(car.vtype==='tank'){
        if(this.atkT>0)return;
        this.atkT=2200;sound('cannon');
        G.entities.push(new Rocket(car.x+Math.cos(car.angle)*30,car.y+Math.sin(car.angle)*30,car.angle,car));
        addExplosion(car.x+Math.cos(car.angle)*28,car.y+Math.sin(car.angle)*28,0.4);
        addWanted(4,120);
      }
      return;
    }
    if(this.atkT>0)return;
    const w=this.weapon;
    if(w==='fists'){
      this.punchT=250;this.atkT=500;sound('punch');
      let hitPed=false,hitCop=false;
      for(const e of G.entities){
        if(isCivilianPed(e)&&dst(this,e)<42){e.hit(15+(G.drug&&G.drug.type==='power'?30:0),this);hitPed=true;}
        if(e instanceof CopOfficer&&dst(this,e)<42){e.hit(20+(G.drug&&G.drug.type==='power'?40:0),this);hitCop=true;}
        if(e instanceof Vehicle&&dst(this,e)<42){e.hit(5,this);}
      }
      if(hitPed)addWanted(2,850);
      if(hitCop)addWanted(8,300);
    } else if(w==='pistol'&&this.ammo.pistol>0){
      this.ammo.pistol--;this.atkT=280;sound('shoot');
      const dmg=25*(G.drug&&G.drug.type==='power'?3:1);
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.04,0.04),dmg,this));
      addWanted(4,120);
      G.particles.push(new Particle(this.x+Math.cos(this.angle)*16,this.y+Math.sin(this.angle)*16,0,0,'#ffff00',120,5));
      if(this.ammo.pistol===0&&this.weapon==='pistol')this.weapon='fists';
    } else if(w==='shotgun'&&this.ammo.shotgun>0){
      this.ammo.shotgun--;this.atkT=650;sound('shoot');
      const dmg=35*(G.drug&&G.drug.type==='power'?3:1);
      for(let i=-2;i<=2;i++)G.entities.push(new Bullet(this.x,this.y,this.angle+i*0.12,dmg,this));
      addWanted(4,120);
      if(this.ammo.shotgun===0)this.weapon='fists';
    } else if(w==='uzi'&&this.ammo.uzi>0){
      this.ammo.uzi--;this.atkT=110;sound('shoot');
      const dmg=18*(G.drug&&G.drug.type==='power'?3:1);
      G.entities.push(new Bullet(this.x,this.y,this.angle+R(-0.1,0.1),dmg,this));
      addWanted(4,120);
      if(this.ammo.uzi===0)this.weapon='fists';
    }
    this.updateWeaponHUD();
  }
  hit(dmg,src){
    if(G.godMode){this.hitFlash=80;return;}
    if(this.hp<=0)return;
    this.hp-=dmg;this.hitFlash=400;
    G.particles.push(new Particle(this.x,this.y,R(-2,2),R(-3,0),'#ff4444',400,5));
    this.updateHpBar();
    if(this.hp<=0)G.playerDied();
  }
  updateHpBar(){
    const pct=Math.max(0,this.hp/this.maxHp);
    document.getElementById('hp-fill').style.width=(pct*100)+'%';
    document.getElementById('hp-fill').style.background=pct>0.5?'#38A169':pct>0.25?'#D69E2E':'#E53E3E';
  }
  updateWeaponHUD(){
    const icons={fists:'&#x1F44A; Fists',pistol:'&#x1F52B; Pistol',shotgun:'&#x1F4A5; Shotgun',uzi:'&#x1F4AB; Uzi'};
    const ammoStr=this.weapon!=='fists'?' ['+this.ammo[this.weapon]+']':'';
    document.getElementById('weapon-info').innerHTML=icons[this.weapon]+ammoStr;
  }
}

// Mission functions
function startMission(id){
  const m=MISSIONS_DATA.find(x=>x.id===id);if(!m)return;
  if(G.completedMissions.has(id)){notify('Mission already completed!',2000);return;}
  G.mission={...m,progress:0,state:'active'};
  showMissionUI();notify('MISSION STARTED: '+m.name,3000);sound('star');
}
function checkMission(){
  const m=G.mission;if(!m||m.state!=='active')return;
  let done=false;
  if(m.type==='kill')done=m.progress>=m.count;
  else if(m.type==='goto'){
    const tx=m.targetTile.x*TS,ty=m.targetTile.y*TS;
    if(Math.hypot(G.player.x-tx,G.player.y-ty)<m.radius)done=true;
  }
  else if(m.type==='visit')done=m.progress>=1;
  else if(m.type==='steal_vehicle'){
    if(G.player.inCar&&G.player.inCar.vtype===m.vtype){
      if(m.deliverTile){
        const tx=m.deliverTile.x*TS,ty=m.deliverTile.y*TS;
        if(Math.hypot(G.player.x-tx,G.player.y-ty)<180)done=true;
      } else done=true;
    }
  }
  if(done)completeMission();
}
function completeMission(){
  const m=G.mission;if(!m)return;
  G.completedMissions.add(m.id);
  addMoney(m.reward);
  sound('star');
  notify('★ MISSION COMPLETE: '+m.name+' +$'+m.reward+' ★',4000);
  const el=document.getElementById('mission-panel');
  el.style.background='rgba(0,60,0,0.85)';el.style.borderColor='#00FF41';
  setTimeout(()=>{G.mission=null;hideMissionUI();},4000);
}
function showMissionUI(){
  const m=G.mission;if(!m)return;
  const el=document.getElementById('mission-panel');
  el.style.display='block';el.style.background='rgba(0,0,0,0.8)';el.style.borderColor='#FFD700';
  document.getElementById('mission-title').textContent='★ '+m.name;
  document.getElementById('mission-desc').textContent=m.desc;
  updateMissionObj();
}
function hideMissionUI(){document.getElementById('mission-panel').style.display='none';}
function updateMissionObj(){
  const m=G.mission;if(!m){return;}
  let txt='';
  if(m.type==='kill')txt='Eliminated: '+m.progress+'/'+m.count;
  else if(m.type==='goto')txt='Reach the destination';
  else if(m.type==='visit')txt='Visit the location';
  else if(m.type==='steal_vehicle'){txt=m.deliverTile?'Steal '+m.vtype+' and deliver':'Steal the '+m.vtype;if(G.player.inCar&&G.player.inCar.vtype===m.vtype)txt='✓ Got '+m.vtype+' — drive to delivery point!';}
  document.getElementById('mission-obj').textContent=txt;
}

  clearTimeout(G._zoneT);G._zoneT=setTimeout(()=>el.style.opacity=0,3000);

function updateWantedBar(){
  const wb=document.getElementById('wanted-bar');
  wb.innerHTML='';for(let i=0;i<5;i++){const s=document.createElement('span');s.textContent='★';s.style.cssText='font-size:20px;margin-right:2px;text-shadow:1px 1px #000;';s.style.color=i<G.wanted?'#FFD700':'#333';wb.appendChild(s);}
}
function syncWantedFromScore(){
  // Gentler escalation curve: petty actions raise suspicion first, stars come with repeated offenses.
  const thresholds=[10,22,38,58,82];
  let lvl=0;
  for(const t of thresholds)if(G.wantedScore>=t)lvl++;
  if(lvl!==G.wanted){
    G.wanted=lvl;
    updateWantedBar();
    if(lvl>0&&lvl<=2)notify('Police are watching you...',1200);
  }
}
function addWanted(points,cooldownMs=0){
  // Cooldown prevents one punch/swing from instantly chaining multiple wanted-level increases.
  if(cooldownMs>0&&G.wantedCooldownT>0)return;
  G.wantedScore=clamp(G.wantedScore+points,0,120);
  if(cooldownMs>0)G.wantedCooldownT=cooldownMs;
  G.wantedT=0;
  syncWantedFromScore();
}
function getNearbyLoc(){
  const px=G.player.x,py=G.player.y;
  for(const loc of SPECIAL_LOCS){
    const lx=loc.x+loc.w/2,ly=loc.y+loc.h/2;
    if(Math.abs(px-lx)<loc.w/2+50&&Math.abs(py-ly)<loc.h/2+50)return loc;
  }
  return null;
}

// Input handling
const K={},JP={},JR={};
let mouseX=0,mouseY=0,mouseDown=false;
document.addEventListener('keydown',e=>{
  const key=e.key.toLowerCase();
  if(!K[key]){JP[key]=true;setTimeout(()=>JP[key]=false,50);}
  K[key]=true;
  if(key==='r'&&!G.player.alive)G.respawn();
  if(key==='e')tryEnterExit();
  if(key==='f'||key==='g'||key==='h'){
    const loc=getNearbyLoc();
    if(loc)interactLoc(loc,key);
    else if(key==='g'&&G.player.inCar){
      // cycle weapon backward
      const weaps=['fists','pistol','shotgun','uzi'];
      const i=weaps.indexOf(G.player.weapon);G.player.weapon=weaps[(i-1+weaps.length)%weaps.length];
      G.player.updateWeaponHUD();
    }
  }
  if(key==='q'||key==='tab'){e.preventDefault();cycleWeapon();}
  if(key==='r'&&G.player.alive)G.respawn();
  if(key==='m'){
    // Cycle to next incomplete mission
    const next=MISSIONS_DATA.find(m=>!G.completedMissions.has(m.id)&&(!G.mission||m.id!==G.mission.id));
    if(next)startMission(next.id);else notify('All missions complete! You are a legend.',3000);
  }
  if(key==='`'){G.godMode=!G.godMode;notify(G.godMode?'★ GOD MODE ON — You are immortal!':'God mode off.',2000);}
});
document.addEventListener('keyup',e=>K[e.key.toLowerCase()]=false);
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mousedown',e=>{mouseDown=true;if(G.player.alive&&!G.player.inCar)G.player.attack();});

function cycleWeapon(){
  const weaps=['fists','pistol','shotgun','uzi'];
  let i=weaps.indexOf(G.player.weapon);
  do{i=(i+1)%weaps.length;}while(i>0&&!G.player.ammo[weaps[i]]);
  G.player.weapon=weaps[i];G.player.updateWeaponHUD();
}
function tryEnterExit(){
  // Exit indoor zone
  if(G.indoors){exitBuilding();return;}
  if(G.player.inCar){
    const car=G.player.inCar;
    G.player.inCar=null;car.driver=null;
    G.player.x=car.x+Math.cos(car.angle+Math.PI/2)*20;
    G.player.y=car.y+Math.sin(car.angle+Math.PI/2)*20;
    sound('carenter');
  } else {
    // Try enter nearest vehicle
    let best=null,bestD=50;
    for(const e of G.entities){
      if(e instanceof Vehicle&&e.alive&&!e.driver){
        const d=dst(G.player,e);if(d<bestD){bestD=d;best=e;}
      }
    }
    if(best){G.player.inCar=best;best.driver=G.player;sound('carenter');return;}
    // Try enter building (check for nearby entrance)
    for(const b of bldgs){
      const doorX=b.x+b.w/2,doorY=b.y+b.h;
      if(Math.hypot(G.player.x-doorX,G.player.y-doorY)<52){
        enterBuilding(b);return;
      }
    }
  }
}

// Update loop
function update(dt){
  if(!G.player.alive)return;
  G.time+=dt;
  // Indoor mode movement
  if(G.indoors){
    const spd=2.5;
    const pad=90;const RX=pad,RY=pad+50,RW=canvas.width-pad*2,RH=canvas.height-pad*2-70;
    if(K['w']||K['arrowup'])G.indoorPlayerY=Math.max(RY+20,G.indoorPlayerY-spd);
    if(K['s']||K['arrowdown'])G.indoorPlayerY=Math.min(RY+RH-20,G.indoorPlayerY+spd);
    if(K['a']||K['arrowleft'])G.indoorPlayerX=Math.max(RX+20,G.indoorPlayerX-spd);
    if(K['d']||K['arrowright'])G.indoorPlayerX=Math.min(RX+RW-20,G.indoorPlayerX+spd);
    // Floor navigation with < >
    if(JP['pageup']||JP['arrowup']&&K['shift']){G.indoorFloor=Math.min((G.indoors.building.floors||1)-1,G.indoorFloor+1);}
    if(JP['pagedown']||JP['arrowdown']&&K['shift']){G.indoorFloor=Math.max(0,G.indoorFloor-1);}
    // Exit when near door (bottom center)
    const doorX=canvas.width/2,doorY=RY+RH-10;
    if(Math.hypot(G.indoorPlayerX-doorX,G.indoorPlayerY-doorY)<40&&(K['e']||JP['e'])){exitBuilding();}
    return;
  }
  G.player.update(dt);
  // Attack via SPACE key
  if(JP[' ']||JP['space'])G.player.attack();
  // Mouse aim
  if(G.player&&!G.player.inCar){
    const cx=G.player.x-G.camera.x,cy=G.player.y-G.camera.y;
    if(mouseDown){G.player.angle=Math.atan2(mouseY-cy,mouseX-cx);G.player.attack();}
    else if(mouseX||mouseY){G.player.angle=Math.atan2(mouseY-cy,mouseX-cx);}
  }
  // Camera follow
  G.camera.x+=(G.player.x-canvas.width/2-G.camera.x)*0.12;
  G.camera.y+=(G.player.y-canvas.height/2-G.camera.y)*0.12;
  G.camera.x=clamp(G.camera.x,0,MW*TS-canvas.width);
  G.camera.y=clamp(G.camera.y,0,MH*TS-canvas.height);
  G.shake=Math.max(0,G.shake-dt);
  // Drug timer
  if(G.drug.type){
    G.drug.timer-=dt;
    const pct=Math.max(0,G.drug.timer/G.drug.maxTimer);
    document.getElementById('drug-fill').style.width=(pct*100)+'%';
    if(G.drug.timer<=0){G.drug={type:null,timer:0,maxTimer:0};document.getElementById('drug-bar').style.display='none';notify('Drug wore off.',1500);}
  }
  // Wanted cooldown + score decay tuned to clear noticeably faster.
  if(G.wantedCooldownT>0)G.wantedCooldownT=Math.max(0,G.wantedCooldownT-dt);
  if(G.wantedScore>0){
    G.wantedDecayT+=dt;
    const decayTick=250;
    if(G.wantedDecayT>=decayTick){
      const steps=(G.wantedDecayT/decayTick)|0;
      G.wantedDecayT-=steps*decayTick;
      // Faster decay so stars don't linger too long after disengaging.
      const decayPerStep=0.2+G.wanted*0.11;
      G.wantedScore=Math.max(0,G.wantedScore-steps*decayPerStep);
      const prevWanted=G.wanted;
      syncWantedFromScore();
      if(prevWanted>0&&G.wanted===0)notify('Wanted level cleared',2000);
    }
  } else G.wantedDecayT=0;
  // Spawn police (low wanted levels respond slower and with fewer units).
  if(G.wanted>0){
    G.wantedSpawnT-=dt;
    if(G.wantedSpawnT<=0){
      G.wantedSpawnT=R(7000,12000);
      const polCount=G.entities.filter(e=>e instanceof Vehicle&&e.isPol&&e.alive).length;
      const vehicleTarget=Math.max(0,G.wanted-1);
      if(polCount<vehicleTarget){
        const a=R(0,Math.PI*2),d=R(420,720);
        const sx=G.player.x+Math.cos(a)*d,sy=G.player.y+Math.sin(a)*d;
        const v=new Vehicle(sx,sy,G.wanted>=4?'polheli':'police');
        v.driver={isPoliceDummy:true}; // non-null, non-player driver
        G.entities.push(v);
      }
      const copCount=G.entities.filter(e=>e instanceof CopOfficer&&e.alive).length;
      const footTarget=Math.max(1,Math.ceil(G.wanted*1.2)-1);
      if(copCount<footTarget){
        const a2=R(0,Math.PI*2),d2=R(260,520);
        G.entities.push(new CopOfficer(G.player.x+Math.cos(a2)*d2,G.player.y+Math.sin(a2)*d2));
      }
    }
  }
  // Spawn peds on nearby sidewalks
  G.pedSpawnT-=dt;
  if(G.pedSpawnT<=0){
    G.pedSpawnT=R(1500,3000);
    const pedCount=G.entities.filter(e=>e instanceof Ped&&e.alive).length;
    if(pedCount<75){
      const a=R(0,Math.PI*2),d=R(250,500);
      const cx=G.player.x+Math.cos(a)*d,cy=G.player.y+Math.sin(a)*d;
      // Find nearest sidewalk point to the candidate position
      if(swPts.length>0){
        let best=null,bestD=99999;
        for(let k=0;k<30;k++){const p=swPts[RI(0,swPts.length-1)];const dd=Math.hypot(p.x-cx,p.y-cy);if(dd<bestD){bestD=dd;best=p;}}
        if(best&&bestD<300)G.entities.push(new Ped(best.x+R(-8,8),best.y+R(-8,8)));
      } else if(walkable(cx,cy)&&!onWater(cx,cy)){G.entities.push(new Ped(cx,cy));}
    }
  }
  // Spawn NPC cars — city-zone aware
  G.carSpawnT-=dt;
  if(G.carSpawnT<=0){
    G.carSpawnT=R(1800,3500);
    const carCount=G.entities.filter(e=>e instanceof Vehicle&&e.isNpc&&!e.isPol&&e.alive).length;
    if(carCount<55){
      const inC2=inCity2Zone();
      // City 2 spawns more expensive/dangerous vehicles
      const types=inC2?['sports','sports','muscle','muscle','car','van','bike']:['car','car','car','van','van','truck','bike','bike'];
      const vtype=types[RI(0,types.length-1)];
      const rp=inC2?randCity2Road():randCity1Road();
      const v=new Vehicle(rp.x,rp.y,vtype);
      v.isNpc=true;v.driver=v;v.npcTarget=inC2?randCity2Road():randCity1Road();
      G.entities.push(v);
    }
  }
  // Military base spawning — soldiers and vehicles
  G.milSpawnT-=dt;
  if(G.milSpawnT<=0){
    G.milSpawnT=R(3000,6000);
    const milSolCount=G.entities.filter(e=>e instanceof MilSoldier&&e.alive).length;
    if(milSolCount<12){
      const sx=R(MIL.x1+4,MIL.x2-4)*TS,sy=R(MIL.y1+8,MIL.y2-4)*TS;
      G.entities.push(new MilSoldier(sx,sy));
    }
    // NPC F-16 patrols when player is at high wanted level or in base
    if(G.wanted>=4||inMilBase()){
      const f16Count=G.entities.filter(e=>e instanceof Vehicle&&e.vtype==='f16'&&e.isNpc&&e.alive).length;
      if(f16Count<2){
        const f16=new Vehicle((MIL.x1+10)*TS,(MIL.y1+5)*TS,'f16');
        f16.isNpc=true;f16.driver=f16;f16.isMilNpc=true;
        f16.npcRocketT=R(4000,7000);
        G.entities.push(f16);
      }
    }
  }
  // Update all entities
  for(const e of G.entities){if(e.alive)e.update(dt);}
  for(const p of G.particles){if(p.alive)p.update(dt);}
  // NPC F-16 AI — fire rockets at player
  for(const e of G.entities){
    if(!e.alive||!e.isMilNpc||e.vtype!=='f16')continue;
    const d=dst(e,G.player);
    if(d<800){
      const tgt=G.player.inCar||G.player;
      e.angle=Math.atan2(tgt.y-e.y,tgt.x-e.x);
      e.spd=Math.min((e.spd||0)+0.3,e.mxS);
      e.x+=Math.cos(e.angle)*e.spd;e.y+=Math.sin(e.angle)*e.spd;
      e.npcRocketT-=dt;
      if(d<600&&e.npcRocketT<=0){
        G.entities.push(new Rocket(e.x,e.y,e.angle,e));sound('rocket');
        e.npcRocketT=R(2500,5000);
      }
    }
  }
  // Cleanup
  G.cleanT-=dt;
  if(G.cleanT<=0){
    G.cleanT=4000;
    G.entities=G.entities.filter(e=>e.alive);
    G.particles=G.particles.filter(p=>p.alive);
  }
  // Score
  document.getElementById('score-info').textContent='Score: '+(G.money+G.kills*500)+' | Kills: '+G.kills;
  // Zone label detection
  {const zone=inMilBase()?'⚠ MILITARY BASE':inCity2Zone()?'VICE CITY':G.player.y>RURAL_Y*TS?'COUNTRYSIDE':'LIBERTY CITY';
   if(zone!==G._lastZone){G._lastZone=zone;showZoneLabel(zone);}}
  // Mission objective check for goto/steal missions
  if(G.mission&&G.mission.state==='active'){
    if(G.mission.type==='goto'||G.mission.type==='steal_vehicle')checkMission();
    if(G.mission.type==='visit'){
      const loc=getNearbyLoc();
      if(loc&&loc.type===G.mission.targetLoc){G.mission.progress=1;checkMission();}
    }
    updateMissionObj();
  }
  // Location hint
  const loc=getNearbyLoc();
  if(loc)showLocHint(loc.label);else hideLocHint();
}

// ── Human drawing ──────────────────────────────────────────────
// 10-frame walk cycle animation for all humanoids
// In local space: entity faces +x, +y=left, -y=right
function drawHuman(x,y,angle,walkFrame,app,isRunning,hasWeapon,label){
  const fr=WALK_CYCLE[walkFrame%10];
  const [lla,rla,laa,raa]=fr;
  const legLen=7,armLen=5.5;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(2,1,9,6,0,0,Math.PI*2);ctx.fill();
  // Legs (behind body)
  ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle=app.pants;
  // Left leg from hip at (0,-3)
  const llx=Math.cos(lla+Math.PI)*legLen,lly=-3+Math.sin(lla)*legLen*0.6;
  ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(llx,lly);ctx.stroke();
  // Right leg from hip at (0,+3)
  const rlx=Math.cos(rla+Math.PI)*legLen,rly=3+Math.sin(rla)*legLen*0.6;
  ctx.beginPath();ctx.moveTo(0,3);ctx.lineTo(rlx,rly);ctx.stroke();
  // Shoes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(llx,lly,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rlx,rly,2.2,0,Math.PI*2);ctx.fill();
  // Torso
  ctx.fillStyle=app.shirt;
  ctx.beginPath();ctx.ellipse(0,0,7,4.5,0,0,Math.PI*2);ctx.fill();
  // Torso highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath();ctx.ellipse(-1,-1.5,4,2.5,0,0,Math.PI*2);ctx.fill();
  // Arms
  ctx.lineWidth=2.5;ctx.strokeStyle=app.shirt;
  const lax=-2+Math.cos(laa+Math.PI)*armLen*0.7,lay=-4.5+Math.sin(laa)*armLen;
  ctx.beginPath();ctx.moveTo(-1,-4.5);ctx.lineTo(lax,lay);ctx.stroke();
  const rax=-2+Math.cos(raa+Math.PI)*armLen*0.7,ray=4.5+Math.sin(raa)*armLen;
  ctx.beginPath();ctx.moveTo(-1,4.5);ctx.lineTo(rax,ray);ctx.stroke();
  // Hands
  ctx.fillStyle=app.skin;
  ctx.beginPath();ctx.arc(lax,lay,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rax,ray,2,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle=app.skin;
  ctx.beginPath();ctx.arc(6,0,4.5,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle=app.hair;
  ctx.beginPath();ctx.arc(6,-0.5,3.5,-Math.PI*0.85,Math.PI*0.15);ctx.fill();
  // Eyes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(7.8,-1.5,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7.8,1.5,1,0,Math.PI*2);ctx.fill();
  // Weapon
  if(hasWeapon&&hasWeapon!=='fists'){
    ctx.fillStyle='#2D3748';
    ctx.fillRect(1,-1.5,hasWeapon==='shotgun'?13:10,3);
    if(hasWeapon==='shotgun')ctx.fillRect(7,-3,6,2);
  }
  ctx.restore();
  // Name label above head
  if(label){
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 9px Courier New';ctx.textAlign='center';
    ctx.fillText(label,x,y-16);
  }
}

function drawPlayer(){
  const p=G.player;
  const app=p.appearance;
  // Drug trippy: randomize colors
  const drawApp=G.drug.type==='trippy'?{...app,shirt:'hsl('+(G.time*0.3%360)+',100%,50%)',pants:'hsl('+(G.time*0.2%360+120)+',100%,40%)'}:app;
  drawHuman(p.x,p.y,p.angle,p.walkFrame,drawApp,p.running,p.weapon,'YOU');
  // Punch flash
  if(p.punchT>0){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);
    ctx.fillStyle='rgba(255,150,50,0.8)';
    ctx.beginPath();ctx.arc(22,0,7,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function pedThoughtText(ped){
  if(ped.fleeing)return'😱 HELP!!';
  const s=((ped.spd*997)|0+1000)%1000;
  if(ped.idle){
    const t=['☕ Coffee...','📱 scrolling','💭 Hmm...','🍕 Hungry','😴 So tired','💰 Need $$$','🎵 La la la','🐕 Nice doggo','🏖️ Beach day?','🌮 Tacos!'];
    return t[s%t.length];
  }
  const t=['🚶 Just walkin','👀 Nice day','💼 Late!','🛒 Shopping','🎧 Music time'];
  return t[s%t.length];
}
function drawThoughtBubble(wx,wy,text){
  if(Math.hypot(wx-G.player.x,wy-G.player.y)>220)return;
  ctx.save();
  ctx.font='8px Arial';
  const tw=ctx.measureText(text).width;
  const pw=Math.max(tw+12,46),ph=14;
  const bx=wx,by=wy-34;
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=0.8;
  ctx.fillRect(bx-pw/2,by-ph,pw,ph);ctx.strokeRect(bx-pw/2,by-ph,pw,ph);
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=0.6;
  [{cx:bx-3,cy:wy-18,r:3},{cx:bx-4,cy:wy-24,r:2},{cx:bx-5,cy:wy-29,r:1.4}].forEach(d=>{
    ctx.beginPath();ctx.arc(d.cx,d.cy,d.r,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.fillStyle='#111';ctx.font='8px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,bx,by-ph/2);
  ctx.restore();
}

function drawPed(ped){
  const app=G.drug.type==='trippy'?{...ped.appearance,shirt:'hsl('+(ped.x*0.5%360)+',100%,50%)',pants:'hsl('+(ped.y*0.4%360)+',80%,35%)'}:ped.appearance;
  ctx.save();ctx.translate(ped.x,ped.y);
  if(ped.fleeing){
    // Fleeing: arms up
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(1,1,9,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=app.pants;ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle=app.pants;
    ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(-5,-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,3);ctx.lineTo(-5,5);ctx.stroke();
    ctx.fillStyle=app.shirt;ctx.beginPath();ctx.ellipse(0,0,7,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=app.shirt;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(-1,-4.5);ctx.lineTo(-5,-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-1,4.5);ctx.lineTo(-5,10);ctx.stroke();
    ctx.fillStyle=app.skin;ctx.beginPath();ctx.arc(6,0,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=app.hair;ctx.beginPath();ctx.arc(6,-0.5,3.5,-Math.PI*0.85,Math.PI*0.15);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText('!',0,-18);
  } else {
    ctx.rotate(ped.angle);
    ctx.restore();
    drawHuman(ped.x,ped.y,ped.angle,ped.walkFrame,app,!ped.idle,null,null);
    drawThoughtBubble(ped.x,ped.y,pedThoughtText(ped));
    return;
  }
  ctx.restore();
  drawThoughtBubble(ped.x,ped.y,pedThoughtText(ped));
}


function drawBeachPed(ped){
  if(ped.role==='swimmer'){
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(ped.x,ped.y+2,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=ped.appearance.skin;ctx.beginPath();ctx.arc(ped.x,ped.y-2,4.5,0,Math.PI*2);ctx.fill();
    return;
  }
  if(ped.role==='surfer'){
    ctx.save();ctx.translate(ped.x,ped.y);ctx.rotate(ped.surfDir>0?0:Math.PI);
    ctx.fillStyle='#f6ad55';ctx.fillRect(-14,-5,28,10);
    ctx.fillStyle='#fff';ctx.fillRect(-12,-2,24,4);
    ctx.restore();
    drawHuman(ped.x,ped.y-6,ped.surfDir>0?0:Math.PI,ped.walkFrame,ped.appearance,true,null,null);
    return;
  }
  drawHuman(ped.x,ped.y,ped.angle,ped.walkFrame,ped.appearance,false,null,null);
  if(ped.role==='queue')drawThoughtBubble(ped.x,ped.y,'🍦');
  if(ped.role==='vendor')drawThoughtBubble(ped.x,ped.y,'🍨');
}
