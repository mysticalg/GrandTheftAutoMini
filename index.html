function drawRocket(r){
  ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.angle);
  // Rocket body
  ctx.fillStyle='#ccc';ctx.fillRect(-4,-2,10,4);
  // Nose cone
  ctx.fillStyle='#aaa';ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(12,-2);ctx.lineTo(12,2);ctx.closePath();ctx.fill();
  // Fins
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.moveTo(-4,-2);ctx.lineTo(-8,-5);ctx.lineTo(-6,-2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-4,2);ctx.lineTo(-8,5);ctx.lineTo(-6,2);ctx.closePath();ctx.fill();
  // Exhaust glow
  ctx.fillStyle='rgba(255,140,0,0.85)';ctx.beginPath();ctx.arc(-5,0,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Vehicle rendering
function drawCar(car){
  ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle);
  const w=car.w,h=car.h,vt=car.vtype;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-w/2+3,-h/2+3,w,h);
  // Body
  ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-w/2,-h/2,w,h/3);

  if(vt==='tank'){
    // Tank body (lower hull)
    ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
    // Tank tracks on sides
    ctx.fillStyle='#2a3a18';
    ctx.fillRect(-w/2,-h/2,8,h);ctx.fillRect(w/2-8,-h/2,8,h);
    // Track segments
    ctx.strokeStyle='#1a2a10';ctx.lineWidth=1.5;
    for(let i=-h/2;i<h/2;i+=6){ctx.beginPath();ctx.moveTo(-w/2,i);ctx.lineTo(-w/2+8,i);ctx.stroke();ctx.beginPath();ctx.moveTo(w/2-8,i);ctx.lineTo(w/2,i);ctx.stroke();}
    // Hull top plate
    ctx.fillStyle='#5a6a40';ctx.fillRect(-w/2+8,-h/2+3,w-16,h-6);
    // Turret base
    ctx.fillStyle='#4a5a30';ctx.beginPath();ctx.ellipse(-4,0,h*0.45,h*0.4,0,0,Math.PI*2);ctx.fill();
    // Turret
    ctx.fillStyle='#3a4a22';ctx.beginPath();ctx.ellipse(-4,0,h*0.38,h*0.32,0,0,Math.PI*2);ctx.fill();
    // Barrel
    ctx.fillStyle='#2a3a15';ctx.fillRect(-4,h*0.08,w*0.55,5);ctx.fillRect(-4-3,h*0.08,6,5);
    // Machine gun on top
    ctx.fillStyle='#333';ctx.fillRect(0,-3,14,3);
    // Commander hatch
    ctx.fillStyle='#5a6a30';ctx.beginPath();ctx.arc(-4,0,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2a3a10';ctx.lineWidth=1;ctx.stroke();
    // Star insignia
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='8px Arial';ctx.textAlign='center';ctx.fillText('★',-4,3);
  } else if(vt==='f16'){
    // F-16 Fighting Falcon
    ctx.fillStyle=car.col;
    // Fuselage
    ctx.beginPath();ctx.ellipse(-w*0.05,0,w*0.52,h*0.45,0,0,Math.PI*2);ctx.fill();
    // Nose cone (pointy front)
    ctx.fillStyle='#6a7a60';
    ctx.beginPath();ctx.moveTo(-w/2,0);ctx.lineTo(-w*0.15,-h*0.22);ctx.lineTo(-w*0.15,h*0.22);ctx.closePath();ctx.fill();
    // Delta wings
    ctx.fillStyle=car.col;ctx.globalAlpha=0.92;
    ctx.beginPath();ctx.moveTo(-w*0.12,-h*0.45);ctx.lineTo(w*0.2,-h*1.1);ctx.lineTo(w*0.3,-h*1.1);ctx.lineTo(w*0.05,-h*0.45);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-w*0.12,h*0.45);ctx.lineTo(w*0.2,h*1.1);ctx.lineTo(w*0.3,h*1.1);ctx.lineTo(w*0.05,h*0.45);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Tail fins
    ctx.fillStyle='#7a8a68';
    ctx.beginPath();ctx.moveTo(w*0.3,-h*0.35);ctx.lineTo(w*0.5,-h*0.55);ctx.lineTo(w*0.48,0);ctx.lineTo(w*0.28,0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(w*0.3,h*0.35);ctx.lineTo(w*0.5,h*0.55);ctx.lineTo(w*0.48,0);ctx.lineTo(w*0.28,0);ctx.closePath();ctx.fill();
    // Cockpit canopy
    ctx.fillStyle='rgba(100,200,255,0.65)';ctx.beginPath();ctx.ellipse(-w*0.15,0,w*0.18,h*0.35,0,0,Math.PI*2);ctx.fill();
    // Engine exhaust
    if(Math.abs(car.spd)>2){ctx.fillStyle='rgba(255,160,30,0.8)';ctx.beginPath();ctx.ellipse(w*0.5,0,6,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,80,0,0.5)';ctx.beginPath();ctx.ellipse(w*0.55,0,9,2,0,0,Math.PI*2);ctx.fill();}
    // Rocket pods under wings
    ctx.fillStyle='#aaa';ctx.fillRect(w*0.05,-h*0.8,12,4);ctx.fillRect(w*0.05,h*0.8-4,12,4);
    // Military markings
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='6px Arial';ctx.textAlign='center';ctx.fillText('F-16',0,3);
  } else if(vt==='miljeep'){
    // Military jeep
    ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
    // Windshield
    ctx.fillStyle='rgba(150,200,255,0.45)';ctx.fillRect(-w/2+4,-h/2+2,w*0.4,h-4);
    // Roll bar
    ctx.strokeStyle='#3a4a22';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-2,-h/2);ctx.lineTo(-2,h/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-2,-h/2);ctx.lineTo(w/3,-h/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-2,h/2);ctx.lineTo(w/3,h/2);ctx.stroke();
    // Jerry can on back
    ctx.fillStyle='#556B2F';ctx.fillRect(w/2-7,-h/2+2,5,h-4);
    // Tires
    ctx.fillStyle='#111';
    [[-w/2+2,-h/2-2],[w/2-7,-h/2-2],[-w/2+2,h/2-3],[w/2-7,h/2-3]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,5,5);ctx.fillStyle='#333';ctx.fillRect(tx+1,ty+1,3,3);ctx.fillStyle='#111';});
    // Star
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText('★',0,3);
  } else if(vt==='sports'){
    // Sports car — low and wide
    ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
    // Aerodynamic slope highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(-w/2,-h/2,w*0.55,h);
    // Wide windshield + rear glass
    ctx.fillStyle='rgba(150,210,255,0.72)';ctx.fillRect(-w*0.22,-h/2+2,w*0.5,h-4);
    ctx.fillStyle='rgba(120,180,220,0.5)';ctx.fillRect(w*0.3,-h/2+2,w*0.14,h-4);
    // Side air vents
    ctx.fillStyle='rgba(0,0,0,0.4)';for(let i=-1;i<=1;i+=1){ctx.fillRect(-w*0.35,i*3,w*0.12,2);}
    // Spoiler
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(w/2-4,-h/2-3,3,h+6);
    // Tires (low-profile)
    ctx.fillStyle='#111';
    [[-w/2+1,-h/2-2],[w/2-7,-h/2-2],[-w/2+1,h/2-3],[w/2-7,h/2-3]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,6,5);ctx.fillStyle='#555';ctx.beginPath();ctx.arc(tx+3,ty+2.5,1.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';});
    // Headlights (glowing)
    ctx.fillStyle='rgba(255,255,180,0.9)';ctx.fillRect(-w/2,-h/2+2,4,4);ctx.fillRect(-w/2,h/2-6,4,4);
    ctx.shadowColor='rgba(255,255,0,0.8)';ctx.shadowBlur=4;ctx.fillStyle='rgba(255,250,0,0.7)';ctx.fillRect(-w/2,h/2-6,4,4);ctx.shadowBlur=0;
  } else if(vt==='muscle'){
    // Muscle car — wide and aggressive
    ctx.fillStyle=car.col;ctx.fillRect(-w/2,-h/2,w,h);
    // Hood scoop
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-w/2+4,-3,w*0.35,6);
    ctx.fillStyle='rgba(50,50,50,0.6)';ctx.fillRect(-w/2+6,-2,w*0.3,4);
    // Windshield
    ctx.fillStyle='rgba(140,200,255,0.65)';ctx.fillRect(-w*0.25,-h/2+2,w*0.45,h-4);
    // Rear window
    ctx.fillStyle='rgba(120,175,220,0.5)';ctx.fillRect(w*0.22,-h/2+2,w*0.18,h-4);
    // Chrome grill
    ctx.fillStyle='#aaa';ctx.fillRect(-w/2,-3,6,6);
    ctx.strokeStyle='#888';ctx.lineWidth=1;for(let i=0;i<3;i++)ctx.strokeRect(-w/2,i*2-2,6,1);
    // Tires (wide)
    ctx.fillStyle='#111';
    [[-w/2,-h/2-3],[w/2-8,-h/2-3],[-w/2,h/2-2],[w/2-8,h/2-2]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,8,5);ctx.fillStyle='#444';ctx.fillRect(tx+2,ty+1,4,3);ctx.fillStyle='#111';});
  } else if(vt==='bike'){
    // Motorbike
    ctx.fillStyle='#111';ctx.fillRect(-w/2+1,-3,4,6);ctx.fillRect(w/2-5,-3,4,6);
    ctx.strokeStyle='rgba(180,200,255,0.7)';ctx.lineWidth=1.5;
    ctx.strokeRect(-w/2+5,-h/2+1,w-10,h-2);
    // Handlebars
    ctx.strokeStyle=car.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-w/3,-h/2-2);ctx.lineTo(w/3,-h/2-2);ctx.stroke();
  } else if(vt==='truck'){
    // Cab + trailer
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-w/2+2,-h/2+2,14,h-4);// cab window
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-w/2+18,-h/2,w-20,h);// trailer
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(-w/2+18,-h/2,w-20,h);
    // Tires (6 for truck)
    ctx.fillStyle='#111';
    [[-w/2+2,-h/2-2],[-w/2+2,h/2-3],[0,-h/2-2],[0,h/2-3],[w/2-8,-h/2-2],[w/2-8,h/2-3]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,6,5);});
  } else if(vt==='heli'||vt==='polheli'){
    // Helicopter body
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(170,220,255,0.6)';
    ctx.beginPath();ctx.ellipse(w*0.2,0,w*0.2,h*0.35,0,0,Math.PI*2);ctx.fill();
    // Tail boom (extends rearward, negative-x)
    ctx.fillStyle=car.col;ctx.fillRect(-3*w/4,-h*0.08,w/2,h*0.16);
    // Main rotor
    ctx.save();ctx.rotate(car.rotorA);
    ctx.strokeStyle='rgba(180,180,180,0.85)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-w*0.7,0);ctx.lineTo(w*0.7,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-w*0.5);ctx.lineTo(0,w*0.5);ctx.stroke();
    ctx.restore();
    // Tail rotor (at rear end of tail boom)
    ctx.save();ctx.translate(-w*0.72,0);ctx.rotate(car.rotorA*2);
    ctx.strokeStyle='rgba(180,180,180,0.8)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-h*0.5);ctx.lineTo(0,h*0.5);ctx.stroke();
    ctx.restore();
    // Police markings on polheli
    if(car.isPol){
      const fl=G.time%300<150;
      ctx.fillStyle=fl?'#0066ff':'#ff2200';ctx.fillRect(-5,-h/2-4,4,3);
      ctx.fillStyle=fl?'#ff2200':'#0066ff';ctx.fillRect(2,-h/2-4,4,3);
    }
  } else if(vt==='plane'){
    // Fuselage
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2);ctx.fill();
    // Wings
    ctx.fillStyle=car.col;ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.moveTo(-w*0.1,-h);ctx.lineTo(w*0.1,-h);ctx.lineTo(w*0.15,h);ctx.lineTo(-w*0.15,h);ctx.fill();
    ctx.globalAlpha=1;
    // Tail fins
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.moveTo(w*0.35,-h*0.6);ctx.lineTo(w*0.5,-h*0.6);ctx.lineTo(w*0.45,h*0.6);ctx.lineTo(w*0.3,h*0.6);ctx.fill();
    // Windows
    ctx.fillStyle='rgba(170,220,255,0.7)';ctx.fillRect(-w*0.25,-h*0.35,w*0.2,h*0.7);
    // Engines under wings
    ctx.fillStyle='#555';ctx.fillRect(-w*0.05,-h*0.7,w*0.1,h*0.25);ctx.fillRect(-w*0.05,h*0.45,w*0.1,h*0.25);
    // Jet exhaust glow
    if(Math.abs(car.spd)>2){ctx.fillStyle='rgba(255,180,60,0.6)';ctx.beginPath();ctx.ellipse(w*0.45,0,6,3,0,0,Math.PI*2);ctx.fill();}
  } else if(vt==='boat'){
    // Hull
    ctx.fillStyle=car.col;
    ctx.beginPath();ctx.moveTo(-w/2,0);ctx.lineTo(-w/3,-h/2);ctx.lineTo(w/3,-h/2);ctx.lineTo(w/2,0);ctx.lineTo(w/3,h/2);ctx.lineTo(-w/3,h/2);ctx.closePath();ctx.fill();
    // Deck
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-w/4,-h/3,w/2,h*0.66);
    // Windshield
    ctx.fillStyle='rgba(170,220,255,0.6)';ctx.fillRect(-w/3,-h/3,w*0.35,h*0.45);
    // Wake particles
    if(Math.abs(car.spd)>0.5&&Math.random()<0.3){
      G.particles.push(new Particle(car.x-Math.cos(car.angle)*20,car.y-Math.sin(car.angle)*20,R(-0.5,0.5),R(-0.5,0.5),'rgba(255,255,255,0.7)',R(300,600),R(2,5)));
    }
  } else {
    // Standard car/van
    const ww=vt==='van'?w-2:w*0.4;
    ctx.fillStyle='rgba(170,220,255,0.65)';ctx.fillRect(-w/2+4,-h/2+2,ww,h-4);
    ctx.fillStyle='rgba(170,220,255,0.5)';ctx.fillRect(w/2-10,-h/2+2,7,h-4);
    // Tires
    ctx.fillStyle='#111';
    [[-w/2+2,-h/2-2],[w/2-7,-h/2-2],[-w/2+2,h/2-3],[w/2-7,h/2-3]].forEach(([tx,ty])=>{
      ctx.fillRect(tx,ty,5,5);ctx.fillStyle='#333';ctx.fillRect(tx+1,ty+1,3,3);ctx.fillStyle='#111';
    });
  }
  // Police lights
  if(car.isPol&&vt!=='heli'&&vt!=='polheli'){
    const fl=G.time%300<150;
    ctx.fillStyle=fl?'#0066ff':'#ff2200';ctx.fillRect(-6,-h/2-3,5,4);
    ctx.fillStyle=fl?'#ff2200':'#0066ff';ctx.fillRect(2,-h/2-3,5,4);
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.strokeRect(-w/2,-h/2,w,h);
    ctx.fillStyle='#fff';for(let i=-6;i<=6;i+=4)ctx.fillRect(i,-1,2,2);
  }
  // Headlights
  if(Math.abs(car.spd)>0.2&&vt!=='heli'&&vt!=='plane'){
    ctx.fillStyle='#ffffaa';ctx.fillRect(-w/2,-h/2+2,3,3);ctx.fillRect(-w/2,h/2-5,3,3);
    ctx.fillStyle='#ff3333';ctx.fillRect(w/2-2,-h/2+2,2,3);ctx.fillRect(w/2-2,h/2-5,2,3);
  }
  // Smoke
  if(car.smokeDmg>60){
    const sa=Math.min(0.6,(car.smokeDmg-60)/90)*((Math.sin(G.time*0.01)+1)*0.3+0.4);
    ctx.fillStyle='rgba(80,80,80,'+sa.toFixed(2)+')';ctx.beginPath();ctx.arc(w/3,0,9,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // HP bar
  if(car.smokeDmg>0){
    const pct=car.hp/car.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(car.x-24,car.y-car.h/2-10,48,5);
    ctx.fillStyle=pct>0.5?'#38A169':'#E53E3E';ctx.fillRect(car.x-24,car.y-car.h/2-10,48*pct,5);
  }
  // Vehicle label
  if(car.driver===G.player||car===G.player?.inCar){
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px Courier New';ctx.textAlign='center';
    ctx.fillText(car.name,car.x,car.y-car.h/2-15);
  }
  if(car.isIceCreamVan){
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 9px Arial';ctx.textAlign='center';
    ctx.fillText('ICE CREAM',car.x,car.y+3);
  }
}

function drawBullet(b){
  // Glow aura
  const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*5);
  grd.addColorStop(0,'rgba(255,255,150,0.85)');grd.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,b.r*5,0,Math.PI*2);ctx.fill();
  // Bright core
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  // Trail
  ctx.strokeStyle='rgba(255,210,0,0.75)';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-Math.cos(b.angle)*22,b.y-Math.sin(b.angle)*22);ctx.stroke();
}

function drawPickup(p){
  const bob=Math.sin(p.bobT)*3;
  ctx.save();ctx.translate(p.x,p.y+bob);
  const col=p.type==='money'?'rgba(0,255,80,0.3)':p.type==='health'?'rgba(255,50,50,0.3)':p.type==='armor'?'rgba(100,200,255,0.3)':'rgba(255,165,0,0.3)';
  const gr=ctx.createRadialGradient(0,0,0,0,0,18);gr.addColorStop(0,col);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
  ctx.font='14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  const icons={money:'💰',health:'❤️',armor:'🛡️',pistol:'🔫',shotgun:'💥',uzi:'🔫'};
  ctx.fillText(icons[p.type]||'?',0,0);
  ctx.restore();
}

// Tile drawing
function drawTiles(){
  const x0=Math.max(0,G.camera.x/TS|0),x1=Math.min(MW,((G.camera.x+canvas.width)/TS|0)+2);
  const y0=Math.max(0,G.camera.y/TS|0),y1=Math.min(MH,((G.camera.y+canvas.height)/TS|0)+2);
  const tt=G.time*0.001,drugT=G.drug.type==='trippy';
  for(let y=y0;y<y1;y++){
    for(let x=x0;x<x1;x++){
      const t=map[y][x],px=x*TS,py=y*TS;
      if(t===T_GRASS){
        ctx.fillStyle=drugT?'hsl('+(((x+y)*2+tt*30)%360)+',70%,35%)':'#3d6b32';
        ctx.fillRect(px,py,TS,TS);
      } else if(t===T_ROAD){
        const cx2=x%CELL,cy2=y%CELL;
        // Road surface
        ctx.fillStyle=drugT?'hsl('+(tt*20%360)+',30%,20%)':'#272727';
        ctx.fillRect(px,py,TS,TS);
        if(!drugT){
          // Slight texture variation
          if((x+y)%3===0){ctx.fillStyle='rgba(255,255,255,0.025)';ctx.fillRect(px,py,TS,TS);}
          const isVertOnly=(cx2===1||cx2===2)&&!(cy2===1||cy2===2);
          const isHorizOnly=(cy2===1||cy2===2)&&!(cx2===1||cx2===2);
          // White edge markings
          ctx.fillStyle='rgba(255,255,255,0.65)';
          const isIntersection=(cx2===1||cx2===2)&&(cy2===1||cy2===2);
          if(cy2===1&&!isIntersection)ctx.fillRect(px,py,TS,2);         // top edge of horiz road
          if(cy2===2&&!isIntersection)ctx.fillRect(px,py+TS-2,TS,2);    // bottom edge
          if(cx2===1&&isVertOnly)ctx.fillRect(px,py,2,TS);      // left edge of vert road
          if(cx2===2&&isVertOnly)ctx.fillRect(px+TS-2,py,2,TS); // right edge
          // Yellow dashed center lines
          ctx.strokeStyle='rgba(255,200,0,0.8)';ctx.lineWidth=2;ctx.setLineDash([8,8]);
          if(isHorizOnly&&cy2===2&&x%2===0){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+TS,py);ctx.stroke();}
          if(isVertOnly&&cx2===2&&y%2===0){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,py+TS);ctx.stroke();}
          ctx.setLineDash([]);
          // Intentionally no intersection crosswalk striping for the classic GTA1 look.
        } else {
          ctx.strokeStyle='rgba(255,0,255,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([6,6]);
          const cx2b=x%CELL,cy2b=y%CELL;
          if(cx2b===1||cx2b===2){ctx.beginPath();ctx.moveTo(px+TS/2,py);ctx.lineTo(px+TS/2,py+TS);ctx.stroke();}
          else{ctx.beginPath();ctx.moveTo(px,py+TS/2);ctx.lineTo(px+TS,py+TS/2);ctx.stroke();}
          ctx.setLineDash([]);
        }
      } else if(t===T_SW){
        // Sidewalk with curb effect
        ctx.fillStyle=drugT?'hsl('+((x*y%60+tt*10)%360)+',40%,45%)':'#7a7570';ctx.fillRect(px,py,TS,TS);
        if(!drugT){
          // Paving slab pattern
          ctx.fillStyle='#6e6a65';
          ctx.fillRect(px,py,TS/2,TS/2);ctx.fillRect(px+TS/2,py+TS/2,TS/2,TS/2);
          // Curb highlight (bright edge toward road)
          const cx2=x%CELL,cy2=y%CELL;
          ctx.fillStyle='rgba(255,255,255,0.18)';
          if(cy2===0&&map[y+1]?.[x]===T_ROAD)ctx.fillRect(px,py+TS-3,TS,3);
          if(cy2===3&&map[y-1]?.[x]===T_ROAD)ctx.fillRect(px,py,TS,3);
          if(cx2===0&&map[y]?.[x+1]===T_ROAD)ctx.fillRect(px+TS-3,py,3,TS);
          if(cx2===3&&map[y]?.[x-1]===T_ROAD)ctx.fillRect(px,py,3,TS);
        } else {
          ctx.fillStyle='rgba(255,255,0,0.2)';
          ctx.fillRect(px,py,TS/2,TS/2);ctx.fillRect(px+TS/2,py+TS/2,TS/2,TS/2);
        }
      } else if(t===T_BUILD){
        ctx.fillStyle='#1a1a1a';ctx.fillRect(px,py,TS,TS);
      } else if(t===T_WATER){
        const hue=drugT?(tt*50)%360:210+Math.sin(x*0.3+tt)*5;
        ctx.fillStyle='hsl('+hue+',60%,'+(22+Math.sin(y*0.4+tt)*4)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%3===0){ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(px+4,py+TS/2,TS-8,2);}
      } else if(t===T_PARK){
        ctx.fillStyle=drugT?'hsl('+((x*3+y*2+tt*40)%360)+',80%,40%)':'hsl(120,'+(35+(x%5)*2)+'%,'+(27+(y%4)*2)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%5===0){ctx.fillStyle=drugT?'hsl('+((tt*60)%360)+',100%,50%)':'#2a5a20';ctx.beginPath();ctx.arc(px+TS/2,py+TS/2,6,0,Math.PI*2);ctx.fill();}
      } else if(t===T_PARK2){
        ctx.fillStyle=drugT?'hsl('+((x+y+tt*20)%360)+',30%,30%)':'#404040';ctx.fillRect(px,py,TS,TS);
        if(x%4===0){ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+TS,py);ctx.lineTo(px+TS,py+TS);ctx.stroke();}
      } else if(t===T_BEACH){
        const bh=drugT?(tt*45+x)%360:42;
        ctx.fillStyle=drugT?'hsl('+bh+',90%,60%)':'#C8A96E';ctx.fillRect(px,py,TS,TS);
        if((x*3+y*2)%7===0){ctx.fillStyle=drugT?'rgba(255,0,100,0.4)':'rgba(200,180,100,0.5)';ctx.fillRect(px+R(2,10)|0,py+R(2,10)|0,4,4);}
      } else if(t===T_OCEAN){
        const oh=drugT?(tt*80+x*2)%360:210+Math.sin(x*0.2+tt*1.5)*8;
        ctx.fillStyle='hsl('+oh+',70%,'+(28+Math.sin(y*0.3+tt*2)*5)+'%)';ctx.fillRect(px,py,TS,TS);
        if((x+y)%4===0){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(px+2,py+TS*0.4|0,TS-4,3);}
        if((x+y)%7===0&&Math.sin(tt*2+x)<0){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(px+TS/2,py+TS/2,4,0,Math.PI*2);ctx.fill();}
      } else if(t===T_RUNWAY){
        ctx.fillStyle=drugT?'hsl('+((x+tt*10)%360)+',30%,50%)':'#555';ctx.fillRect(px,py,TS,TS);
        // Runway markings
        if(x%4===0){ctx.fillStyle=drugT?'rgba(255,255,0,0.8)':'#fff';ctx.fillRect(px+TS/2-1,py,2,TS);}
        if(y%4===0){ctx.fillStyle=drugT?'rgba(255,255,0,0.8)':'#fff';ctx.fillRect(px,py+TS/2-1,TS,2);}
      } else if(t===T_MIL){
        // Military compound — olive/khaki pavement with grid markings
        const milCol=drugT?'hsl('+((x*3+y*2+tt*15)%360)+',60%,40%)':'#4e5e38';
        ctx.fillStyle=milCol;ctx.fillRect(px,py,TS,TS);
        if(!drugT){
          // Grid lines
          ctx.fillStyle='rgba(0,0,0,0.18)';
          if(x%2===0)ctx.fillRect(px,py,1,TS);
          if(y%2===0)ctx.fillRect(px,py,TS,1);
          // Yellow direction arrows occasionally
          if(x%8===4&&y%8===4){ctx.fillStyle='rgba(240,200,0,0.4)';ctx.fillRect(px+6,py+TS/2-1,TS-12,2);ctx.fillRect(px+TS-10,py+TS/2-4,4,8);}
        }
      }
    }
  }
}


function drawTrafficLights(){
  for(const light of trafficLights){
    const sx=light.x-G.camera.x,sy=light.y-G.camera.y;
    if(sx<-120||sy<-120||sx>canvas.width+120||sy>canvas.height+120)continue;
    const st=trafficLightState(light,G.time);
    // Pole corners and mast arms over road lanes (American city style).
    for(const c of light.corners){
      ctx.fillStyle='rgba(35,35,35,0.9)';
      ctx.fillRect(c.x-1.5,c.y-1.5,3,16); // pole base
    }
    // North-facing head (controls southbound lane => NS state)
    ctx.strokeStyle='rgba(30,30,30,0.95)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(light.corners[0].x,light.corners[0].y+2);ctx.lineTo(light.x-8,light.y-18);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(light.x-14,light.y-24,10,16);
    ctx.fillStyle=st.ns==='go'?'#22c55e':st.ns==='caution'?'#facc15':'#ef4444';ctx.beginPath();ctx.arc(light.x-9,light.y-16,3.1,0,Math.PI*2);ctx.fill();
    // South-facing head
    ctx.beginPath();ctx.moveTo(light.corners[3].x,light.corners[3].y-2);ctx.lineTo(light.x+8,light.y+18);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(light.x+4,light.y+8,10,16);
    ctx.fillStyle=st.ns==='go'?'#22c55e':st.ns==='caution'?'#facc15':'#ef4444';ctx.beginPath();ctx.arc(light.x+9,light.y+16,3.1,0,Math.PI*2);ctx.fill();
    // West-facing head (controls eastbound lane => EW state)
    ctx.beginPath();ctx.moveTo(light.corners[2].x+2,light.corners[2].y);ctx.lineTo(light.x-18,light.y+8);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(light.x-24,light.y+4,16,10);
    ctx.fillStyle=st.ew==='go'?'#22c55e':st.ew==='caution'?'#facc15':'#ef4444';ctx.beginPath();ctx.arc(light.x-16,light.y+9,3.1,0,Math.PI*2);ctx.fill();
    // East-facing head
    ctx.beginPath();ctx.moveTo(light.corners[1].x-2,light.corners[1].y);ctx.lineTo(light.x+18,light.y-8);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(light.x+8,light.y-14,16,10);
    ctx.fillStyle=st.ew==='go'?'#22c55e':st.ew==='caution'?'#facc15':'#ef4444';ctx.beginPath();ctx.arc(light.x+16,light.y-9,3.1,0,Math.PI*2);ctx.fill();
  }
}

function drawBldgs(){
  const tt=G.time*0.001,drugT=G.drug.type==='trippy';
  for(const b of bldgs){
    if(b.x-G.camera.x>canvas.width+20||b.x+b.w-G.camera.x<-20)continue;
    if(b.y-G.camera.y>canvas.height+20||b.y+b.h-G.camera.y<-20)continue;
    // Shadow (offset south-east)
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(b.x+6,b.y+6,b.w,b.h);
    // Wall
    let wc=b.wall;
    if(drugT)wc='hsl('+((b.x*0.1+tt*20)%360)+',80%,45%)';
    else if(b.special==='garage')wc='#276749';
    else if(b.special==='club'){const beat=Math.sin(tt*4)>0;wc=beat?'#44337A':'#553C8B';}
    else if(b.special==='drugden')wc='#1A202C';
    else if(b.special==='gunshop')wc='#744210';
    // === BUILDING WALL with pseudo-3D depth ===
    ctx.fillStyle=wc;ctx.fillRect(b.x,b.y,b.w,b.h);
    // Left-side darker shading (simulates 3D wall depth)
    const grad=ctx.createLinearGradient(b.x,0,b.x+b.w,0);
    grad.addColorStop(0,'rgba(0,0,0,0.30)');grad.addColorStop(0.15,'rgba(0,0,0,0.08)');
    grad.addColorStop(0.85,'rgba(0,0,0,0.04)');grad.addColorStop(1,'rgba(0,0,0,0.20)');
    ctx.fillStyle=grad;ctx.fillRect(b.x,b.y,b.w,b.h);
    // Top-side highlight
    ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(b.x,b.y,b.w,4);
    // Roof (slightly inset, different shade)
    let rc=b.roof;
    if(drugT)rc='hsl('+((b.y*0.1+tt*15)%360)+',60%,30%)';
    ctx.fillStyle=rc;ctx.fillRect(b.x+6,b.y+6,b.w-12,b.h-12);
    // Roof highlight
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(b.x+6,b.y+6,b.w-12,3);
    // Outer wall border — thick dark outline gives building definition
    ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=2.5;ctx.strokeRect(b.x,b.y,b.w,b.h);
    // Thin highlight on top-left edges
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(b.x+2,b.y+b.h-2);ctx.lineTo(b.x+2,b.y+2);ctx.lineTo(b.x+b.w-2,b.y+2);ctx.stroke();
    // Floor divider lines (horizontal bands per floor)
    ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.5;
    const flH=b.h/(b.floors||2);
    for(let f=1;f<(b.floors||2);f++){
      const fy=b.y+f*flH;
      ctx.beginPath();ctx.moveTo(b.x+6,fy);ctx.lineTo(b.x+b.w-6,fy);ctx.stroke();
      // Ledge detail on each floor
      ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(b.x+6,fy,b.w-12,2);
    }
    // Windows
    const wsz=b.sz||5;
    for(let i=0;i<b.wsX.length;i++){
      if(b.wsX[i]<b.x+5||b.wsX[i]+wsz>b.x+b.w-5)continue;
      if(b.wsY[i]<b.y+5||b.wsY[i]+wsz>b.y+b.h-5)continue;
      const lit=b.winW[i]^((G.time/5000|0)+(i%7===0)?1:0);
      if(drugT)ctx.fillStyle='hsl('+((b.wsX[i]*0.3+tt*30)%360)+',100%,60%)';
      else if(b.special==='club'||b.special==='milbarracks'&&false){
        const h=(b.wsX[i]*1.2+b.wsY[i]*0.8+tt*60)%360;
        ctx.fillStyle=Math.sin(tt*5+i*0.7)>0?'rgba(255,60,200,0.9)':'rgba(80,40,255,0.9)';
      }
      else ctx.fillStyle=lit?'rgba(255,244,180,0.95)':'rgba(10,20,60,0.88)';
      ctx.fillRect(b.wsX[i],b.wsY[i],wsz,wsz);
      // Window sill
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(b.wsX[i]-1,b.wsY[i]+wsz,wsz+2,2);
      // Window frame lines
      if(!drugT){ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=0.8;ctx.strokeRect(b.wsX[i]-0.5,b.wsY[i]-0.5,wsz+1,wsz+1);}
    }
    // === ENTRANCE DOOR (south face, centered) ===
    if(b.special!=='airport'&&b.special!=='airport2'&&b.special!=='hangar'&&b.special!=='milhangar'&&b.special!=='milbarracks'&&b.special!=='milstore'){
      const dW=16,dH=14;
      const dX=b.x+b.w/2-dW/2,dY=b.y+b.h-dH;
      // Stairs / entry steps
      ctx.fillStyle='rgba(180,170,150,0.65)';ctx.fillRect(dX-8,dY+dH,dW+16,5);
      ctx.fillStyle='rgba(160,150,130,0.55)';ctx.fillRect(dX-6,dY+dH+3,dW+12,4);
      // Door arch/frame
      ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(dX-2,dY-2,dW+4,dH+2);
      // Door body
      const doorCol=b.special==='garage'?'#6B4C00':b.special==='club'?'#5A1090':b.special==='drugden'?'#0A0808':b.special==='gunshop'?'#4a2208':'#4a3218';
      ctx.fillStyle=doorCol;ctx.fillRect(dX,dY,dW,dH);
      // Door panel insets
      ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(dX+2,dY+2,dW/2-3,dH-5);ctx.fillRect(dX+dW/2+1,dY+2,dW/2-3,dH-5);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(dX+2,dY+dH*0.55,dW-4,dH*0.35);
      // Doorknob
      ctx.fillStyle='#D4AF37';ctx.beginPath();ctx.arc(dX+dW-5,dY+dH/2,1.8,0,Math.PI*2);ctx.fill();
      // Illuminated sign above door for special buildings
      if(b.special){
        const signBg={garage:'#1C6B38',club:Math.sin(tt*4)>0?'#44237A':'#6633A0',drugden:'#0D0A10',gunshop:'#7A3A10',milhangar:'#3a4a20',milbarracks:'#3a4a20',milstore:'#3a4a20'}[b.special]||'#222';
        const signTxt={garage:'GARAGE',club:'NEON CLUB',drugden:'DRUG DEN',gunshop:'AMMU-NATION',airport:'AIRPORT',airport2:'AIRPORT',milhangar:'HANGAR',milbarracks:'BARRACKS',milstore:'ARMORY'}[b.special]||'';
        const signCol={garage:'#00FF41',club:'#FF88FF',drugden:'#e040fb',gunshop:'#F6AD55'}[b.special]||'#aaa';
        if(signTxt){
          ctx.fillStyle=signBg;ctx.fillRect(dX-12,dY-13,dW+24,12);
          ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;ctx.strokeRect(dX-12,dY-13,dW+24,12);
          ctx.fillStyle=signCol;ctx.font='bold 7px Courier New';ctx.textAlign='center';
          ctx.fillText(signTxt,dX+dW/2,dY-4);
          // Glow for neon signs
          if(b.special==='club'||b.special==='drugden'){
            ctx.shadowColor=signCol;ctx.shadowBlur=4;
            ctx.fillText(signTxt,dX+dW/2,dY-4);
            ctx.shadowBlur=0;
          }
        }
      }
    }
    // Rooftop details: HVAC unit, water tower on some buildings
    if(!b.special&&b.floors>=4&&(b.x+b.y)%3===0){
      const rx=b.x+b.w*0.6,ry=b.y+8;
      ctx.fillStyle='#888';ctx.fillRect(rx,ry,10,8);ctx.fillRect(rx+2,ry-4,6,5);
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(rx,ry,10,2);
    }
  }
}

// Main render + minimap
function render(){
  // If player is in a building interior, show that instead
  if(G.indoors){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawInterior();
    drawMinimap();
    return;
  }

  const drugT=G.drug.type==='trippy';
  const drugPow=drugT?Math.min(1,G.drug.timer/G.drug.maxTimer):0;
  const tt=G.time*0.001;

  // Current flying vehicle altitude
  const flyVeh=(G.player.inCar&&G.player.inCar.flies)?G.player.inCar:null;
  const playerAlt=flyVeh?(flyVeh.altitude||0):0;

  // Trippy trail effect (don't fully clear)
  if(drugT){
    ctx.fillStyle='rgba(0,0,0,'+(0.25+drugPow*0.2)+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  // Camera shake
  const sx=G.shake>0?R(-3,3):0,sy=G.shake>0?R(-3,3):0;

  // Trippy: wave distortion
  if(drugT){
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(Math.sin(tt*0.4)*0.015*drugPow);
    const zoom=1+Math.sin(tt*0.7)*0.03*drugPow;
    ctx.scale(zoom,zoom);
    ctx.translate(-canvas.width/2,-canvas.height/2);
  }

  ctx.save();
  ctx.translate(-Math.floor(G.camera.x)+sx,-Math.floor(G.camera.y)+sy);
  drawTiles();
  drawTrafficLights();
  drawBldgs();

  // Draw helipad marker
  ctx.fillStyle='rgba(255,220,0,0.5)';ctx.strokeStyle='#FFD700';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(116*TS,39*TS,24,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FFD700';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('H',116*TS,39*TS+5);

  // Aircraft ground shadows (drawn below all entities)
  for(const e of G.entities){
    if(!(e instanceof Vehicle)||!e.flies||!e.alive)continue;
    const alt=e.altitude||0;if(alt<5)continue;
    const offX=alt*0.25,offY=alt*0.35;
    const scale=1+alt*0.0025;
    const alpha=Math.max(0.04,0.38-alt*0.001);
    ctx.save();
    ctx.translate(e.x+offX,e.y+offY);ctx.rotate(e.angle);
    ctx.scale(scale,scale*0.55);
    ctx.fillStyle='rgba(0,0,0,'+alpha.toFixed(3)+')';
    ctx.beginPath();ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Particles
  for(const p of G.particles){
    if(!p.alive)continue;
    const a=clamp(p.life/p.maxL,0,1);
    ctx.globalAlpha=a;
    ctx.fillStyle=drugT?'hsl('+((p.x*0.5+tt*50)%360)+',100%,60%)':p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Sort & draw entities
  const vis=G.entities.filter(e=>{
    if(!e.alive)return false;
    const sx2=e.x-G.camera.x,sy2=e.y-G.camera.y;
    return sx2>-100&&sx2<canvas.width+100&&sy2>-100&&sy2<canvas.height+100;
  }).sort((a,b)=>a.y-b.y);

  // Draw mission waypoint marker in world
  if(G.mission&&G.mission.state==='active'){
    let wx=null,wy=null;
    if(G.mission.type==='goto'||G.mission.type==='visit'){{wx=G.mission.targetTile?G.mission.targetTile.x*TS:null;wy=G.mission.targetTile?G.mission.targetTile.y*TS:null;}}
    else if(G.mission.type==='steal_vehicle'&&G.player.inCar&&G.player.inCar.vtype===G.mission.vtype&&G.mission.deliverTile){wx=G.mission.deliverTile.x*TS;wy=G.mission.deliverTile.y*TS;}
    if(wx!==null){
      const sx=wx-G.camera.x,sy=wy-G.camera.y;
      const pulse=0.6+Math.sin(G.time*0.005)*0.4;
      ctx.fillStyle='rgba(255,200,0,'+pulse+')';
      ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText('★',sx,sy+4);
    }
  }
  for(const e of vis){
    if(e instanceof Vehicle)drawCar(e);
    else if(e instanceof Rocket)drawRocket(e);
    else if(e instanceof Bullet)drawBullet(e);
    else if(e instanceof Pickup)drawPickup(e);
    else if(e instanceof Ped)drawPed(e);
    else if(e instanceof BeachPed)drawBeachPed(e);
    else if(e instanceof CopOfficer)drawCop(e);
    else if(e instanceof MilSoldier)drawMilSoldier(e);
  }
  if(G.player.alive&&!G.player.inCar)drawPlayer();

  ctx.restore();
  if(drugT)ctx.restore();

  // ── Altitude effects (drawn over world, under HUD) ──
  if(playerAlt>30){
    // City fade at higher altitudes
    if(playerAlt>80){
      const fade=Math.min(0.78,(playerAlt-80)/180);
      ctx.fillStyle='rgba(140,165,200,'+fade.toFixed(3)+')';
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    // Cloud layer
    if(playerAlt>55){
      const cloudOp=Math.min(0.92,(playerAlt-55)/130);
      drawClouds(cloudOp,tt);
    }
    // Altitude HUD
    const altBar=document.getElementById('altitude-bar');
    altBar.style.display='block';
    altBar.textContent='ALT '+Math.round(playerAlt)+'m  |  Q ▲  Z ▼';
  } else {
    document.getElementById('altitude-bar').style.display='none';
  }

  // Hit vignette
  if(G.player.hitFlash>0){
    ctx.fillStyle='rgba(255,0,0,'+Math.min(0.3,G.player.hitFlash/1200)+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Trippy overlay effects
  if(drugT&&drugPow>0.1){
    const g2=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g2.addColorStop(0,'hsla('+((tt*30)%360)+',100%,50%,'+drugPow*0.12+')');
    g2.addColorStop(0.5,'hsla('+((tt*30+120)%360)+',100%,50%,'+drugPow*0.12+')');
    g2.addColorStop(1,'hsla('+((tt*30+240)%360)+',100%,50%,'+drugPow*0.12+')');
    ctx.fillStyle=g2;ctx.fillRect(0,0,canvas.width,canvas.height);
    if(Math.sin(tt*6)>0.85){ctx.fillStyle='rgba(255,255,255,'+(0.05*drugPow)+')';ctx.fillRect(0,0,canvas.width,canvas.height);}
    const eg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*0.3,canvas.width/2,canvas.height/2,canvas.width*0.8);
    eg.addColorStop(0,'transparent');eg.addColorStop(1,'hsla('+((tt*60)%360)+',100%,30%,'+drugPow*0.4+')');
    ctx.fillStyle=eg;ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // God mode HUD indicator
  if(G.godMode){
    const pulse=0.7+Math.sin(G.time*0.006)*0.3;
    ctx.save();
    ctx.strokeStyle='rgba(255,215,0,'+(0.12+Math.sin(G.time*0.004)*0.06).toFixed(3)+')';ctx.lineWidth=10;
    ctx.strokeRect(0,0,canvas.width,canvas.height);
    ctx.font='bold 14px Courier New';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText('★ GOD MODE ★',canvas.width/2+1,canvas.height-21);
    ctx.fillStyle='rgba(255,215,0,'+pulse.toFixed(2)+')';ctx.fillText('★ GOD MODE ★',canvas.width/2,canvas.height-22);
    ctx.restore();
  }
  drawMinimap();
}

function drawClouds(opacity,tt){
  ctx.save();
  const clouds=[
    {x:0.12,y:0.18,r:95,ox:0.8},{x:0.38,y:0.08,r:72,ox:1.2},{x:0.68,y:0.22,r:108,ox:0.5},
    {x:0.22,y:0.55,r:84,ox:1.5},{x:0.55,y:0.45,r:100,ox:0.9},{x:0.84,y:0.3,r:78,ox:0.3},
    {x:0.08,y:0.72,r:90,ox:1.1},{x:0.5,y:0.78,r:115,ox:0.7},{x:0.78,y:0.65,r:68,ox:1.4},
    {x:0.32,y:0.35,r:60,ox:0.6},{x:0.92,y:0.8,r:80,ox:1.0},{x:0.45,y:0.92,r:70,ox:0.4},
  ];
  for(const c of clouds){
    const cx=c.x*canvas.width+Math.sin(tt*0.4+c.ox*3)*22;
    const cy=c.y*canvas.height+Math.cos(tt*0.25+c.ox*2)*10;
    const r=c.r;
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr.addColorStop(0,'rgba(255,255,255,'+opacity+')');
    gr.addColorStop(0.55,'rgba(240,245,255,'+(opacity*0.75)+')');
    gr.addColorStop(1,'rgba(210,225,255,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,'+(opacity*0.85)+')';
    ctx.beginPath();ctx.arc(cx-r*0.45,cy+r*0.1,r*0.6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.4,cy+r*0.05,r*0.55,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-r*0.15,cy-r*0.2,r*0.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function enterBuilding(b){
  G.indoors={building:b,floor:0};
  G.indoorFloor=0;
  G.indoorPlayerX=canvas.width/2;
  G.indoorPlayerY=canvas.height*0.72;
  sound('carenter');

function exitBuilding(){
  if(!G.indoors)return;
  G.indoors=null;

}

function drawMinimap(){
  const sz=160;mmx.fillStyle='rgba(10,12,10,0.92)';mmx.fillRect(0,0,sz,sz);
  const sc=sz/(MH*TS);
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){
    const t=map[y][x];
    mmx.fillStyle=t===T_ROAD?'#555':t===T_BUILD?'#2a2a2a':t===T_WATER||t===T_OCEAN?'#1a4080':t===T_BEACH?'#8B7340':t===T_RUNWAY?'#888':t===T_PARK?'#1a4a15':t===T_MIL?'#3a4a20':'#2a3a22';
    mmx.fillRect(x*TS*sc,y*TS*sc,2,2);
  }
  // Military base outline on minimap
  mmx.strokeStyle='rgba(80,180,40,0.7)';mmx.lineWidth=1;
  mmx.strokeRect(MIL.x1*TS*sc,MIL.y1*TS*sc,(MIL.x2-MIL.x1)*TS*sc,(MIL.y2-MIL.y1)*TS*sc);
  // City dividers
  mmx.strokeStyle='rgba(255,200,0,0.25)';mmx.lineWidth=0.5;
  mmx.beginPath();mmx.moveTo(CITY1_X2*TS*sc,0);mmx.lineTo(CITY1_X2*TS*sc,sz);mmx.stroke();
  mmx.beginPath();mmx.moveTo(CITY2_X1*TS*sc,0);mmx.lineTo(CITY2_X1*TS*sc,sz);mmx.stroke();
  // Special locs on minimap
  for(const loc of SPECIAL_LOCS){
    if(loc.type==='mission_giver')continue;
    const col={garage:'#00FF41',nightclub:'#FC8181',drugden:'#e040fb',gunshop:'#F6AD55',boatdock:'#3182CE',helipad:'#FFD700',airstrip:'#fff',milairstrip:'#8f8',milbase:'#4a6'}[loc.type]||'#aaa';
    mmx.fillStyle=col;mmx.fillRect(loc.x*sc,loc.y*sc,4,4);
  }
  // Mission waypoint on minimap
  if(G.mission&&G.mission.state==='active'){
    let wx=null,wy=null;
    if(G.mission.type==='goto'&&G.mission.targetTile){wx=G.mission.targetTile.x*TS;wy=G.mission.targetTile.y*TS;}
    else if(G.mission.type==='steal_vehicle'&&G.player.inCar&&G.player.inCar.vtype===G.mission.vtype&&G.mission.deliverTile){wx=G.mission.deliverTile.x*TS;wy=G.mission.deliverTile.y*TS;}
    if(wx!==null){const p=0.5+Math.sin(G.time*0.005)*0.5;mmx.fillStyle='rgba(255,220,0,'+p+')';mmx.beginPath();mmx.arc(wx*sc,wy*sc,4,0,Math.PI*2);mmx.fill();}
  }
  // Vehicles on minimap
  for(const e of G.entities){
    if(!e.alive)continue;
    if(e instanceof Vehicle){
      mmx.fillStyle=e.vtype==='tank'||e.vtype==='f16'||e.vtype==='miljeep'?'#8f8':e.isPol?'#4444ff':'#aaa';
      mmx.fillRect(e.x*sc-1,e.y*sc-1,3,3);
    } else if(e instanceof Pickup){mmx.fillStyle='#FFD700';mmx.fillRect(e.x*sc-1,e.y*sc-1,2,2);}
    else if(e instanceof MilSoldier){mmx.fillStyle='#6a8';mmx.fillRect(e.x*sc-1,e.y*sc-1,2,2);}
  }
  mmx.fillStyle='#ff3333';
  mmx.beginPath();mmx.arc(G.player.x*sc,G.player.y*sc,3,0,Math.PI*2);mmx.fill();
  mmx.strokeStyle='rgba(255,255,255,0.25)';mmx.lineWidth=1;
  mmx.strokeRect(G.camera.x*sc,G.camera.y*sc,canvas.width*sc,canvas.height*sc);
}

// Game loop
let lastT=0;
function loop(ts){
  const dt=Math.min(ts-lastT,50);lastT=ts;
  if(G.player.alive)update(dt);
  render();
  requestAnimationFrame(loop);
}

// Initialization

  genMap();
  // Spawn player at center of City 1 (Liberty City)
  const cx=70*TS,cy=80*TS;
  const spawnPt=city1RoadPts.length?
    city1RoadPts.reduce((b,p)=>Math.hypot(p.x-cx,p.y-cy)<Math.hypot(b.x-cx,b.y-cy)?p:b,city1RoadPts[0]):
    roadPts[Math.floor(roadPts.length/4)]||{x:2240,y:2560};
  G.player=new Player(spawnPt.x,spawnPt.y);

  // City 1 vehicles (regular)
  const c1Types=['car','car','car','car','van','van','truck','truck','bike','bike'];
  for(let i=0;i<45;i++){
    const rp=randCity1Road();const vt=c1Types[RI(0,c1Types.length-1)];

  }
  // Pickups — spread across both cities
  for(let i=0;i<30;i++){const rp=randCity1Road();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'money',RI(50,300)));}
  for(let i=0;i<20;i++){const rp=randCity2Road();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'money',RI(100,500)));}
  for(let i=0;i<20;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'health',25));}
  for(let i=0;i<12;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'pistol',30));}
  for(let i=0;i<6;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'shotgun',8));}
  for(let i=0;i<6;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x+R(-15,15),rp.y+R(-15,15),'uzi',40));}
  for(let i=0;i<5;i++){const rp=randRoad();G.entities.push(new Pickup(rp.x,rp.y,'armor',50));}
  // Camera centered on player
  G.camera.x=clamp(G.player.x-canvas.width/2,0,MW*TS-canvas.width);
  G.camera.y=clamp(G.player.y-canvas.height/2,0,MH*TS-canvas.height);
  G.player.updateHpBar();G.player.updateWeaponHUD();updateWantedBar();
  // Start first mission automatically
  setTimeout(()=>{startMission('m1');},2000);
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
init();
</script>
